<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fix Saldo - Belle</title>
<style>
  body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;padding:2rem;max-width:500px;margin:0 auto;}
  .btn{width:100%;padding:1rem;font-size:1.1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;background:#e94560;color:white;margin-top:1rem;}
  .btn:disabled{background:#555;cursor:not-allowed;}
  .log{background:#0a0a1a;border-radius:6px;padding:1rem;font-family:monospace;font-size:.85rem;margin-top:1rem;display:none;}
  .ok{color:#4caf80;}.err{color:#e06464;}.inf{color:#4a9fd8;}
</style>
</head>
<body>
<h2>💰 Crear saldo arrastrado David</h2>
<p>Crea la rendición de <strong>$1.771.503</strong> tipo <code>saldo_arrastrado</code> para David en el período <strong>Sem 09/Abr</strong>.</p>
<button class="btn" id="btn" onclick="fix()">⚡ CREAR SALDO ARRASTRADO</button>
<div class="log" id="log"></div>
<script>
const URL = 'https://syylbuvjuekkanxynpps.supabase.co/rest/v1';
const KEY = 'sb_publishable_DQUI1egWtjw_8hs0iUyE4Q_zhDpJo52';

function log(msg, cls) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += '<div class="'+(cls||'inf')+'">['+new Date().toLocaleTimeString('es-AR')+'] '+msg+'</div>';
}

async function fix() {
  if (!confirm('¿Crear saldo arrastrado $1.771.503 para David en Sem 09/Abr?')) return;
  var btn = document.getElementById('btn');
  btn.disabled = true;

  try {
    // Primero verificar que no exista ya
    var check = await fetch(URL+'/rendiciones?select=id,monto&tipo=eq.saldo_arrastrado&estado=eq.aprobada&vendedor_id=eq.1', {
      headers: {'apikey': KEY, 'Authorization': 'Bearer '+KEY}
    });
    var existing = await check.json();
    if (existing && existing.length > 0) {
      log('Ya existe un saldo arrastrado: $'+existing[0].monto.toLocaleString('es-AR'), 'inf');
      log('Borrándolo para recrear con el valor correcto...', 'inf');
      for (var r of existing) {
        await fetch(URL+'/rendiciones?id=eq.'+r.id, {
          method: 'DELETE',
          headers: {'apikey': KEY, 'Authorization': 'Bearer '+KEY}
        });
        log('  Borrado id='+r.id, 'inf');
      }
    }

    // Crear el saldo arrastrado correcto
    var r = await fetch(URL+'/rendiciones', {
      method: 'POST',
      headers: {
        'apikey': KEY, 'Authorization': 'Bearer '+KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        vendedor_id:  1,
        monto:        1771503,
        concepto:     'Saldo periodo anterior (Semana 3 - mar 2026)',
        tipo:         'saldo_arrastrado',
        estado:       'aprobada',
        periodo:      'Sem 09/Abr',
        aprobado_por: 'admin',
        aprobado_at:  new Date().toISOString()
      })
    });
    if (!r.ok) throw new Error('HTTP '+r.status+' — '+(await r.text()));
    var data = await r.json();
    log('✅ Saldo arrastrado creado: id='+data[0].id+' monto=$1.771.503', 'ok');
    log('🎉 Listo. Recargá el panel de David.', 'ok');
    btn.textContent = '✅ Completado';
    btn.style.background = '#4caf80';
  } catch(e) {
    log('❌ Error: '+e.message, 'err');
    btn.disabled = false;
    btn.textContent = '⚡ REINTENTAR';
  }
}
</script>
</body>
</html>
