<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Distribuidora Belle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ebe0;font-family:'Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.2rem .8rem 2rem}

.card{max-width:440px;width:100%;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 50px rgba(0,0,0,.13)}

/* BIG PHOTO */
.card-photo{width:100%;background:#fff;display:flex;align-items:center;justify-content:center;padding:1.8rem 2rem 1rem;position:relative;min-height:220px}
.card-photo img{max-height:210px;max-width:100%;object-fit:contain;display:block}
.card-photo .no-img{font-size:5rem;color:#ddd}
.etiq-badge{position:absolute;top:12px;left:12px;background:#c4965a;color:#fff;font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.15rem .5rem;border-radius:20px}

/* PRODUCT INFO */
.card-info{padding:0 1.2rem .9rem}
.brand{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:#c4965a;margin-bottom:.2rem}
.prod-name{font-size:1.1rem;font-weight:700;color:#1a1a1a;line-height:1.25;margin-bottom:.25rem}
.genero{font-size:.65rem;color:#999;margin-bottom:.9rem}

/* PRICES */
.prices{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.75rem}
.pbox{background:#faf8f4;border:1px solid #e8e3db;border-radius:10px;padding:.5rem .3rem;text-align:center}
.pbox.hi{background:linear-gradient(135deg,#fdf5ea,#f5e8d0);border-color:#d4b07a}
.plabel{font-size:.52rem;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.18rem}
.pval{font-size:.95rem;font-weight:700;color:#1a1a1a}

/* DECAN */
.decan-row{display:flex;align-items:center;gap:.5rem;background:#fdf5ea;border:1px solid #ead9a8;border-radius:8px;padding:.4rem .7rem;margin-bottom:.8rem}
.decan-label{font-size:.7rem;color:#7a5a20;font-weight:600;flex:1}
.decan-price{font-size:.85rem;font-weight:700;color:#c4965a}

/* NOTAS */
.sec-title{font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:#bbb;font-weight:600;margin-bottom:.4rem}
.notas-text{font-size:.75rem;color:#555;line-height:1.6;margin-bottom:.85rem}

/* ACORDES CHART */
.acordes-section{margin-bottom:.9rem}
.acorde-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.32rem}
.acorde-name{font-size:.65rem;color:#444;width:95px;flex-shrink:0;text-align:right}
.acorde-bar-wrap{flex:1;height:14px;background:#f0ece6;border-radius:7px;overflow:hidden}
.acorde-bar{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:.3rem;min-width:24px}
.acorde-bar span{font-size:.5rem;color:#fff;font-weight:700;white-space:nowrap}

/* STOCK */
.stock-row{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:.1rem}
.stock-dot{width:7px;height:7px;border-radius:50%}
.stock-txt{font-size:.65rem;font-weight:600}

/* FOOTER = dark header style at BOTTOM */
.card-footer{background:#1a1a1a;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.footer-brand{font-family:'Georgia',serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.footer-brand span{color:#c4965a}
.footer-stock{font-size:.6rem;font-weight:600;padding:.18rem .55rem;border-radius:20px}
.footer-ok{background:rgba(76,175,130,.2);color:#6fcf97;border:1px solid rgba(76,175,130,.3)}
.footer-no{background:rgba(220,80,80,.15);color:#e88;border:1px solid rgba(220,80,80,.2)}

/* ACTIONS */
.actions{max-width:440px;width:100%;margin-top:.8rem;display:flex;gap:.5rem}
.btn-link{flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;background:#fff;color:#1a1a1a;border:1px solid #e8e3db;border-radius:10px;padding:.6rem;font-size:.74rem;font-weight:600;cursor:pointer;font-family:Georgia,serif}
.btn-img{flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:.6rem;font-size:.74rem;font-weight:600;cursor:pointer;font-family:Georgia,serif}

.loading{padding:3rem;text-align:center;color:#888;font-size:.85rem}
.spin{display:inline-block;width:28px;height:28px;border:3px solid #e8e3db;border-top-color:#c4965a;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:.7rem}
@keyframes sp{to{transform:rotate(360deg)}}
.err{padding:2rem 1rem;text-align:center;color:#c0392b;font-size:.82rem;font-family:Georgia,serif}
.err-brand{font-size:1.1rem;color:#c4965a;margin-bottom:.5rem}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spin"></div><br>Cargando...</div></div>
<div id="actionsWrap" style="display:none" class="actions">
  <button class="btn-link" onclick="copiarLink()">&#128257; Compartir</button>
  <button class="btn-img" onclick="descargarImg()">&#128247; Descargar imagen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
//<![CDATA[
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function fmt(n){return n?("$"+Math.round(n).toLocaleString("es-AR")):"—";}
function lum(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>140?"#222":"#fff";}

var ACCOLORS={"Acuático":"#3A9CC4","Afrutados":"#E8703A","Afrutados rojos":"#D4354A","Ahumado":"#6B6B6B","Almendrado":"#C4945A","Almizclado":"#B09A8A","Amaderado":"#8B5E3C","Animálico":"#7A5230","Anisado":"#8AC44A","Aromático":"#6AB87A","Atalcado":"#D4B0C4","Avainillado":"#D4A830","Balsámico":"#8B7040","Cacao":"#6B3A2A","Café":"#5C3420","Canela":"#C46830","Caramelo":"#D48C30","Chipre":"#7A9E5C","Cuero":"#8B5C3A","Cálido especiado":"#C45A1A","Cítrico":"#E8C430","Dulce":"#E87AAA","Especiado":"#C44A1A","Especiado suave":"#D47A4A","Floral":"#E87AA0","Fresco":"#4AAEE0","Fresco especiado":"#5ABAC8","Gourmand":"#C47830","Herbal":"#5A9E4A","Iris":"#9A7AC4","Lavanda":"#8A70C4","Lirio":"#C4A0D4","Musgo":"#7A9E6A","Musgo de roble":"#5A7A4A","Oriental":"#C46A2A","Oud":"#6B3A1A","Pachulí":"#7A5A3A","Piña":"#D4C430","Pralinado":"#C48040","Resinoso":"#9A6A3A","Rosa":"#E890A8","Sándalo":"#C4A07A","Tabaco":"#8B6040","Terrosos":"#8B7050","Tropical":"#5AC470","Verde":"#5A9E3C","Ámbar":"#D4A020","Ámbar gris":"#B0A080"};

function getColor(nombre){var c=ACCOLORS[nombre];if(!c){var k=Object.keys(ACCOLORS).find(function(k){return nombre&&nombre.toLowerCase().indexOf(k.toLowerCase())>=0;});c=k?ACCOLORS[k]:"#c4965a";}return c||"#c4965a";}

function getProdId(){
  var sp=new URLSearchParams(location.search);
  if(sp.get('id'))return parseInt(sp.get('id'));
  var h=location.hash.replace('#','');
  var m=h.match(/(\d+)/);return m?parseInt(m[1]):null;
}

function calcP(p){
  var pm=p.precio_may_ars||0;
  var pe=p.precio_med_ars||0;
  var pi=p.precio_min_ars||pe||pm;
  var ml=p.precio_ml||0;
  var decan=pi>0?(Math.ceil(pi*0.1/1000)*1000+3000):0;
  return{pm:pm,pe:pe,pi:pi,decan:decan};
}

function renderCard(p,r){
  window._currentProd=p;
  var acordes=[];
  try{acordes=Array.isArray(p.acordes)?p.acordes:(p.acordes?JSON.parse(p.acordes):[]);}catch(e){}
  var nostock=(p.stock_actual||0)===0&&(p.reserva||0)===0;
  var br=p.empresa?p.empresa+" - ":"";
  var nombre=p.nombre.replace(br,"");
  var etiq=p.etiqueta||"";
  if(!etiq&&p.created_at){var dias=Math.floor((Date.now()-new Date(p.created_at).getTime())/864e5);if(dias<=7)etiq="NOVEDAD";}
  var etColors={"NOVEDAD":"#c4965a","OFERTA":"#4caf82","ULTIMAS UNIDADES":"#e05c5c","LANZAMIENTO":"#5b8dee","EXCLUSIVO":"#9b59b6"};

  // Acordes chart
  var maxPct=acordes.length?Math.max.apply(null,acordes.map(function(a){return a.pct||50;})):50;
  var acordesHtml=acordes.length?
    '<div class="acordes-section">'+
    '<div class="sec-title">Acordes principales</div>'+
    acordes.map(function(a){
      var c=getColor(a.nombre||a);var w=Math.round((a.pct||50)/maxPct*100);var tc=lum(c);
      return '<div class="acorde-row">'+
        '<div class="acorde-name">'+(a.nombre||a)+'</div>'+
        '<div class="acorde-bar-wrap">'+
          '<div class="acorde-bar" style="width:'+w+'%;background:'+c+'">'+
            '<span style="color:'+tc+'">'+w+'%</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('')+'</div>':
    '';

  var notasHtml=p.notas?
    '<div class="sec-title">Notas olfativas</div>'+
    '<div class="notas-text">'+p.notas+'</div>':'';

  var decanHtml=r.decan>0?
    '<div class="decan-row">'+
      '<div class="decan-label">🧪 Decan 5ml disponible</div>'+
      '<div class="decan-price">'+fmt(r.decan)+'</div>'+
    '</div>':'';

  var html=
    '<div class="card" id="shareCard">'+
      // BIG PHOTO
      '<div class="card-photo">'+
        (etiq?'<div class="etiq-badge" style="background:'+(etColors[etiq]||'#c4965a')+'">'+etiq+'</div>':'')+
        (p.imagen_url?'<img src="'+p.imagen_url+'" alt="'+p.nombre+'" crossorigin="anonymous">':'<div class="no-img">🌸</div>')+
      '</div>'+
      // INFO
      '<div class="card-info">'+
        (p.empresa?'<div class="brand">'+p.empresa+'</div>':'')+
        '<div class="prod-name">'+nombre+'</div>'+
        (p.genero?'<div class="genero">'+p.genero+'</div>':'')+
        // PRICES
        '<div class="prices">'+
          '<div class="pbox"><div class="plabel">10 o más</div><div class="pval">'+fmt(r.pm)+'</div></div>'+
          '<div class="pbox"><div class="plabel">3 o más</div><div class="pval">'+fmt(r.pe)+'</div></div>'+
          '<div class="pbox hi"><div class="plabel">1 unidad</div><div class="pval">'+fmt(r.pi)+'</div></div>'+
        '</div>'+
        decanHtml+
        notasHtml+
        acordesHtml+
      '</div>'+
      // DARK FOOTER
      '<div class="card-footer">'+
        '<div class="footer-brand">Distribuidora <span>Belle</span></div>'+
        '<span class="footer-stock '+(nostock?'footer-no':'footer-ok')+'">'+(nostock?'Sin stock':'En stock')+'</span>'+
      '</div>'+
    '</div>';

  document.getElementById('root').innerHTML=html;
  document.getElementById('actionsWrap').style.display='flex';
  document.title=p.nombre+' — Distribuidora Belle';
}

function copiarLink(){
  // Try native share first (mobile) - lets user pick any contact/app
  if(navigator.share){
    var p=window._currentProd||{};
    navigator.share({
      title:'Distribuidora Belle - '+(p.nombre||'Producto'),
      text:'Te comparto este perfume de Distribuidora Belle',
      url:location.href
    }).catch(function(){});
    return;
  }
  // Fallback: copy link
  navigator.clipboard.writeText(location.href).then(function(){
    var btn=document.querySelector('.btn-link');
    if(btn){btn.innerHTML='&#10003; ¡Copiado!';btn.style.color='#2e7d52';}
    setTimeout(function(){var btn2=document.querySelector('.btn-link');if(btn2){btn2.innerHTML='&#128279; Compartir link';btn2.style.color='';}},2000);
  }).catch(function(){prompt('Copiá este link:',location.href);});
}

function descargarImg(){
  var card=document.getElementById('shareCard');
  if(!card)return;
  var wrap=document.getElementById('actionsWrap');
  var btn=document.querySelector('.btn-img');
  if(btn){btn.innerHTML='⏳ Generando...';btn.disabled=true;}
  if(wrap)wrap.style.display='none';
  html2canvas(card,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#fff',logging:false}).then(function(canvas){
    if(wrap)wrap.style.display='flex';
    if(btn){btn.innerHTML='&#128247; Descargar imagen';btn.disabled=false;}
    var a=document.createElement('a');
    a.download='belle-producto.jpg';
    a.href=canvas.toDataURL('image/jpeg',0.93);
    a.click();
  }).catch(function(){
    if(wrap)wrap.style.display='flex';
    if(btn){btn.innerHTML='&#128247; Descargar imagen';btn.disabled=false;}
  });
}

window.addEventListener('DOMContentLoaded',function(){
  var id=getProdId();
  if(!id){
    document.getElementById('root').innerHTML='<div class="err"><div class="err-brand">Distribuidora Belle</div>Link de producto inválido</div>';
    return;
  }
  Promise.all([
    fetch(SB_URL+'/rest/v1/productos?id=eq.'+id+'&select=*',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();}),
    fetch(SB_URL+'/rest/v1/configuracion?select=clave,valor',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();}).catch(function(){return[];})
  ]).then(function(res){
    var prods=res[0];var config=Array.isArray(res[1])?res[1]:[];
    if(!Array.isArray(prods)||!prods.length){
      document.getElementById('root').innerHTML='<div class="err"><div class="err-brand">Distribuidora Belle</div>Producto no encontrado</div>';
      return;
    }
    var p=prods[0];var cotiz=1475;
    config.forEach(function(c){if(c.clave==='cotizacion_usd')cotiz=parseFloat(c.valor)||1475;});
    renderCard(p,calcP(p));
  }).catch(function(e){
    document.getElementById('root').innerHTML='<div class="err"><div class="err-brand">Distribuidora Belle</div>Error al cargar: '+e.message+'</div>';
  });
});
//]]>
</script>
</body>
</html>
