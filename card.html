<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Distribuidora Belle</title>
<meta property="og:title" id="ogTitle" content="Distribuidora Belle">
<meta property="og:description" id="ogDesc" content="Perfume disponible en Distribuidora Belle">
<meta property="og:image" id="ogImg" content="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:'Georgia',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
:root{--accent:#c4965a;--cream:#faf8f4;--border:#e8e3db;--charcoal:#1a1a1a;--mid:#666;--light:#999}

/* CARD */
.card-wrap{max-width:480px;width:100%;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.card-header{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);padding:1.2rem 1.4rem .9rem;display:flex;align-items:center;gap:.7rem}
.card-logo{font-family:'Georgia',serif;font-size:.72rem;color:#fff;letter-spacing:.12em;text-transform:uppercase;opacity:.7}
.card-logo span{color:var(--accent);opacity:1}
.card-img-wrap{width:90px;height:90px;border-radius:10px;overflow:hidden;background:#fff;flex-shrink:0;border:2px solid rgba(196,150,90,.3)}
.card-img-wrap img{width:100%;height:100%;object-fit:contain}
.card-img-wrap .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#ddd}
.card-info{flex:1;min-width:0}
.card-brand{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem}
.card-name{font-size:.95rem;font-weight:600;color:#fff;line-height:1.3}
.card-genero{font-size:.65rem;color:#aaa;margin-top:.2rem}
.card-body{padding:1rem 1.2rem}
.card-badge{display:inline-block;background:var(--accent);color:#fff;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.12rem .5rem;border-radius:20px;margin-bottom:.6rem;font-weight:700}

/* PRICES */
.prices{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.8rem}
.price-box{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:.55rem .4rem;text-align:center}
.price-box.highlight{background:linear-gradient(135deg,#fdf5ea,#f5e8d0);border-color:var(--accent)}
.price-label{font-size:.55rem;color:var(--light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.price-val{font-size:.95rem;font-weight:700;color:var(--charcoal)}
.price-val small{font-size:.65rem;font-weight:400}

/* DECAN */
.decan-row{display:flex;align-items:center;gap:.5rem;background:#fdf5ea;border:1px solid #ead9a8;border-radius:8px;padding:.45rem .7rem;margin-bottom:.8rem}
.decan-icon{font-size:.9rem}
.decan-text{font-size:.72rem;color:#7a5a20;font-weight:600}
.decan-price{margin-left:auto;font-size:.82rem;font-weight:700;color:var(--accent)}

/* NOTAS */
.section-title{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--light);margin-bottom:.45rem;font-weight:600}
.notas-text{font-size:.74rem;color:var(--mid);line-height:1.5;margin-bottom:.8rem}

/* ACORDES */
.acordes-wrap{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.9rem}
.acorde-chip{border-radius:20px;padding:.22rem .55rem;font-size:.65rem;font-weight:600;letter-spacing:.03em}

/* FOOTER */
.card-footer{background:#f5f0e8;border-top:1px solid var(--border);padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.footer-belle{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light)}
.footer-belle span{color:var(--accent);font-weight:700}
.stock-badge{font-size:.6rem;font-weight:600;padding:.18rem .5rem;border-radius:20px}
.stock-ok{background:rgba(76,175,130,.12);color:#2e7d52;border:1px solid rgba(76,175,130,.3)}
.stock-no{background:rgba(220,80,80,.08);color:#c0392b;border:1px solid rgba(220,80,80,.2)}

/* ACTIONS */
.actions{padding:.8rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap}
.btn-wa{flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;background:#25D366;color:#fff;border:none;border-radius:8px;padding:.55rem;font-size:.75rem;font-weight:600;cursor:pointer;text-decoration:none}
.btn-copy{flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;background:var(--cream);color:var(--charcoal);border:1px solid var(--border);border-radius:8px;padding:.55rem;font-size:.75rem;font-weight:600;cursor:pointer}
.btn-img{flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;background:var(--charcoal);color:#fff;border:none;border-radius:8px;padding:.55rem;font-size:.75rem;font-weight:600;cursor:pointer}
.loading{padding:3rem;text-align:center;color:var(--mid)}
.spin{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.8rem}
@keyframes spin{to{transform:rotate(360deg)}}
.err{padding:2rem;text-align:center;color:#c0392b;font-size:.85rem}
</style>
</head>
<body>
<div id="root">
  <div class="loading"><div class="spin"></div><br>Cargando...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
//<![CDATA[
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";
var WA_NUMBER="5493515121193";

function fmt(n){return n?("$"+Math.round(n).toLocaleString("es-AR")):"—";}
function lumText(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>140?"#111":"#fff";}

var ACORDES_COLORS={
  "Acuático":"#3A9CC4","Afrutados":"#E8703A","Afrutados rojos":"#D4354A","Ahumado":"#6B6B6B",
  "Almendrado":"#C4945A","Almizclado":"#B09A8A","Amaderado":"#8B5E3C","Animálico":"#7A5230",
  "Anisado":"#8AC44A","Aromático":"#6AB87A","Atalcado":"#D4B0C4","Avainillado":"#D4A830",
  "Balsámico":"#8B7040","Cacao":"#6B3A2A","Café":"#5C3420","Canela":"#C46830","Caramelo":"#D48C30",
  "Chipre":"#7A9E5C","Cuero":"#8B5C3A","Cálido especiado":"#C45A1A","Cítrico":"#E8C430",
  "Dulce":"#E87AAA","Especiado":"#C44A1A","Especiado suave":"#D47A4A","Floral":"#E87AA0",
  "Fresco":"#4AAEE0","Fresco especiado":"#5ABAC8","Gourmand":"#C47830","Herbal":"#5A9E4A",
  "Iris":"#9A7AC4","Lavanda":"#8A70C4","Lirio":"#C4A0D4","Musgo":"#7A9E6A","Musgo de roble":"#5A7A4A",
  "Oriental":"#C46A2A","Oud":"#6B3A1A","Pachulí":"#7A5A3A","Piña":"#D4C430","Pralinado":"#C48040",
  "Resinoso":"#9A6A3A","Rosa":"#E890A8","Sándalo":"#C4A07A","Tabaco":"#8B6040","Terrosos":"#8B7050",
  "Tropical":"#5AC470","Verde":"#5A9E3C","Ámbar":"#D4A020","Ámbar gris":"#B0A080"
};

function getAcordeColor(nombre){
  var c=ACORDES_COLORS[nombre];
  if(!c){var k=Object.keys(ACORDES_COLORS).find(function(k){return nombre&&nombre.toLowerCase().indexOf(k.toLowerCase())>=0;});c=k?ACORDES_COLORS[k]:"#888";}
  return c||"#888";
}

function getProdId(){
  // Check query param ?id=123
  var sp=new URLSearchParams(location.search);
  if(sp.get('id')) return parseInt(sp.get('id'));
  // Check hash #123 or #producto/123
  var hash=location.hash.replace('#','');
  var m=hash.match(/(\d+)/);
  return m?parseInt(m[1]):null;
}

function calcP(p,cotiz){
  cotiz=cotiz||1;
  var ct=(p.costo_ind||0)+(p.costo_log||0);
  var gm=p.gan_usd_may||0,ge=p.gan_usd_med||0;
  var pm=ct>0||gm>0?Math.round((ct+gm)*cotiz/100)*100:(p.precio_may_ars||0);
  var pe=ct>0||ge>0?Math.round((ct+gm+ge)*cotiz/100)*100:(p.precio_med_ars||0);
  var ml=p.precio_ml||0;
  var pi=ml>0?Math.round((ml+pe)/2/100)*100:(p.precio_min_ars||pe);
  var decan=pi>0?(Math.ceil(pi*0.1/1000)*1000+3000):0;
  return{pm:pm,pe:pe,pi:pi,decan:decan};
}

function renderCard(p,r){
  var root=document.getElementById("root");
  var br=p.empresa?p.empresa+" - ":"";
  var nombre=p.nombre.replace(br,"");
  var acordes=[];
  try{acordes=Array.isArray(p.acordes)?p.acordes:(p.acordes?JSON.parse(p.acordes):[]);}catch(e){}
  var nostock=(p.stock_actual||0)===0&&(p.reserva||0)===0;

  var etiq=p.etiqueta||"";
  if(!etiq&&p.created_at){var dias=Math.floor((Date.now()-new Date(p.created_at).getTime())/864e5);if(dias<=7)etiq="NOVEDAD";}

  var acordesHtml=acordes.length?
    '<div class="section-title">Acordes</div><div class="acordes-wrap">'+
    acordes.map(function(a){
      var c=getAcordeColor(a.nombre||a);var tc=lumText(c);
      return '<span class="acorde-chip" style="background:'+c+';color:'+tc+'">'+( a.nombre||a)+'</span>';
    }).join("")+"</div>":"";

  var notasHtml=p.notas?
    '<div class="section-title">Notas olfativas</div><div class="notas-text">'+p.notas+'</div>':"";

  var decanHtml=r.decan>0?
    '<div class="decan-row"><span class="decan-icon">🧪</span>'+
    '<span class="decan-text">Decan 5ml disponible</span>'+
    '<span class="decan-price">'+fmt(r.decan)+'</span></div>':"";

  var html=
    '<div class="card-wrap" id="shareCard">'+
      '<div class="card-header">'+
        '<div class="card-img-wrap">'+(p.imagen_url?'<img src="'+p.imagen_url+'" alt="">':'<div class="no-img">🌸</div>')+'</div>'+
        '<div class="card-info">'+
          (p.empresa?'<div class="card-brand">'+p.empresa+'</div>':'')+
          '<div class="card-name">'+nombre+'</div>'+
          (p.genero?'<div class="card-genero">'+p.genero+'</div>':'')+
        '</div>'+
        '<div style="text-align:right"><div class="card-logo">Distribuidora<br><span>Belle</span></div></div>'+
      '</div>'+
      '<div class="card-body">'+
        (etiq?'<div class="card-badge">'+etiq+'</div>':'')+
        '<div class="prices">'+
          '<div class="price-box"><div class="price-label">10 o más</div><div class="price-val">'+fmt(r.pm)+'</div></div>'+
          '<div class="price-box"><div class="price-label">3 o más</div><div class="price-val">'+fmt(r.pe)+'</div></div>'+
          '<div class="price-box highlight"><div class="price-label">1 unidad</div><div class="price-val">'+fmt(r.pi)+'</div></div>'+
        '</div>'+
        decanHtml+
        notasHtml+
        acordesHtml+
      '</div>'+
      '<div class="card-footer">'+
        '<div class="footer-belle">Distribuidora <span>Belle</span></div>'+
        '<span class="stock-badge '+(nostock?"stock-no":"stock-ok")+'">'+(nostock?"Sin stock":"En stock")+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="actions">'+
      '<button class="btn-wa" onclick="compartirWA()">📲 Enviar por WhatsApp</button>'+
      '<button class="btn-copy" onclick="copiarLink()">🔗 Copiar link</button>'+
      '<button class="btn-img" onclick="descargarImagen()">📸 Descargar imagen</button>'+
    '</div>';

  root.innerHTML=html;

  document.title=p.nombre+" — Distribuidora Belle";
}

function compartirWA(){
  var id=getProdId();
  var link=location.href;
  var msg="🌸 *Distribuidora Belle*\n\nTe comparto este producto:\n"+link+"\n\n¡Consultanos por disponibilidad!";
  window.open("https://wa.me/"+WA_NUMBER+"?text="+encodeURIComponent(msg),"_blank");
}

function copiarLink(){
  navigator.clipboard.writeText(location.href).then(function(){
    var btn=document.querySelector(".btn-copy");
    var orig=btn.innerHTML;
    btn.innerHTML="✅ ¡Copiado!";
    btn.style.color="green";
    setTimeout(function(){btn.innerHTML=orig;btn.style.color="";},2000);
  });
}

function descargarImagen(){
  var card=document.getElementById("shareCard");
  if(!card||typeof html2canvas==="undefined"){alert("Error generando imagen");return;}
  var btn=document.querySelector(".btn-img");
  btn.innerHTML="⏳ Generando...";btn.disabled=true;
  html2canvas(card,{scale:2,useCORS:true,backgroundColor:"#fff",logging:false}).then(function(canvas){
    var link2=document.createElement("a");
    link2.download="belle-producto.jpg";
    link2.href=canvas.toDataURL("image/jpeg",0.95);
    link2.click();
    btn.innerHTML="📸 Descargar imagen";btn.disabled=false;
  }).catch(function(){btn.innerHTML="📸 Descargar imagen";btn.disabled=false;});
}

// Load product
window.addEventListener("DOMContentLoaded",function(){
  var id=getProdId();
  if(!id){document.getElementById("root").innerHTML='<div class="err">❌ Producto no encontrado. Verificá el link.</div>';return;}

  // Load cotizacion and product in parallel
  Promise.all([
    fetch(SB_URL+"/rest/v1/productos?id=eq."+id+"&select=*",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}}).then(function(r){return r.json();}),
    fetch(SB_URL+"/rest/v1/configuracion?select=clave,valor",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}}).then(function(r){return r.json();}).catch(function(){return[];})
  ]).then(function(res){
    var prods=res[0]; var config=Array.isArray(res[1])?res[1]:[];
    if(!Array.isArray(prods)||!prods.length){
      document.getElementById("root").innerHTML='<div class="err">❌ Producto no encontrado.</div>';return;
    }
    var p=prods[0];
    var cotiz=1;
    config.forEach(function(c){if(c.clave==="cotizacion")cotiz=parseFloat(c.valor)||1;});
    var r=calcP(p,cotiz);
    renderCard(p,r);
  }).catch(function(e){
    document.getElementById("root").innerHTML='<div class="err">❌ Error cargando producto.<br><small>'+e.message+'</small></div>';
  });
});
//]]>
</script>
</body>
</html>
