<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test Fichas</title></head>
<body style="font-family:monospace;padding:1rem;background:#111;color:#eee">
<h3>Test conexión Supabase — Productos</h3>
<div id="out">Cargando...</div>
<script>
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function test(label, url) {
  return fetch(url, {
    headers: {"apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY}
  }).then(function(r) {
    return r.json().then(function(data) {
      return {label: label, status: r.status, count: Array.isArray(data) ? data.length : "no-array", data: data};
    });
  }).catch(function(e) {
    return {label: label, error: e.message};
  });
}

Promise.all([
  test("productos SIN filtro", SB_URL+"/rest/v1/productos?select=id,nombre,empresa&order=id&limit=5"),
  test("productos activo=eq.true", SB_URL+"/rest/v1/productos?select=id,nombre&activo=eq.true&limit=5"),
  test("productos activo=is.true", SB_URL+"/rest/v1/productos?select=id,nombre&activo=is.true&limit=5"),
  test("fichas_perfume", SB_URL+"/rest/v1/fichas_perfume?select=id,producto_id&limit=5"),
]).then(function(results) {
  var html = "";
  results.forEach(function(r) {
    html += "<div style='margin:.8rem 0;padding:.6rem;background:#222;border-radius:6px;border-left:3px solid "+(r.error?"#f44":"#4a4")+"'>";
    html += "<b style='color:#aef'>" + r.label + "</b><br>";
    if(r.error) {
      html += "<span style='color:#f88'>ERROR: " + r.error + "</span>";
    } else {
      html += "Status: " + r.status + " | Resultados: <b style='color:#8f8'>" + r.count + "</b><br>";
      html += "<pre style='font-size:.7rem;color:#ccc;white-space:pre-wrap'>" + JSON.stringify(r.data, null, 2).substring(0, 400) + "</pre>";
    }
    html += "</div>";
  });
  document.getElementById("out").innerHTML = html;
});
</script>
</body>
</html>
