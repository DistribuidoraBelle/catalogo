<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Integral Belle</title>
<style>
*{box-sizing:border-box}
body{font-family:monospace;padding:16px;background:#0f1117;color:#eee;font-size:12px;margin:0}
h2{color:#e8b86d;margin:0 0 12px;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px;margin-bottom:10px}
.card{background:#181c27;border:1px solid #2a3045;border-radius:8px;padding:10px}
.card h3{margin:0 0 7px;font-size:12px;color:#e8b86d;text-transform:uppercase;letter-spacing:.05em}
.row{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid #1a1f2e}
.row:last-child{border:none}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;flex-shrink:0;font-weight:700}
.ok{background:#052e16;color:#4ade80}.err{background:#2d1218;color:#f87171}
.warn{background:#27200a;color:#fbbf24}.info{background:#0c1a2e;color:#60a5fa}
.detail{color:#555;font-size:10px;margin-left:auto}
pre{background:#252a3a;padding:5px;border-radius:3px;font-size:10px;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;margin:3px 0}
button{background:#e8b86d;color:#0f1117;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;margin-right:6px}
button:disabled{opacity:.5;cursor:not-allowed}
#summary{background:#181c27;border:1px solid #2a3045;border-radius:8px;padding:10px;margin-bottom:10px}
.bar{height:3px;background:#252a3a;border-radius:2px;margin-bottom:10px}
.bar-fill{height:100%;background:#e8b86d;border-radius:2px;transition:width .3s;width:0}
</style>
</head>
<body>
<h2>🔍 Test Integral Belle</h2>
<div style="margin-bottom:10px">
  <button onclick="run(false)" id="btnAll">▶ Ejecutar todo</button>
  <button onclick="run(true)"  id="btnErr">⚡ Solo errores</button>
</div>
<div class="bar"><div class="bar-fill" id="bar"></div></div>
<div id="summary">Presioná Ejecutar...</div>
<div class="grid" id="grid"></div>

<script>
let SB={url:'',key:''}, onlyErr=false;
const $ = id => document.getElementById(id);
const pct = p => $('bar').style.width=p+'%';

// ── UI helpers ───────────────────────────────────────────────────
function mkCard(id,title){
  const d=document.createElement('div');
  d.className='card'; d.id='c-'+id;
  d.innerHTML=`<h3>${title}</h3><div id="r-${id}"></div>`;
  $('grid').appendChild(d);
  return id;
}
function addRow(cid,status,label,detail=''){
  if(onlyErr&&status==='ok') return;
  const d=$('r-'+cid); if(!d) return;
  const row=document.createElement('div');
  row.className='row';
  row.innerHTML=`<span class="tag ${status}">${status.toUpperCase()}</span><span>${label}</span>${detail?`<span class="detail">${detail}</span>`:''}`;
  d.appendChild(row);
}
const R = {
  ok:   (c,l,d)=>addRow(c,'ok',l,d),
  err:  (c,l,d)=>addRow(c,'err',l,d),
  warn: (c,l,d)=>addRow(c,'warn',l,d),
  info: (c,l,d)=>addRow(c,'info',l,d),
};

// ── Helpers de análisis ──────────────────────────────────────────
const getJS = html => html.slice(html.indexOf('//<![CDATA[')+11, html.indexOf('//]]>'));

function getFns(js){
  const s=new Set(), re=/function\s+(\w+)\s*\(/g; let m;
  while((m=re.exec(js))!==null) s.add(m[1]);
  return s;
}

function getOnclickFns(html){
  const s=new Set(), re=/onclick=['"]([^'"]+)['"]/g; let m;
  while((m=re.exec(html))!==null){
    const f=m[1].match(/^(\w+)\s*\(/);
    if(f) s.add(f[1]);
  }
  return s;
}

// ── Test: funciones de onclick existen ──────────────────────────
function testRefs(cid,html,js,label){
  const defined=getFns(js), called=getOnclickFns(html);
  const SKIP=new Set(['if','return','void','true','false','setTimeout','clearTimeout',
    'clearInterval','setInterval','encodeURIComponent','decodeURIComponent',
    'parseInt','parseFloat','isNaN','Object','Array','Math','JSON','String',
    'Boolean','Number','fetch','Promise','console','alert','confirm','prompt',
    'window','document','location','navigator','localStorage','sessionStorage']);
  const missing=[...called].filter(f=>!defined.has(f)&&!SKIP.has(f));
  if(missing.length) missing.forEach(f=>R.warn(cid,`${label}: onclick llama '${f}' no definida`));
  else R.ok(cid,`${label}: ${called.size} onclicks — todas definidas`);
  return missing.length===0;
}

// ── Test: bugs reales en onclicks ────────────────────────────────
function testOnclickBugs(cid,html,label){
  let bugs=0;
  // Bug 1: '+var+' con comillas simples dentro de onclick='' (corta el atributo HTML)
  const re1=/onclick='[^']*'\+[\w.[\]]+\+'[^']*'/g;
  let m;
  while((m=re1.exec(html))!==null){
    R.err(cid,`${label}: bug comilla simple en variable`,m[0].slice(0,70)); bugs++;
  }
  // Bug 2: %22 no decodificado (literal en onclick)
  const re2=/onclick='[^']*%22[^']*'/g;
  while((m=re2.exec(html))!==null){
    R.err(cid,`${label}: %22 sin decodificar en onclick`,m[0].slice(0,70)); bugs++;
  }
  // Bug 3: comillas dobles dentro de onclick='' sin escapar
  const re3=/onclick='[^']*"[^']*[,(][^']*"[^']*'/g;
  while((m=re3.exec(html))!==null){
    // Solo si tiene variables JS (no es solo un string estático)
    if(/\+\w/.test(m[0])){
      R.warn(cid,`${label}: mezcla de comillas en onclick`,m[0].slice(0,70)); 
    }
  }
  if(!bugs) R.ok(cid,`${label}: sin bugs de comillas en onclicks`);
  return bugs===0;
}

// ── Test: funciones críticas presentes ──────────────────────────
function testCritFns(cid,js,label,fns){
  const defined=getFns(js);
  const missing=fns.filter(f=>!defined.has(f));
  if(missing.length) missing.forEach(f=>R.err(cid,`${label}: falta función '${f}'`));
  else R.ok(cid,`${label}: ${fns.length} funciones críticas presentes`);
  return missing.length===0;
}

// ── Test: Supabase conectividad ──────────────────────────────────
async function testSB(cid){
  const h={'apikey':SB.key,'Authorization':'Bearer '+SB.key};
  try{
    const r=await fetch(SB.url+'/rest/v1/configuracion?select=clave&limit=1',{headers:h});
    const d=await r.json();
    if(Array.isArray(d)){ R.ok(cid,'Supabase: conexión OK'); return true; }
    else{ R.err(cid,'Supabase: respuesta inesperada',JSON.stringify(d).slice(0,60)); return false; }
  }catch(e){ R.err(cid,'Supabase: '+e.message); return false; }
}

async function testTablas(cid){
  const h={'apikey':SB.key,'Authorization':'Bearer '+SB.key};
  const tablas=['productos','ventas','gastos_vendedor','rendiciones',
    'historial_periodos','configuracion','pedidos_catalogo','movimientos_stock'];
  let ok=0;
  for(const t of tablas){
    try{
      const r=await fetch(SB.url+'/rest/v1/'+t+'?select=id&limit=1',{headers:h});
      const d=await r.json();
      if(Array.isArray(d)){ ok++; R.ok(cid,'Tabla: '+t, d.length?'con datos':'vacía'); }
      else R.err(cid,'Tabla: '+t,JSON.stringify(d).slice(0,60));
    }catch(e){ R.err(cid,'Tabla: '+t,e.message); }
  }
  return ok===tablas.length;
}

// ── Test: cargar panel en iframe y probar funciones ──────────────
async function testIframe(cid,path,fnTests){
  const iframe=document.createElement('iframe');
  iframe.style.cssText='width:1px;height:1px;position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(iframe);
  const iErrors=[];
  await new Promise(res=>{ iframe.onload=res; iframe.src=path+'?t='+Date.now(); });
  await new Promise(r=>setTimeout(r,1200));
  try{
    const iw=iframe.contentWindow;
    iw.onerror=(msg,src,line)=>{ iErrors.push(msg.slice(0,60)+' L'+line); return true; };
    for(const {fn,waitMs,check} of fnTests){
      if(typeof iw[fn]!=='function'){ R.err(cid,fn+'() — no existe'); continue; }
      try{
        iw[fn]();
        if(waitMs) await new Promise(r=>setTimeout(r,waitMs));
        if(check){
          const res=check(iw);
          if(res===true) R.ok(cid,fn+'()');
          else if(res===false) R.err(cid,fn+'() — falló','revisa consola');
          else R.warn(cid,fn+'()',res);
        } else R.ok(cid,fn+'()');
      }catch(e){ R.err(cid,fn+'()',e.message.slice(0,50)); }
    }
    if(iErrors.length) iErrors.forEach(e=>R.err(cid,'JS error en página',e));
    else if(!onlyErr) R.ok(cid,'Sin errores JS en página');
  }catch(e){ R.warn(cid,'iframe: '+e.message.slice(0,50)); }
  document.body.removeChild(iframe);
}

// ── MAIN ─────────────────────────────────────────────────────────
async function run(errOnly=false){
  onlyErr=errOnly;
  $('grid').innerHTML='';
  $('btnAll').disabled=$('btnErr').disabled=true;
  $('summary').textContent='Ejecutando...';
  pct(3);
  const t0=Date.now();

  // Cargar archivos
  const cFiles=mkCard('files','📂 Archivos');
  let belleH, vendH, marcH;
  try{
    [belleH,vendH,marcH]=await Promise.all([
      fetch('/belle.html',{cache:'no-store'}).then(r=>r.text()),
      fetch('/ventas.html',{cache:'no-store'}).then(r=>r.text()),
      fetch('/marcela.html',{cache:'no-store'}).then(r=>r.text()),
    ]);
    R.ok(cFiles,'belle.html',(belleH.length/1024|0)+'KB');
    R.ok(cFiles,'ventas.html',(vendH.length/1024|0)+'KB');
    R.ok(cFiles,'marcela.html',(marcH.length/1024|0)+'KB');
  }catch(e){ R.err(cFiles,'Error cargando',e.message); $('btnAll').disabled=$('btnErr').disabled=false; return; }
  pct(15);

  const belleJS=getJS(belleH), vendJS=getJS(vendH), marcJS=getJS(marcH);
  SB.url=belleJS.match(/var SB_URL\s*=\s*['"]([^'"]+)['"]/)?.[1]||'';
  SB.key=belleJS.match(/var SB_KEY\s*=\s*['"]([^'"]+)['"]/)?.[1]||'';
  R.ok(cFiles,'Supabase config extraída',SB.url.replace('https://','').slice(0,30));

  // Funciones críticas
  const cFns=mkCard('fns','🔧 Funciones críticas');
  testCritFns(cFns,belleJS,'Admin',['loadPeriodos','renderPeriodosPage','loadResumenPeriodoActual',
    'adminEditGastoModal','_geGuardar','_recargarGastosAdmin','loadVendedores',
    'loadRendicion','loadDashboard','adminCerrarPeriodoModal','adminEjecutarCierrePeriodo',
    'setupAutoClose','perPausar','perReanudar','perFiltrar','loadPeriodoDetalle']);
  testCritFns(cFns,vendJS,'Vendedor',['loadProds','loadHistorial','loadGastos',
    'loadDineroData','executeVenta','openDrawer','loadRendicion','navTo']);
  testCritFns(cFns,marcJS,'Marcela',['loadProds','loadDepositoMarcela','loadGastos',
    'loadRendicion','navTo','loadDashboardVendedor']);
  pct(30);

  // Referencias onclick
  const cRef=mkCard('refs','🔗 Referencias onclick');
  testRefs(cRef,belleH,belleJS,'Admin');
  testRefs(cRef,vendH,vendJS,'Vendedor');
  testRefs(cRef,marcH,marcJS,'Marcela');
  pct(40);

  // Bugs de comillas en onclicks
  const cBugs=mkCard('bugs','🐛 Bugs onclick (comillas)');
  testOnclickBugs(cBugs,belleH,'Admin');
  testOnclickBugs(cBugs,vendH,'Vendedor');
  testOnclickBugs(cBugs,marcH,'Marcela');
  pct(50);

  // Supabase
  const cSB=mkCard('sb','🗄️ Supabase');
  await testSB(cSB);
  await testTablas(cSB);
  pct(60);

  // Admin en iframe
  const cAdmin=mkCard('admin','👤 Admin (iframe)');
  R.info(cAdmin,'Cargando belle.html...');
  await testIframe(cAdmin,'/belle.html',[
    {fn:'loadPeriodos', waitMs:3000, check:iw=>{
      const c=iw.document.getElementById('periodosContainer');
      if(!c) return 'periodosContainer no existe';
      if(c.innerHTML.includes('Cargando')) return 'sigue en spinner';
      return c.innerHTML.length>200;
    }},
    {fn:'loadVendedores', waitMs:2000, check:iw=>{
      const c=iw.document.getElementById('page-vendedores');
      return c&&c.innerHTML.length>100;
    }},
    {fn:'loadRendicion', waitMs:1500, check:()=>true},
    {fn:'loadDashboard', waitMs:1500, check:()=>true},
    {fn:'loadMovimientos',waitMs:1000, check:()=>true},
  ]);
  pct(75);

  // Vendedor en iframe
  const cVend=mkCard('vend','🛒 Vendedor (iframe)');
  R.info(cVend,'Cargando ventas.html...');
  await testIframe(cVend,'/ventas.html',[
    {fn:'loadProds',    waitMs:2000, check:iw=>typeof iw.loadProds==='function'},
    {fn:'loadHistorial',waitMs:1500, check:()=>true},
    {fn:'loadGastos',   waitMs:1000, check:()=>true},
    {fn:'loadDineroData',waitMs:1000,check:()=>true},
    {fn:'loadReservas', waitMs:1000, check:()=>true},
  ]);
  pct(88);

  // Marcela en iframe
  const cMarc=mkCard('marc','💜 Marcela (iframe)');
  R.info(cMarc,'Cargando marcela.html...');
  await testIframe(cMarc,'/marcela.html',[
    {fn:'loadProds',          waitMs:2000, check:()=>true},
    {fn:'loadDepositoMarcela',waitMs:1500, check:()=>true},
    {fn:'loadGastos',         waitMs:1000, check:()=>true},
    {fn:'loadRendicion',      waitMs:1000, check:()=>true},
  ]);
  pct(100);

  // Resumen
  const allOk=document.querySelectorAll('.tag.ok').length;
  const allErr=document.querySelectorAll('.tag.err').length;
  const allWarn=document.querySelectorAll('.tag.warn').length;
  const elapsed=((Date.now()-t0)/1000).toFixed(1);
  $('summary').innerHTML=`
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
      <span><strong style="color:#4ade80;font-size:16px">${allOk}</strong> <span style="color:#555">✓ OK</span></span>
      <span><strong style="color:#f87171;font-size:16px">${allErr}</strong> <span style="color:#555">✗ Errores</span></span>
      <span><strong style="color:#fbbf24;font-size:16px">${allWarn}</strong> <span style="color:#555">⚠ Warnings</span></span>
      <span style="color:#555">${elapsed}s</span>
      <strong style="${allErr?'color:#f87171':'color:#4ade80'}">${allErr?'⛔ Hay errores':'✅ Todo OK'}</strong>
    </div>`;
  $('btnAll').disabled=$('btnErr').disabled=false;
}
</script>
</body>
</html>
