<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comparador de Perfumes — Belle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --gold:#c4965a;--dark:#1a1209;--cream:#fdf8f0;
  --text:#2a1f0f;--text2:#6b5a3e;--text3:#9a8060;
  --border:rgba(196,150,90,.18);
  --c1:#e91e8c;--c2:#2196f3;--c3:#4caf50;--c4:#ff9800;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Jost',sans-serif;color:var(--text);}
.toolbar{background:var(--dark);padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.tb-brand{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:1rem;font-weight:600;flex:1;}
.tb-btn{background:transparent;border:1px solid rgba(196,150,90,.4);color:var(--gold);padding:.3rem .7rem;border-radius:20px;cursor:pointer;font-size:.72rem;font-family:'Jost',sans-serif;transition:all .2s;}
.tb-btn:hover,.tb-btn.primary{background:var(--gold);color:var(--dark);font-weight:600;}
.tb-btn:disabled{opacity:.4;cursor:not-allowed;}

/* SELECTOR */
.selector-area{max-width:900px;margin:1.5rem auto;padding:0 1rem;}
.selector-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--dark);margin-bottom:.3rem;}
.selector-sub{font-size:.78rem;color:var(--text3);margin-bottom:1.2rem;}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1rem;}
.slot{background:#fff;border:2px dashed var(--border);border-radius:14px;padding:.8rem;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;transition:border-color .2s;position:relative;}
.slot.filled{border-style:solid;border-color:var(--gold);}
.slot-num{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
.slot-name{font-size:.7rem;font-weight:600;color:var(--text);text-align:center;line-height:1.3;}
.slot-marca{font-size:.6rem;color:var(--text3);}
.slot-remove{position:absolute;top:.3rem;right:.3rem;background:none;border:none;color:#ccc;cursor:pointer;font-size:.8rem;line-height:1;}
.slot-remove:hover{color:red;}
.slot-add{font-size:1.4rem;color:var(--border);}
.search-wrap{position:relative;margin-bottom:1.2rem;}
.search-input{width:100%;padding:.65rem 1rem .65rem 2.4rem;border:1px solid var(--border);border-radius:10px;font-size:.85rem;font-family:'Jost',sans-serif;background:#fff;outline:none;color:var(--text);}
.search-input:focus{border-color:var(--gold);}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text3);}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.search-item{padding:.55rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;font-size:.78rem;border-bottom:1px solid rgba(0,0,0,.04);}
.search-item:hover{background:rgba(196,150,90,.06);}
.search-item-img{width:28px;height:28px;object-fit:contain;border-radius:4px;}
.search-item-info{flex:1;}
.search-item-name{font-weight:500;color:var(--text);}
.search-item-marca{font-size:.65rem;color:var(--text3);}
.btn-comparar{width:100%;padding:.75rem;background:var(--gold);color:var(--dark);border:none;border-radius:10px;font-size:.88rem;font-weight:600;font-family:'Jost',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:.5rem;}
.btn-comparar:hover{background:#b8853e;}
.btn-comparar:disabled{opacity:.4;cursor:not-allowed;}

/* RESULTADO */
#resultado{max-width:960px;margin:0 auto 3rem;padding:0 1rem;display:none;}
.comp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem;}
.comp-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--dark);}
.export-btns{display:flex;gap:.4rem;}

/* TABLA COMPARATIVA */
.comp-table{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.06);margin-bottom:1.2rem;}
.comp-table table{width:100%;border-collapse:collapse;}
.comp-table th{padding:.8rem .7rem;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;background:var(--dark);color:rgba(255,255,255,.7);text-align:left;}
.comp-table th.perf-th{color:#fff;font-size:.72rem;}
.comp-table td{padding:.65rem .7rem;font-size:.75rem;color:var(--text2);border-bottom:1px solid rgba(0,0,0,.04);vertical-align:top;}
.comp-table tr:last-child td{border-bottom:none;}
.comp-table tr:nth-child(even){background:rgba(196,150,90,.02);}
.field-label{font-weight:600;color:var(--text3);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.perf-header-cell{text-align:center;padding:.8rem .5rem!important;}
.perf-img-mini{width:38px;height:38px;object-fit:contain;border-radius:6px;margin-bottom:.2rem;}
.perf-name-mini{font-size:.65rem;font-weight:600;line-height:1.2;color:#fff;}
.perf-marca-mini{font-size:.55rem;color:rgba(255,255,255,.5);margin-top:.1rem;}
.color-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:.3rem;vertical-align:middle;border:1px solid rgba(0,0,0,.1);}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
.chart-card{background:#fff;border-radius:14px;padding:1.2rem;box-shadow:0 2px 16px rgba(0,0,0,.05);}
.chart-title{font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem;}
.chart-wrap{position:relative;height:200px;}

/* RADAR */
.radar-wrap{background:#fff;border-radius:14px;padding:1.2rem;box-shadow:0 2px 16px rgba(0,0,0,.05);margin-bottom:1.2rem;}
.radar-chart-wrap{position:relative;height:280px;max-width:400px;margin:0 auto;}

/* TAGS COMPARACION */
.tags-comp{display:flex;gap:.3rem;flex-wrap:wrap;}
.tag-comp{padding:.12rem .4rem;border-radius:4px;font-size:.65rem;font-weight:500;}

/* LOADING */
.loading-comp{text-align:center;padding:2rem;color:var(--text3);}
.spin{width:30px;height:30px;border:3px solid rgba(196,150,90,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .5rem;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .slots{grid-template-columns:1fr 1fr;}
  .charts-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-brand">⚜ Comparador Belle</div>
  <button class="tb-btn" onclick="history.back()">← Volver</button>
  <button class="tb-btn" id="btnExportJPG" onclick="exportarJPG()" style="display:none">🖼 JPG</button>
  <button class="tb-btn primary" id="btnExportPDF" onclick="exportarPDF()" style="display:none">📄 PDF</button>
</div>

<div class="selector-area">
  <div class="selector-title">Comparador de Perfumes</div>
  <div class="selector-sub">Seleccioná hasta 4 perfumes para comparar sus características</div>
  
  <div class="slots" id="slotsWrap">
    <div class="slot" id="slot0"><div class="slot-num">Perfume 1</div><div class="slot-add">+</div></div>
    <div class="slot" id="slot1"><div class="slot-num">Perfume 2</div><div class="slot-add">+</div></div>
    <div class="slot" id="slot2"><div class="slot-num">Perfume 3</div><div class="slot-add">+</div></div>
    <div class="slot" id="slot3"><div class="slot-num">Perfume 4</div><div class="slot-add">+</div></div>
  </div>
  
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Buscá un perfume para agregar..." oninput="onSearch(this.value)" autocomplete="off">
    <div class="search-results" id="searchResults" style="display:none"></div>
  </div>
  
  <button class="btn-comparar" id="btnComparar" disabled onclick="comparar()">Comparar →</button>
</div>

<div id="resultado"></div>

<script>
//<![CDATA[
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function apiGet(tabla,filtros){
  return fetch(SB_URL+"/rest/v1/"+tabla+(filtros?"?"+filtros:""),{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Accept":"application/json"}
  }).then(function(r){return r.json();});
}

var seleccionados=[null,null,null,null];
var allProds=[];
var allFichas=[];
var charts=[];
var COLORS=['--c1','--c2','--c3','--c4'];
var COLORS_HEX=['#e91e8c','#2196f3','#4caf50','#ff9800'];

// Cargar productos y fichas
Promise.all([
  apiGet("productos","select=id,nombre,empresa,imagen_url&activo=is.true&order=empresa,nombre&limit=2000"),
  apiGet("fichas_perfume","select=*&activo=is.true")
]).then(function(res){
  allProds=Array.isArray(res[0])?res[0]:[];
  allFichas=Array.isArray(res[1])?res[1]:[];
}).catch(function(){});

function onSearch(q){
  var box=document.getElementById('searchResults');
  if(!q||q.length<2){box.style.display='none';return;}
  var lower=q.toLowerCase();
  var matches=allProds.filter(function(p){
    return (p.nombre||'').toLowerCase().indexOf(lower)>=0||(p.empresa||'').toLowerCase().indexOf(lower)>=0;
  }).slice(0,8);
  if(!matches.length){box.style.display='none';return;}
  box.innerHTML=matches.map(function(p){
    var hasFicha=allFichas.find(function(f){return f.producto_id===p.id;});
    return '<div class="search-item" onclick="addPerfume('+p.id+')">'
      +(p.imagen_url?'<img class="search-item-img" src="'+p.imagen_url+'" onerror="this.style.display=\'none\'">':'<div style="width:28px;height:28px;background:#f5f5f5;border-radius:4px;flex-shrink:0"></div>')
      +'<div class="search-item-info">'
        +'<div class="search-item-name">'+escHtml(p.nombre)+(hasFicha?'':' <span style="color:#ccc;font-size:.6rem">(sin ficha)</span>')+'</div>'
        +'<div class="search-item-marca">'+escHtml(p.empresa||'')+'</div>'
      +'</div></div>';
  }).join('');
  box.style.display='block';
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap'))
    document.getElementById('searchResults').style.display='none';
});

function addPerfume(prodId){
  var prod=allProds.find(function(p){return p.id===prodId;});
  if(!prod)return;
  // Buscar slot libre
  var slot=seleccionados.findIndex(function(s){return s===null;});
  if(slot<0){alert('Ya tenés 4 perfumes seleccionados. Quitá uno primero.');return;}
  // No duplicar
  if(seleccionados.find(function(s){return s&&s.id===prodId;})){
    alert('Este perfume ya está en la comparación.');return;
  }
  var ficha=allFichas.find(function(f){return f.producto_id===prodId;})||null;
  seleccionados[slot]={prod:prod,ficha:ficha};
  renderSlots();
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').style.display='none';
}

function removePerfume(idx){
  seleccionados[idx]=null;
  renderSlots();
}

function renderSlots(){
  for(var i=0;i<4;i++){
    var slot=document.getElementById('slot'+i);
    var s=seleccionados[i];
    if(s){
      slot.className='slot filled';
      slot.innerHTML='<button class="slot-remove" onclick="removePerfume('+i+')">✕</button>'
        +'<div class="slot-num" style="color:'+COLORS_HEX[i]+'">Perfume '+(i+1)+'</div>'
        +(s.prod.imagen_url?'<img src="'+s.prod.imagen_url+'" style="width:36px;height:36px;object-fit:contain;border-radius:6px">':'')
        +'<div class="slot-name">'+escHtml(s.prod.nombre.split('|')[0].trim().substring(0,30))+'</div>'
        +'<div class="slot-marca">'+escHtml(s.prod.empresa||'')+'</div>';
    } else {
      slot.className='slot';
      slot.innerHTML='<div class="slot-num">Perfume '+(i+1)+'</div><div class="slot-add">+</div>';
    }
  }
  var count=seleccionados.filter(Boolean).length;
  document.getElementById('btnComparar').disabled=count<2;
}

// Extraer nivel numérico de proyección/duración/estela
function nivelProyeccion(texto){
  if(!texto)return 0;
  var t=texto.toLowerCase();
  if(t.indexOf('muy alta')>=0||t.indexOf('beast')>=0||t.indexOf('nuclear')>=0)return 5;
  if(t.indexOf('alta')>=0)return 4;
  if(t.indexOf('moderada-alta')>=0||t.indexOf('moderada alta')>=0)return 3;
  if(t.indexOf('moderada')>=0)return 3;
  if(t.indexOf('baja')>=0)return 1;
  return 2;
}
function nivelDuracion(texto){
  if(!texto)return 0;
  var t=texto.toLowerCase();
  if(t.indexOf('muy larga')>=0)return 5;
  if(t.indexOf('larga')>=0&&t.indexOf('media')<0)return 4;
  if(t.indexOf('media-larga')>=0||t.indexOf('media larga')>=0)return 3;
  if(t.indexOf('media')>=0)return 2;
  if(t.indexOf('corta')>=0)return 1;
  return 2;
}
function nivelEstela(texto){
  if(!texto)return 0;
  var t=texto.toLowerCase();
  if(t.indexOf('nuclear')>=0)return 5;
  if(t.indexOf('intensa')>=0&&t.indexOf('muy')>=0)return 5;
  if(t.indexOf('intensa')>=0)return 4;
  if(t.indexOf('moderada')>=0)return 3;
  if(t.indexOf('discreta')>=0)return 1;
  return 2;
}
function nivelVersatilidad(f){
  if(!f)return 0;
  var score=0;
  var est=(f.estacion||'').toLowerCase();
  var mom=(f.momento_dia||'').toLowerCase();
  if(est.indexOf('todo el año')>=0||est.indexOf('todo')>=0)score+=3;
  else if((est.match(/\//g)||[]).length>=2)score+=2;
  else score+=1;
  if(mom.indexOf('versátil')>=0)score+=2;
  else if(mom.indexOf('/')>=0)score+=1;
  return Math.min(5,score);
}

function liquidColor(texto){
  if(!texto)return'#e8c87a';
  var t=texto.toLowerCase();
  if(t.indexOf('azul')>=0)return t.indexOf('oscuro')>=0||t.indexOf('cobalto')>=0||t.indexOf('índigo')>=0?'#1565c0':'#42a5f5';
  if(t.indexOf('rosa')>=0)return'#f48fb1';
  if(t.indexOf('verde')>=0)return'#43a047';
  if(t.indexOf('violeta')>=0||t.indexOf('morado')>=0)return'#8e24aa';
  if(t.indexOf('negro')>=0)return'#212121';
  if(t.indexOf('blanco')>=0||t.indexOf('transparente')>=0||t.indexOf('cristalino')>=0)return'#e0e0e0';
  if(t.indexOf('dorado')>=0||t.indexOf('ámbar')>=0||t.indexOf('miel')>=0||t.indexOf('champagne')>=0)return'#f9a825';
  if(t.indexOf('plateado')>=0||t.indexOf('gris')>=0)return'#9e9e9e';
  if(t.indexOf('coral')>=0||t.indexOf('melocotón')>=0)return'#ff7043';
  if(t.indexOf('naranja')>=0)return'#ff6d00';
  if(t.indexOf('rojo')>=0)return'#e53935';
  return'#e8c87a';
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function comparar(){
  var activos=seleccionados.filter(Boolean);
  if(activos.length<2)return;
  
  // Destruir charts anteriores
  charts.forEach(function(c){c.destroy();});charts=[];
  
  var res=document.getElementById('resultado');
  res.style.display='block';
  res.innerHTML='<div class="loading-comp"><div class="spin"></div>Generando comparación...</div>';
  
  setTimeout(function(){buildComparacion(activos);},100);
}

function buildComparacion(activos){
  var n=activos.length;
  var labels=activos.map(function(a){return a.prod.nombre.split('|')[0].trim().substring(0,20);});
  var fichas=activos.map(function(a){return a.ficha;});
  
  var html='<div id="comp-export">';
  
  // Header
  html+='<div class="comp-header">';
  html+='<div class="comp-title">⚖️ Comparación de '+n+' perfumes</div>';
  html+='<div class="export-btns">'
    +'<button class="tb-btn" onclick="exportarJPG()">🖼 JPG</button>'
    +'<button class="tb-btn primary" onclick="exportarPDF()">📄 PDF</button>'
    +'</div>';
  html+='</div>';
  
  // TABLA
  html+='<div class="comp-table"><table>';
  // Headers
  html+='<tr><th>Campo</th>';
  activos.forEach(function(a,i){
    html+='<th class="perf-th"><div class="perf-header-cell">'
      +(a.prod.imagen_url?'<img class="perf-img-mini" src="'+a.prod.imagen_url+'" onerror="this.style.display=\'none\'">':'')
      +'<div class="perf-name-mini" style="color:'+COLORS_HEX[i]+'">'+escHtml(a.prod.nombre.split('|')[0].trim().substring(0,25))+'</div>'
      +'<div class="perf-marca-mini">'+escHtml(a.prod.empresa||'')+'</div>'
      +'</div></th>';
  });
  html+='</tr>';
  
  // Filas de datos
  var filas=[
    ['Familia olfativa',function(f){return f?escHtml(f.familia_olfativa||'—'):'—';}],
    ['Inspirado en',function(f){return f&&f.inspirado_en?'<span style="font-size:.68rem">≈ '+escHtml(f.inspirado_en.split('(')[0].trim())+'</span>':'—';}],
    ['Notas de salida',function(f){return f?escHtml(f.notas_salida||'—'):'—';}],
    ['Notas de corazón',function(f){return f?escHtml(f.notas_corazon||'—'):'—';}],
    ['Notas de fondo',function(f){return f?escHtml(f.notas_fondo||'—'):'—';}],
    ['Proyección',function(f){
      if(!f)return'—';
      var lvl=nivelProyeccion(f.proyeccion);
      var dots='';for(var i=0;i<5;i++)dots+='<div style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px;background:'+(i<lvl?'var(--gold)':'#e0e0e0')+'"></div>';
      return dots+'<div style="font-size:.65rem;color:var(--text3)">'+escHtml(f.proyeccion||'')+'</div>';
    }],
    ['Duración',function(f){return f?escHtml(f.duracion||'—'):'—';}],
    ['Estela',function(f){return f?escHtml(f.estela||'—'):'—';}],
    ['Momento',function(f){return f?escHtml(f.momento_dia||'—'):'—';}],
    ['Estaciones',function(f){return f?escHtml(f.estacion||'—'):'—';}],
    ['Ocasión',function(f){return f?escHtml(f.ocasion||'—'):'—';}],
    ['Clima',function(f){return f?escHtml(f.clima||'—'):'—';}],
    ['Color del líquido',function(f,a){
      if(!f||!f.color_liquido)return'—';
      var c=liquidColor(f.color_liquido);
      return '<span class="color-dot" style="background:'+c+'"></span>'+escHtml(f.color_liquido);
    }],
    ['Perfil de usuario',function(f){return f?'<span style="font-size:.7rem">'+escHtml(f.perfil_usuario||'—')+'</span>':'—';}],
  ];
  
  filas.forEach(function(fila){
    html+='<tr><td class="field-label">'+fila[0]+'</td>';
    fichas.forEach(function(f,i){
      html+='<td>'+fila[1](f,activos[i])+'</td>';
    });
    html+='</tr>';
  });
  html+='</table></div>';
  
  // RADAR CHART
  html+='<div class="radar-wrap"><div class="chart-title">🕸 Perfil comparativo</div><div class="radar-chart-wrap"><canvas id="radarChart"></canvas></div></div>';
  
  // BAR CHARTS
  html+='<div class="charts-grid">';
  html+='<div class="chart-card"><div class="chart-title">📊 Proyección / Duración / Estela</div><div class="chart-wrap"><canvas id="barChart1"></canvas></div></div>';
  html+='<div class="chart-card"><div class="chart-title">📈 Versatilidad</div><div class="chart-wrap"><canvas id="barChart2"></canvas></div></div>';
  html+='</div>';
  
  // DESCRIPCION COMPARADA
  html+='<div class="comp-table"><table><tr><th>Descripción sensorial</th>';
  activos.forEach(function(a,i){html+='<th class="perf-th" style="color:'+COLORS_HEX[i]+'">'+escHtml(a.prod.nombre.split('|')[0].trim().substring(0,20))+'</th>';});
  html+='</tr><tr><td></td>';
  fichas.forEach(function(f){
    html+='<td style="font-size:.73rem;font-style:italic;color:var(--text2)">'+escHtml(f?f.descripcion||'—':'—')+'</td>';
  });
  html+='</tr></table></div>';
  
  // FOOTER
  html+='<div style="text-align:center;padding:1.2rem;font-size:.65rem;color:var(--text3)">⚜ Distribuidora Belle — Comparador técnico de fragancias</div>';

    // Bar 1 — Proyección / Duración / Estela

        labels:['Proyección','Duración','Estela'],

      charts.push(new Chart(barCtx2,{type:'bar',data:{
        labels:labels,

}

function exportarJPG(){
  var el=document.getElementById('comp-export');
  if(!el)return;
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fdf8f0'}).then(function(canvas){
    var a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.95);
    a.download='comparacion_belle_'+Date.now()+'.jpg';
    a.click();
  });
}

function exportarPDF(){
  var el=document.getElementById('comp-export');
  if(!el)return;
  html2canvas(el,{scale:1.5,useCORS:true,backgroundColor:'#fdf8f0'}).then(function(canvas){
    var imgData=canvas.toDataURL('image/jpeg',0.92);
    var pdf=new window.jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    var pw=pdf.internal.pageSize.getWidth();
    var ph=pdf.internal.pageSize.getHeight();
    var iw=canvas.width,ih=canvas.height;
    var ratio=iw/ih;
    var w=pw,h=pw/ratio;
    if(h>ph){h=ph;w=ph*ratio;}
    pdf.addImage(imgData,'JPEG',(pw-w)/2,(ph-h)/2,w,h,undefined,'FAST');
    pdf.save('comparacion_belle_'+Date.now()+'.pdf');
  });
}

init();
function init(){
  // Pre-cargar desde URL si vienen prod_ids
  var params=new URLSearchParams(location.search);
  var ids=params.get('ids');
  if(ids){
    ids.split(',').forEach(function(id,i){
      if(i>=4)return;
      var prod=allProds.find(function(p){return p.id===parseInt(id);});
      if(prod){
        var ficha=allFichas.find(function(f){return f.producto_id===prod.id;})||null;
        seleccionados[i]={prod:prod,ficha:ficha};
      }
    });
    renderSlots();
  }
}
