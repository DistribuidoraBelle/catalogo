<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ficha Técnica — Distribuidora Belle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --gold:#c4965a;--gold2:#e8b86d;--dark:#1a1209;--cream:#fdf8f0;
  --text:#2a1f0f;--text2:#6b5a3e;--text3:#9a8060;
  --card:#fff;--border:rgba(196,150,90,.18);
  --pink:#ff6eb4;--blue:#4d9fff;--green:#3db87a;--orange:#ff8c42;--purple:#9b6dff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:'Jost',sans-serif;color:var(--text);min-height:100vh;}

/* TOOLBAR */
.toolbar{background:var(--dark);padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.tb-brand{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:1rem;font-weight:600;flex:1;}
.tb-btn{background:transparent;border:1px solid rgba(196,150,90,.4);color:var(--gold2);padding:.3rem .7rem;border-radius:20px;cursor:pointer;font-size:.72rem;font-family:'Jost',sans-serif;transition:all .2s;white-space:nowrap;}
.tb-btn:hover{background:var(--gold);color:var(--dark);}
.tb-btn.primary{background:var(--gold);color:var(--dark);font-weight:600;}
.tb-btn.primary:hover{background:var(--gold2);}

/* FICHA */
#ficha-render{max-width:800px;margin:1.5rem auto;padding:0 1rem 3rem;}

.ficha-card{background:var(--card);border-radius:20px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.08);}

/* HEADER */
.ficha-header{padding:2rem 2rem 1.5rem;background:linear-gradient(135deg,var(--dark) 0%,#2d1f08 60%,#1a0a2e 100%);position:relative;overflow:hidden;}
.ficha-header::before{content:'';position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(196,150,90,.15) 0%,transparent 70%);}
.ficha-header-top{display:flex;align-items:flex-start;gap:1.5rem;}
.ficha-img-wrap{width:130px;height:130px;flex-shrink:0;background:rgba(255,255,255,.06);border-radius:14px;overflow:hidden;border:1px solid rgba(196,150,90,.3);display:flex;align-items:center;justify-content:center;}
.ficha-img-wrap img{width:100%;height:100%;object-fit:contain;padding:8px;mix-blend-mode:lighten;}
.ficha-img-placeholder{font-size:3rem;opacity:.4;}
.ficha-header-info{flex:1;}
.ficha-marca{font-size:.72rem;color:var(--gold2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.35rem;font-weight:500;}
.ficha-nombre{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:#fff;line-height:1.1;margin-bottom:.4rem;}
.ficha-sub{font-size:.75rem;color:rgba(255,255,255,.55);display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}
.ficha-badge{background:rgba(196,150,90,.2);border:1px solid rgba(196,150,90,.4);color:var(--gold2);padding:.12rem .45rem;border-radius:20px;font-size:.65rem;font-weight:500;}
.ficha-qr{width:60px;height:60px;flex-shrink:0;opacity:.7;}
.ficha-qr img{width:100%;border-radius:6px;}

/* FAMILIA */
.ficha-familia{margin-top:1rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.familia-label{font-size:.62rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;}
.familia-chip{background:rgba(196,150,90,.15);border:1px solid rgba(196,150,90,.35);color:var(--gold2);padding:.2rem .7rem;border-radius:20px;font-size:.72rem;font-weight:500;}
.inspirado-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);padding:.2rem .7rem;border-radius:20px;font-size:.65rem;}

/* BODY */
.ficha-body{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(0,0,0,.04);}
.ficha-section{background:var(--card);padding:1.4rem 1.5rem;}
.ficha-section.full{grid-column:1/-1;}
.section-title{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
.section-title::before{content:'';display:block;width:16px;height:2px;background:var(--gold);border-radius:1px;}

/* NOTAS */
.notas-grid{display:flex;flex-direction:column;gap:.6rem;}
.nota-row{display:flex;align-items:center;gap:.7rem;}
.nota-tipo{font-size:.58rem;color:var(--text3);min-width:50px;text-transform:uppercase;letter-spacing:.08em;}
.nota-line{flex:1;height:1px;background:var(--border);}
.nota-text{font-size:.75rem;color:var(--text);text-align:right;max-width:200px;}
.nota-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-salida{background:#f9a825;}
.dot-corazon{background:#e91e8c;}
.dot-fondo{background:#5c6bc0;}

/* ACORDES */
.acordes-list{display:flex;flex-direction:column;gap:.5rem;}
.acorde-item{display:flex;align-items:center;gap:.6rem;}
.acorde-bar{height:28px;border-radius:6px;display:flex;align-items:center;padding:0 .7rem;font-size:.75rem;font-weight:500;color:#fff;min-width:80px;position:relative;overflow:hidden;}
.acorde-bar::after{content:'';position:absolute;right:0;top:0;bottom:0;width:30%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15));}

/* PERFIL OLFATIVO */
.perfil-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.perfil-item{background:rgba(196,150,90,.04);border:1px solid var(--border);border-radius:10px;padding:.7rem;text-align:center;}
.perfil-icon{font-size:1.4rem;margin-bottom:.2rem;}
.perfil-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;}
.perfil-value{font-size:.82rem;font-weight:600;color:var(--text);}
.perfil-sub{font-size:.62rem;color:var(--text3);}

/* MOMENTO / ESTACIÓN */
.moment-grid{display:flex;flex-direction:column;gap:.5rem;}
.moment-row{display:flex;gap:.35rem;flex-wrap:wrap;}
.moment-chip{padding:.22rem .6rem;border-radius:20px;font-size:.68rem;font-weight:500;border:1px solid;}
.chip-dia{background:#fff8e1;border-color:#ffe082;color:#f57f17;}
.chip-noche{background:#e8eaf6;border-color:#9fa8da;color:#3949ab;}
.chip-verano{background:#fff3e0;border-color:#ffcc02;color:#e65100;}
.chip-invierno{background:#e3f2fd;border-color:#90caf9;color:#1565c0;}
.chip-primavera{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32;}
.chip-otono{background:#fff3e0;border-color:#ffcc80;color:#e65100;}
.chip-default{background:#f5f5f5;border-color:#ddd;color:#555;}

/* DIURNO */
.diurno-bar{display:flex;border-radius:8px;overflow:hidden;height:36px;}
.diurno-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;gap:.3rem;}
.seg-dia{background:#b3d9ff;color:#1565c0;}
.seg-noche{background:#3949ab;color:#fff;}
.seg-inactive{opacity:.3;}

/* ESTACIONES */
.estaciones-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.estacion-item{border-radius:8px;padding:.5rem .7rem;display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:500;}
.est-invierno{background:#e3f2fd;color:#1565c0;}
.est-primavera{background:#e8f5e9;color:#2e7d32;}
.est-verano{background:#fff8e1;color:#f57f17;}
.est-otono{background:#fff3e0;color:#bf360c;}
.estacion-inactive{opacity:.3;filter:grayscale(1);}

/* DESCRIPCION */
.descripcion-text{font-size:.82rem;line-height:1.7;color:var(--text2);font-style:italic;padding:.5rem 0;}
.descripcion-text::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);line-height:0;vertical-align:-0.4em;margin-right:.2rem;}

/* PERFIL USUARIO */
.perfil-user{background:linear-gradient(135deg,rgba(196,150,90,.06),rgba(196,150,90,.02));border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;}
.perfil-user-text{font-size:.78rem;line-height:1.6;color:var(--text2);}
.perfil-user-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.6rem;}
.user-tag{background:rgba(196,150,90,.12);border:1px solid rgba(196,150,90,.3);color:var(--gold);padding:.15rem .5rem;border-radius:20px;font-size:.62rem;font-weight:500;}

/* FOOTER BELLE */
.ficha-footer{background:var(--dark);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.footer-logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:1.1rem;font-weight:600;letter-spacing:.05em;}
.footer-logo span{font-weight:300;font-size:.85rem;}
.footer-info{font-size:.62rem;color:rgba(255,255,255,.4);text-align:right;line-height:1.6;}

/* LIQUID COLOR */
.liquid-indicator{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;background:rgba(196,150,90,.04);border:1px solid var(--border);border-radius:8px;}
.liquid-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,.1);flex-shrink:0;}
.liquid-text{font-size:.73rem;color:var(--text2);}

/* PROYECCION VISUAL */
.proyeccion-visual{display:flex;gap:.3rem;align-items:center;margin-top:.4rem;}
.proy-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);transition:opacity .2s;}
.proy-dot.inactive{background:#ddd;opacity:.4;}

/* RESPONSIVE */
@media(max-width:600px){
  .ficha-body{grid-template-columns:1fr;}
  .ficha-section.full,.ficha-section{grid-column:auto;}
  .ficha-header-top{flex-direction:column;}
  .ficha-img-wrap{width:100px;height:100px;}
  .ficha-nombre{font-size:1.5rem;}
  #ficha-render{padding:0 .5rem 2rem;}
}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;}
.loading-spin{width:40px;height:40px;border:3px solid rgba(196,150,90,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.not-found{text-align:center;padding:3rem;color:var(--text3);}

/* PARA EXPORT — sin toolbar */
@media print{.toolbar{display:none!important;}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-brand">⚜ Distribuidora Belle</div>
  <button class="tb-btn" onclick="history.back()">← Volver</button>
  <button class="tb-btn" onclick="compartirLink()">🔗 Copiar link</button>
  <button class="tb-btn" onclick="exportarJPG()">🖼 Exportar JPG</button>
  <button class="tb-btn primary" onclick="exportarPDF()">📄 Exportar PDF</button>
</div>

<div id="ficha-render">
  <div class="loading-screen" id="loadingEl">
    <div class="loading-spin"></div>
    <div style="font-size:.8rem;color:var(--text3)">Cargando ficha...</div>
  </div>
</div>

<script>
//<![CDATA[
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function apiGet(tabla, filtros){
  return fetch(SB_URL+"/rest/v1/"+tabla+(filtros?"?"+filtros:""),{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Accept":"application/json"}
  }).then(function(r){return r.json();});
}

// Leer params de la URL
var params=new URLSearchParams(location.search);
var fichaId=params.get('id');
var prodId=params.get('prod');

var fichaData=null;
var prodData=null;

function init(){
  if(!fichaId&&!prodId){
    showNotFound("No se especificó ninguna ficha.");
    return;
  }
  var query=fichaId?
    apiGet("fichas_perfume","id=eq."+fichaId+"&limit=1"):
    apiGet("fichas_perfume","producto_id=eq."+prodId+"&limit=1");
  query.then(function(res){
    if(!Array.isArray(res)||!res[0]){
      showNotFound("Ficha no encontrada para este perfume.");
      return;
    }
    fichaData=res[0];
    // Cargar producto
    var pid=fichaData.producto_id;
    if(pid){
      return apiGet("productos","id=eq."+pid+"&select=id,nombre,empresa,imagen_url&limit=1").then(function(pr){
        prodData=Array.isArray(pr)&&pr[0]?pr[0]:null;
        renderFicha();
      });
    } else {
      renderFicha();
    }
  }).catch(function(e){
    showNotFound("Error cargando ficha: "+e.message);
  });
}

function showNotFound(msg){
  document.getElementById('loadingEl').outerHTML='<div class="not-found"><div style="font-size:3rem;margin-bottom:.5rem">🔍</div><div style="font-size:.9rem">'+msg+'</div></div>';
}

// Colores para acordes
var ACORDE_COLORS={
  'floral':{'bg':'#e91e8c','text':'#fff'},
  'flores':{'bg':'#e91e8c','text':'#fff'},
  'floral blanco':{'bg':'#f8bbd0','text':'#880e4f'},
  'florales':{'bg':'#ff4081','text':'#fff'},
  'frutal':{'bg':'#ff6b35','text':'#fff'},
  'frutal blanco':{'bg':'#ffab91','text':'#bf360c'},
  'citrico':{'bg':'#fdd835','text':'#f57f17'},
  'cítrico':{'bg':'#fdd835','text':'#f57f17'},
  'citricos':{'bg':'#fdd835','text':'#f57f17'},
  'amaderado':{'bg':'#795548','text':'#fff'},
  'amaderados':{'bg':'#795548','text':'#fff'},
  'oriental':{'bg':'#e65100','text':'#fff'},
  'oriental dulce':{'bg':'#ff6d00','text':'#fff'},
  'aromático':{'bg':'#43a047','text':'#fff'},
  'aromatico':{'bg':'#43a047','text':'#fff'},
  'aromático acuático':{'bg':'#00acc1','text':'#fff'},
  'acuático':{'bg':'#00bcd4','text':'#fff'},
  'acuatico':{'bg':'#00bcd4','text':'#fff'},
  'verde':{'bg':'#388e3c','text':'#fff'},
  'atalcado':{'bg':'#bcaaa4','text':'#fff'},
  'especiado':{'bg':'#c62828','text':'#fff'},
  'gourmand':{'bg':'#d81b60','text':'#fff'},
  'ámbar':{'bg':'#ff8f00','text':'#fff'},
  'ambar':{'bg':'#ff8f00','text':'#fff'},
  'amber':{'bg':'#ff8f00','text':'#fff'},
  'vainilla':{'bg':'#f3e5d0','text':'#5d4037'},
  'cuero':{'bg':'#4e342e','text':'#fff'},
  'musgo':{'bg':'#558b2f','text':'#fff'},
  'almizcle':{'bg':'#f5f5f5','text':'#555'},
  'almizcle blanco':{'bg':'#f5f5f5','text':'#555'},
  'resinoso':{'bg':'#827717','text':'#fff'},
  'incienso':{'bg':'#6d4c41','text':'#fff'},
  'default':{'bg':'#9e9e9e','text':'#fff'}
};

function getAcordeColor(nombre){
  var lower=nombre.toLowerCase();
  for(var k in ACORDE_COLORS){
    if(lower.indexOf(k)>=0) return ACORDE_COLORS[k];
  }
  return ACORDE_COLORS.default;
}

function getProyeccionDots(texto){
  var level=0;
  if(!texto)return 0;
  var t=texto.toLowerCase();
  if(t.indexOf('muy alta')>=0||t.indexOf('beast')>=0||t.indexOf('nuclear')>=0) level=5;
  else if(t.indexOf('alta')>=0) level=4;
  else if(t.indexOf('moderada-alta')>=0||t.indexOf('moderada alta')>=0) level=3;
  else if(t.indexOf('moderada')>=0) level=3;
  else if(t.indexOf('baja')>=0) level=1;
  else level=2;
  return level;
}

function getDuracionText(texto){
  if(!texto)return{icon:'⏱',text:'—'};
  var t=texto.toLowerCase();
  if(t.indexOf('muy larga')>=0||t.indexOf('12h')>=0||t.indexOf('10h')>=0) return{icon:'⏱',text:'Muy larga',sub:texto.match(/\d+[\-h\+]+[^\|]*/)?texto.match(/\d+[\-h\+]+[^\|]*/)[0].trim():''};
  if(t.indexOf('larga')>=0) return{icon:'⏱',text:'Larga',sub:texto.match(/\d+[\-h\+]+[^\|]*/)?texto.match(/\d+[\-h\+]+[^\|]*/)[0].trim():''};
  if(t.indexOf('media-larga')>=0||t.indexOf('media larga')>=0) return{icon:'⏱',text:'Media-larga',sub:''};
  if(t.indexOf('media')>=0) return{icon:'⏱',text:'Media',sub:''};
  if(t.indexOf('corta')>=0) return{icon:'⏱',text:'Corta',sub:''};
  return{icon:'⏱',text:texto,sub:''};
}

function getEstelaText(texto){
  if(!texto)return{icon:'≈',text:'—'};
  var t=texto.toLowerCase();
  if(t.indexOf('nuclear')>=0||t.indexOf('muy intensa')>=0) return{icon:'≈',text:'Nuclear'};
  if(t.indexOf('intensa')>=0) return{icon:'≈',text:'Fuerte'};
  if(t.indexOf('moderada')>=0) return{icon:'≈',text:'Moderada'};
  if(t.indexOf('discreta')>=0||t.indexOf('baja')>=0) return{icon:'≈',text:'Discreta'};
  return{icon:'≈',text:texto};
}

function getGeneroEmoji(texto){
  if(!texto)return'';
  if(texto.indexOf('♀')>=0||texto.toLowerCase().indexOf('femenino')>=0) return'♀ Femenino';
  if(texto.indexOf('♂')>=0||texto.toLowerCase().indexOf('masculino')>=0) return'♂ Masculino';
  if(texto.toLowerCase().indexOf('unisex')>=0) return'⚥ Unisex';
  return texto;
}

function getEstacionChip(est,nombre){
  var clases={
    'invierno':'est-invierno','primavera':'est-primavera',
    'verano':'est-verano','otoño':'est-otono','otono':'est-otono'
  };
  var icons={'invierno':'❄️','primavera':'🌸','verano':'☀️','otoño':'🍂','otono':'🍂'};
  var cls=clases[nombre.toLowerCase()]||'';
  var icon=icons[nombre.toLowerCase()]||'🌿';
  var activo=est&&est.toLowerCase().indexOf(nombre.toLowerCase())>=0;
  return '<div class="estacion-item '+cls+(activo?'':' estacion-inactive')+'">'+icon+' '+nombre+'</div>';
}

function getMomentoChips(momento){
  var chips='';
  if(!momento)return chips;
  var t=momento.toLowerCase();
  if(t.indexOf('día')>=0||t.indexOf('mañana')>=0||t.indexOf('dia')>=0)
    chips+='<span class="moment-chip chip-dia">☀️ Día</span>';
  if(t.indexOf('tarde')>=0)
    chips+='<span class="moment-chip chip-default">🌤 Tarde</span>';
  if(t.indexOf('noche')>=0)
    chips+='<span class="moment-chip chip-noche">🌙 Noche</span>';
  if(t.indexOf('versátil')>=0||t.indexOf('versatil')>=0)
    chips+='<span class="moment-chip chip-default">⚡ Versátil</span>';
  return chips||'<span class="moment-chip chip-default">'+momento+'</span>';
}

function liquidColor(texto){
  if(!texto)return'#e8c87a';
  var t=texto.toLowerCase();
  if(t.indexOf('azul')>=0||t.indexOf('celeste')>=0) return t.indexOf('oscuro')>=0||t.indexOf('cobalto')>=0?'#1565c0':'#42a5f5';
  if(t.indexOf('rosa')>=0||t.indexOf('rosado')>=0) return'#f48fb1';
  if(t.indexOf('rojo')>=0) return'#e53935';
  if(t.indexOf('verde')>=0) return'#43a047';
  if(t.indexOf('morado')>=0||t.indexOf('violeta')>=0||t.indexOf('púrpura')>=0) return'#8e24aa';
  if(t.indexOf('negro')>=0||t.indexOf('oscuro')>=0) return'#212121';
  if(t.indexOf('blanco')>=0||t.indexOf('cristalino')>=0||t.indexOf('transparente')>=0) return'#e0e0e0';
  if(t.indexOf('dorado')>=0||t.indexOf('champagne')>=0||t.indexOf('miel')>=0||t.indexOf('ámbar')>=0||t.indexOf('amber')>=0) return'#f9a825';
  if(t.indexOf('plateado')>=0||t.indexOf('gris')>=0) return'#9e9e9e';
  if(t.indexOf('coral')>=0||t.indexOf('melocotón')>=0) return'#ff7043';
  if(t.indexOf('naranja')>=0) return'#ff6d00';
  return'#e8c87a';
}

function renderFicha(){
  var f=fichaData;
  var p=prodData;
  
  // Imagen
  var imgHtml=p&&p.imagen_url?
    '<img src="'+p.imagen_url+'" alt="'+f.nombre_completo+'" onerror="this.parentNode.innerHTML=\'<div class=ficha-img-placeholder>🌸</div>\'">':
    '<div class="ficha-img-placeholder">🌸</div>';
  
  // Acordes (familia olfativa → chips)
  var acordes=(f.familia_olfativa||'').split(/[\/,]/).map(function(a){return a.trim();}).filter(Boolean);
  var acordesHtml=acordes.map(function(a,i){
    var c=getAcordeColor(a);
    var w=100-i*8;
    return '<div class="acorde-item"><div class="acorde-bar" style="background:'+c.bg+';color:'+c.text+';width:'+w+'%">'+a+'</div></div>';
  }).join('');
  
  // Proyección dots
  var pLevel=getProyeccionDots(f.proyeccion);
  var pDots='';
  for(var i=0;i<5;i++) pDots+='<div class="proy-dot'+(i<pLevel?'':' inactive')+'"></div>';
  
  var dur=getDuracionText(f.duracion);
  var est=getEstelaText(f.estela);
  
  // Diurno bar
  var mom=(f.momento_dia||'').toLowerCase();
  var hasDia=mom.indexOf('día')>=0||mom.indexOf('mañana')>=0||mom.indexOf('dia')>=0||mom.indexOf('versátil')>=0;
  var hasNoche=mom.indexOf('noche')>=0||mom.indexOf('versátil')>=0;
  var hasTarde=mom.indexOf('tarde')>=0||mom.indexOf('versátil')>=0;
  
  // Color liquido
  var lColor=liquidColor(f.color_liquido);
  
  // Tags perfil usuario
  var profileTags=[];
  var pt=f.perfil_usuario||'';
  var ageM=pt.match(/(\d+)[–\-](\d+)\s*años/);
  if(ageM)profileTags.push(ageM[0]);
  if(pt.toLowerCase().indexOf('hombre')>=0)profileTags.push('Hombres');
  if(pt.toLowerCase().indexOf('mujer')>=0)profileTags.push('Mujeres');
  if(pt.toLowerCase().indexOf('unisex')>=0||
     (pt.toLowerCase().indexOf('hombre')>=0&&pt.toLowerCase().indexOf('mujer')>=0))
    profileTags=['Unisex'];
  
  var html='<div class="ficha-card" id="ficha-export">';
  
  // HEADER
  html+='<div class="ficha-header">';
  html+='<div class="ficha-header-top">';
  html+='<div class="ficha-img-wrap">'+imgHtml+'</div>';
  html+='<div class="ficha-header-info">';
  html+='<div class="ficha-marca">'+escHtml(f.marca||'')+'</div>';
  html+='<div class="ficha-nombre">'+escHtml(f.nombre_completo||'')+'</div>';
  html+='<div class="ficha-sub">';
  if(f.anno)html+='<span class="ficha-badge">'+f.anno+'</span>';
  if(f.concentracion)html+='<span class="ficha-badge">'+f.concentracion+'</span>';
  if(f.genero)html+='<span style="color:rgba(255,255,255,.6);font-size:.72rem">'+getGeneroEmoji(f.genero)+'</span>';
  html+='</div>';
  html+='</div>';
  html+='</div>';
  // Familia
  if(f.familia_olfativa){
    html+='<div class="ficha-familia">';
    html+='<span class="familia-label">Familia</span>';
    html+='<span class="familia-chip">'+escHtml(f.familia_olfativa)+'</span>';
    if(f.inspirado_en)html+='<span class="inspirado-chip">≈ '+escHtml(f.inspirado_en.split('(')[0].trim())+'</span>';
    html+='</div>';
  }
  html+='</div>'; // /header
  
  // BODY GRID
  html+='<div class="ficha-body">';
  
  // === ACORDES ===
  if(acordes.length){
    html+='<div class="ficha-section">';
    html+='<div class="section-title">Acordes principales</div>';
    html+='<div class="acordes-list">'+acordesHtml+'</div>';
    html+='</div>';
  }
  
  // === PERFIL OLFATIVO ===
  html+='<div class="ficha-section">';
  html+='<div class="section-title">Perfil olfativo</div>';
  html+='<div class="perfil-grid">';
  html+='<div class="perfil-item"><div class="perfil-icon">⏱</div><div class="perfil-label">Longevidad</div><div class="perfil-value">'+dur.text+'</div>'+(dur.sub?'<div class="perfil-sub">'+dur.sub+'</div>':'')+'</div>';
  html+='<div class="perfil-item"><div class="perfil-icon">≈</div><div class="perfil-label">Estela</div><div class="perfil-value">'+est.text+'</div></div>';
  html+='<div class="perfil-item" style="grid-column:1/-1"><div class="perfil-label" style="margin-bottom:.4rem">Proyección</div><div class="proyeccion-visual">'+pDots+'</div><div class="perfil-sub" style="margin-top:.3rem">'+escHtml(f.proyeccion||'—')+'</div></div>';
  html+='</div>';
  // Liquido
  if(f.color_liquido){
    html+='<div class="liquid-indicator" style="margin-top:.8rem">';
    html+='<div class="liquid-dot" style="background:'+lColor+'"></div>';
    html+='<div class="liquid-text">'+escHtml(f.color_liquido)+'</div>';
    html+='</div>';
  }
  html+='</div>';
  
  // === NOTAS ===
  if(f.notas_salida||f.notas_corazon||f.notas_fondo){
    html+='<div class="ficha-section full">';
    html+='<div class="section-title">Pirámide olfativa</div>';
    html+='<div class="notas-grid">';
    if(f.notas_salida)html+='<div class="nota-row"><div class="nota-dot dot-salida"></div><div class="nota-tipo">Salida</div><div class="nota-line"></div><div class="nota-text">'+escHtml(f.notas_salida)+'</div></div>';
    if(f.notas_corazon)html+='<div class="nota-row"><div class="nota-dot dot-corazon"></div><div class="nota-tipo">Corazón</div><div class="nota-line"></div><div class="nota-text">'+escHtml(f.notas_corazon)+'</div></div>';
    if(f.notas_fondo)html+='<div class="nota-row"><div class="nota-dot dot-fondo"></div><div class="nota-tipo">Fondo</div><div class="nota-line"></div><div class="nota-text">'+escHtml(f.notas_fondo)+'</div></div>';
    html+='</div>';
    html+='</div>';
  }
  
  // === MOMENTO DEL DIA ===
  html+='<div class="ficha-section">';
  html+='<div class="section-title">Momento del día</div>';
  var diurnoHtml='<div class="diurno-bar">';
  diurnoHtml+='<div class="diurno-seg seg-dia'+(hasDia?'':' seg-inactive')+'">☀️ Día</div>';
  diurnoHtml+='<div class="diurno-seg'+(hasTarde?' ':' seg-inactive')+'" style="background:#ffd54f;color:#e65100;">🌤 Tarde</div>';
  diurnoHtml+='<div class="diurno-seg seg-noche'+(hasNoche?'':' seg-inactive')+'">🌙 Noche</div>';
  diurnoHtml+='</div>';
  html+=diurnoHtml;
  if(f.ocasion){
    html+='<div style="margin-top:.7rem"><div class="section-title" style="margin-bottom:.4rem">Ocasión</div>';
    var ocChips=f.ocasion.split(',').map(function(o){return'<span class="moment-chip chip-default">'+o.trim()+'</span>';}).join('');
    html+='<div class="moment-row">'+ocChips+'</div></div>';
  }
  html+='</div>';
  
  // === ESTACIONES ===
  html+='<div class="ficha-section">';
  html+='<div class="section-title">Estaciones</div>';
  html+='<div class="estaciones-grid">';
  html+=getEstacionChip(f.estacion,'Invierno');
  html+=getEstacionChip(f.estacion,'Primavera');
  html+=getEstacionChip(f.estacion,'Verano');
  html+=getEstacionChip(f.estacion,'Otoño');
  html+='</div>';
  if(f.clima){
    html+='<div style="margin-top:.6rem;font-size:.68rem;color:var(--text3)">☁️ Clima: '+escHtml(f.clima)+'</div>';
  }
  html+='</div>';
  
  // === DESCRIPCION ===
  if(f.descripcion){
    html+='<div class="ficha-section full">';
    html+='<div class="section-title">Descripción sensorial</div>';
    html+='<div class="descripcion-text">'+escHtml(f.descripcion)+'"</div>';
    html+='</div>';
  }
  
  // === PERFIL USUARIO ===
  if(f.perfil_usuario){
    html+='<div class="ficha-section full">';
    html+='<div class="section-title">Perfil de usuario</div>';
    html+='<div class="perfil-user">';
    html+='<div class="perfil-user-text">'+escHtml(f.perfil_usuario)+'</div>';
    if(profileTags.length){
      html+='<div class="perfil-user-tags">'+profileTags.map(function(t){return'<span class="user-tag">'+t+'</span>';}).join('')+'</div>';
    }
    html+='</div>';
    html+='</div>';
  }
  
  // === INSPIRADO EN ===
  if(f.inspirado_en){
    html+='<div class="ficha-section full" style="background:rgba(196,150,90,.03)">';
    html+='<div class="section-title">Inspiración</div>';
    html+='<div style="font-size:.78rem;color:var(--text2)">≈ '+escHtml(f.inspirado_en)+'</div>';
    html+='</div>';
  }
  
  html+='</div>'; // /ficha-body
  
  // FOOTER BELLE
  html+='<div class="ficha-footer">';
  html+='<div class="footer-logo">⚜ Distribuidora <span>Belle</span></div>';
  html+='<div class="footer-info">distribuidorabelle.com.ar<br>Ficha técnica generada por Belle</div>';
  html+='</div>';
  
  html+='</div>'; // /ficha-card
  
  document.getElementById('ficha-render').innerHTML=html;
  document.title=(f.nombre_completo||'Ficha')+'— Belle';
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function compartirLink(){
  navigator.clipboard.writeText(location.href).then(function(){
    alert('¡Link copiado al portapapeles!');
  }).catch(function(){
    prompt('Copiá este link:',location.href);
  });
}

function exportarJPG(){
  var el=document.getElementById('ficha-export');
  if(!el){alert('Ficha no disponible');return;}
  var btn=event.target;btn.textContent='Generando...';btn.disabled=true;
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'}).then(function(canvas){
    var a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.95);
    a.download='ficha_belle_'+(fichaData?fichaData.nombre_completo.replace(/[^a-z0-9]/gi,'_').toLowerCase():Date.now())+'.jpg';
    a.click();
    btn.textContent='🖼 Exportar JPG';btn.disabled=false;
  });
}

function exportarPDF(){
  var el=document.getElementById('ficha-export');
  if(!el){alert('Ficha no disponible');return;}
  var btn=event.target;btn.textContent='Generando...';btn.disabled=true;
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'}).then(function(canvas){
    var imgData=canvas.toDataURL('image/jpeg',0.95);
    var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var pw=pdf.internal.pageSize.getWidth();
    var ph=pdf.internal.pageSize.getHeight();
    var iw=canvas.width,ih=canvas.height;
    var ratio=iw/ih;
    var w=pw,h=pw/ratio;
    if(h>ph){h=ph;w=ph*ratio;}
    var x=(pw-w)/2,y=(ph-h)/2;
    pdf.addImage(imgData,'JPEG',x,y,w,h,undefined,'FAST');
    pdf.save('ficha_belle_'+(fichaData?fichaData.nombre_completo.replace(/[^a-z0-9]/gi,'_').toLowerCase():Date.now())+'.pdf');
    btn.textContent='📄 Exportar PDF';btn.disabled=false;
  });
}
