<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Distribuidora Belle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf8f4;--white:#fff;--charcoal:#1a1a1a;--mid:#555;--light:#999;--border:#e8e3db;--accent:#c4965a;--accent-light:#fdf5ea;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:"DM Sans",sans-serif;color:var(--charcoal);min-height:100vh}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:"Cormorant Garamond",serif;font-size:1.7rem;font-weight:600;letter-spacing:.04em}
.logo span{color:var(--accent)}
.cart-btn{background:var(--charcoal);color:#fff;border:none;border-radius:8px;padding:.5rem 1.2rem;font-family:"DM Sans",sans-serif;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:background .2s}
.cart-btn:hover{background:var(--accent)}
.cart-count{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:600}
.carousel{position:relative;width:100%;height:260px;overflow:hidden;background:#1a1a1a}
.carousel-track{display:flex;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.cslide{min-width:100%;height:100%;position:relative;flex-shrink:0}
.cslide img{width:100%;height:100%;object-fit:cover;opacity:.88}
.cslide-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.75) 0%,rgba(0,0,0,.45) 40%,rgba(0,0,0,.1) 65%,transparent 80%);display:flex;align-items:center;padding:0 3rem}
.cslide-txt{color:#fff;max-width:400px}
.cslide-title{font-family:"Cormorant Garamond",serif;font-size:1.9rem;font-weight:600;line-height:1.2;margin-bottom:.4rem;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.cslide-sub{font-size:.85rem;opacity:.88;line-height:1.4}
.cslide-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;background:linear-gradient(135deg,#1a1a2e,#2d2d44)}
.cslide-ph-num{font-family:"Cormorant Garamond",serif;font-size:3rem;color:var(--accent);opacity:.4}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.3);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background .2s;z-index:10}
.car-btn:hover{background:rgba(255,255,255,.38)}
.car-prev{left:.9rem}.car-next{right:.9rem}
.car-dots{position:absolute;bottom:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.45rem;z-index:10}
.car-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .25s;border:none;padding:0}
.car-dot.act{background:#fff;width:22px;border-radius:4px}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--white);padding:0 2rem}
.tab{padding:.9rem 1.5rem;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--light);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.act{color:var(--charcoal);border-bottom-color:var(--accent)}
.filters{background:var(--white);padding:.75rem 2rem;border-bottom:1px solid var(--border);display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px;max-width:300px}
.sw input{width:100%;padding:.48rem .8rem .48rem 2rem;border:1px solid var(--border);border-radius:6px;font-family:"DM Sans",sans-serif;font-size:.84rem;background:var(--cream);outline:none}
.sw input:focus{border-color:var(--accent)}
.sw-i{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--light);font-size:.85rem}
.fsel{padding:.48rem .75rem;border:1px solid var(--border);border-radius:6px;font-family:"DM Sans",sans-serif;font-size:.82rem;background:var(--cream);outline:none;cursor:pointer}
.pills{display:flex;gap:.35rem;flex-wrap:wrap}
.pill{padding:.32rem .75rem;border-radius:20px;border:1px solid var(--border);font-size:.78rem;cursor:pointer;transition:all .15s;background:var(--cream);color:var(--mid)}
.pill.act{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.rcount{margin-left:auto;font-size:.78rem;color:var(--light);white-space:nowrap}
.lw{padding:1.2rem 1.5rem 6rem;max-width:1100px;margin:0 auto}
.list{display:flex;flex-direction:column;gap:.55rem}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);display:flex;align-items:stretch;overflow:visible;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 3px 18px rgba(0,0,0,.07);transform:translateY(-1px)}
.card.nostock{opacity:.45}
.cimg{width:100px;min-width:100px;background:#f5f2ee;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0;border-radius:10px 0 0 10px}
.cimg img{width:100%;height:100%;object-fit:cover;display:none}
.ciph{display:flex;flex-direction:column;align-items:center;gap:.3rem;color:#ccc;font-size:2rem}
.ciph span{font-size:.6rem;color:#bbb}
.ssrib{position:absolute;top:8px;left:-20px;background:#999;color:#fff;font-size:.55rem;font-weight:600;padding:2px 22px;transform:rotate(-45deg);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.cinfo{flex:1;padding:.65rem .85rem;display:flex;flex-direction:column;justify-content:flex-start;gap:.2rem;min-width:0;padding-top:.75rem}
.cbrand{font-size:.68rem;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.cname{font-family:"Cormorant Garamond",serif;font-size:1.05rem;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cgen{font-size:.72rem;color:var(--mid)}
.ntog{font-size:.72rem;color:var(--accent);cursor:pointer;display:inline-block;margin-top:.1rem}
.ntext{font-size:.71rem;color:var(--mid);line-height:1.6;display:none;margin-top:.3rem;background:#f8f5f0;padding:.5rem .65rem;border-radius:5px;border-left:2px solid var(--accent)}
.ntext.open{display:block}
.cright{width:360px;min-width:360px;padding:.7rem .85rem;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:.45rem;flex-shrink:0}
/* Top row: 3 prices + decan all inline */
.prices-row{display:flex;gap:.22rem;align-items:stretch;flex-wrap:nowrap}
.popt{flex:1;padding:.35rem .1rem;border:1px solid var(--border);border-radius:5px;text-align:center;background:var(--cream);transition:all .25s;min-width:0}
.popt.lit{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px rgba(196,150,90,.15);transform:translateY(-1px)}
.popt.lit .pov{color:var(--accent)}
.popt.dis{opacity:.3}
.pol{font-size:.5rem;color:var(--light);display:block;margin-bottom:.08rem;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap}
.pov{font-size:.72rem;font-weight:600;color:var(--charcoal);transition:color .2s;white-space:nowrap}
.decan-sep{width:1px;background:var(--border);margin:0 .05rem;flex-shrink:0;align-self:stretch}
/* Decan block: price left, controls right, all in one horizontal row */
.dc-wrap{display:flex;align-items:center;gap:.28rem;flex-shrink:0;background:linear-gradient(135deg,#f5ede0,#fdf8f2);border:1px solid var(--accent);border-radius:5px;padding:.32rem .38rem}
.dc-price{text-align:center;flex-shrink:0}
.dc-qty{display:flex;align-items:center;gap:.12rem;flex-shrink:0}
.dc-btn{width:14px;height:14px;border:1px solid rgba(196,150,90,.4);border-radius:2px;background:transparent;color:var(--accent);cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;padding:0;flex-shrink:0}
.dc-btn:hover{background:var(--accent);color:#fff}
.dc-num{font-size:.68rem;font-weight:700;color:var(--accent);min-width:12px;text-align:center}
.dc-add{font-size:.52rem;padding:.1rem .25rem;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;font-weight:600;flex-shrink:0}
.dc-add:hover{opacity:.85}
.dc-tag{font-size:.55rem;color:var(--accent);white-space:nowrap}
.decan-box{background:linear-gradient(135deg,#f5ede0,#fdf8f2);border:1px solid var(--accent);border-radius:6px;padding:.38rem .35rem;text-align:center;min-width:62px;max-width:72px;flex-shrink:0;transition:all .2s}
.decan-lbl{font-size:.48rem;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:.05rem;font-weight:600;white-space:nowrap}
.decan-val{font-size:.72rem;font-weight:600;color:var(--accent);white-space:nowrap}
/* Decan qty row - compact */
.decan-qty-row{display:flex;align-items:center;gap:.3rem;padding:.28rem .4rem;background:var(--accent-light);border:1px solid rgba(196,150,90,.25);border-radius:5px}
.decan-qty-lbl{font-size:.65rem;color:var(--accent);font-weight:500;white-space:nowrap}
.dq-ctrl{display:flex;align-items:center;border:1px solid rgba(196,150,90,.4);border-radius:4px;overflow:hidden}
.dqb{width:20px;height:20px;border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.dqb:hover{background:rgba(196,150,90,.15)}
.dqn{width:22px;text-align:center;font-size:.78rem;font-weight:600;color:var(--accent)}
.decan-add-btn{font-size:.68rem;padding:.18rem .45rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:500;white-space:nowrap}
.decan-warn{font-size:.6rem;color:rgba(196,150,90,.75);font-style:italic;line-height:1.3}
.qrow{display:flex;align-items:center;gap:.4rem}
.qctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.qb{width:26px;height:26px;border:none;background:var(--cream);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qb:hover{background:var(--accent-light)}
.qn{width:26px;text-align:center;font-size:.85rem;font-weight:500}
.abtn{flex:1;padding:.38rem .35rem;background:var(--charcoal);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.75rem;font-weight:500;transition:background .15s;white-space:nowrap}
.abtn:hover{background:var(--accent)}
.abtn:disabled{background:#ccc;cursor:not-allowed}
.icb{font-size:.68rem;color:var(--accent);font-weight:500}
.price-applied{font-size:.67rem;color:var(--accent);font-weight:500;padding:.12rem .35rem;background:var(--accent-light);border-radius:4px;border:1px solid rgba(196,150,90,.25)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:none}
.ov.open{display:block}
.drawer{position:fixed;right:-440px;top:0;bottom:0;width:420px;max-width:100vw;background:var(--white);z-index:201;transition:right .3s ease;display:flex;flex-direction:column;box-shadow:-4px 0 30px rgba(0,0,0,.1)}
.drawer.open{right:0}
.dh{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.dt{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:600}
.xb{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--mid)}
.db{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cemp{text-align:center;color:var(--light);padding:3rem 1rem;font-size:.9rem}
.ci{padding:.75rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:.7rem}
.cin{font-size:.84rem;font-weight:500;margin-bottom:.15rem;line-height:1.3}
.cid{font-size:.73rem;color:var(--mid)}
.ciupg{font-size:.71rem;color:#2a7a2a;margin-top:.18rem;font-weight:500}
.cip{font-size:.88rem;font-weight:500;white-space:nowrap}
.crm{background:none;border:none;color:var(--light);cursor:pointer;font-size:.95rem;padding:0 .2rem}
.crm:hover{color:#c33}
.df{padding:1.2rem 1.5rem;border-top:1px solid var(--border)}
.ctot{display:flex;justify-content:space-between;font-size:1rem;font-weight:500;margin-bottom:.8rem}
.ctot span:last-child{font-family:"Cormorant Garamond",serif;font-size:1.2rem}
.warn-decan{background:#fff8ec;border:1px solid #f0c060;border-radius:7px;padding:.6rem .9rem;font-size:.77rem;color:#7a5000;margin-bottom:.7rem}
.upg-banner{background:#f0fff4;border:1px solid #6fcf97;border-radius:7px;padding:.6rem .9rem;font-size:.77rem;color:#1a5c2a;margin-bottom:.7rem}
.wa-btn{width:100%;padding:.82rem;background:#25D366;color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.93rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s}
.wa-btn:hover{background:#1fc05a}
.wa-btn:disabled{background:#bbb;cursor:not-allowed}
.loading-screen{display:flex;align-items:center;justify-content:center;padding:4rem;flex-direction:column;gap:1rem;color:var(--light)}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wa-float{position:fixed;bottom:1.5rem;left:1.5rem;z-index:150;display:flex;align-items:center;gap:.55rem;background:#25D366;color:#fff;padding:.65rem 1.1rem .65rem .8rem;border-radius:50px;box-shadow:0 4px 20px rgba(37,211,102,.4);cursor:pointer;border:none;font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:500;transition:all .25s;text-decoration:none;animation:wa-pulse 2.5s infinite}
.wa-float:hover{background:#1fc05a;transform:translateY(-2px)}
@keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4)}50%{box-shadow:0 4px 28px rgba(37,211,102,.65)}}
@media(max-width:480px){.wa-float span{display:none}.wa-float{padding:.7rem;border-radius:50%}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(70px);background:var(--charcoal);color:#fff;padding:.65rem 1.3rem;border-radius:8px;font-size:.83rem;z-index:400;transition:transform .28s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:1100px){.cright{width:320px;min-width:320px}}
@media(max-width:900px){.cright{width:290px;min-width:290px}}
@media(max-width:680px){header,.tabs,.filters{padding-left:1rem;padding-right:1rem}.lw{padding:1rem 1rem 5rem}.cright{width:220px;min-width:220px}.cimg{width:80px;min-width:80px}.drawer{width:100vw}.carousel{height:155px}.cslide-title{font-size:1.3rem}.cslide-ov{padding:0 1.2rem}.pov{font-size:.68rem}.decan-box{min-width:52px}}
@media(max-width:480px){.card{flex-direction:column}.cimg{width:100%;height:160px;min-width:unset;background:#fff}.cimg img{object-fit:contain;padding:8px}.cright{width:100%;min-width:unset;border-left:none;border-top:1px solid var(--border)}.prices-row{flex-wrap:wrap}.tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 1rem;flex-shrink:0}.tabs::-webkit-scrollbar{display:none}.tab{white-space:nowrap;padding:.9rem 1rem;font-size:.82rem;flex-shrink:0}header{position:sticky;top:0;z-index:1000;-webkit-position:sticky}}

.ac-tog{font-size:.72rem;color:var(--accent);cursor:pointer;margin-top:.1rem;display:inline-block}
.ac-wrap{margin-top:.5rem;padding:.65rem .7rem;background:var(--sur2);border-radius:8px;border:1px solid var(--bd)}@media(min-width:481px){.ac-bar-wrap{height:13px}.ac-label{font-size:.51rem;min-width:82px}.ac-pct{font-size:.47rem;min-width:21px}.ac-row{margin-bottom:.21rem}.ac-wrap{padding:.49rem .53rem}}
.ac-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.38rem}
.ac-label{font-size:.68rem;color:var(--tx2);min-width:110px;text-align:right;flex-shrink:0;font-weight:500}
.ac-bar-wrap{flex:1;height:18px;background:rgba(128,128,128,.15);border-radius:20px;overflow:hidden;position:relative}
.ac-bar{height:100%;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1);min-width:6px;width:0%}
.ac-pct{font-size:.63rem;color:var(--tx3);min-width:28px;text-align:right}
</style>
</head>
<body>
<header>
  <div class="logo">Distribuidora <span>Belle</span></div>
  <button class="cart-btn" onclick="toggleCart()">Mi pedido <span class="cart-count" id="cartCount">0</span></button>
</header>
<div class="carousel" id="carousel">
  <div class="carousel-track" id="carTrack"></div>
  <button class="car-btn car-prev" onclick="carMove(-1)">&#8249;</button>
  <button class="car-btn car-next" onclick="carMove(1)">&#8250;</button>
  <div class="car-dots" id="carDots"></div>
</div>
<div class="tabs" id="tabsContainer"><div class="tab act" onclick="switchTab('arabes',this)">Arabes</div><div class="tab" onclick="switchTab('internacionales',this)">Internacionales</div></div>
<div class="filters" id="catFilters">
  <div class="sw"><span class="sw-i">&#128269;</span><input type="text" id="srch" placeholder="Buscar perfume..." oninput="applyFilters()"></div>
  <button id="btnAcordesPanel" onclick="toggleAcordesPanel()" style="display:flex;align-items:center;gap:.4rem;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:20px;padding:.3rem .85rem;font-size:.72rem;cursor:pointer;white-space:nowrap">&#127800; Acordes<span id="acordesBadge" style="display:none;background:var(--accent);color:#fff;border-radius:10px;padding:.05rem .35rem;font-size:.62rem;font-weight:700;min-width:16px;text-align:center"></span></button>
  <select class="fsel" id="brandFilter" onchange="applyFilters()"><option value="">Todas las marcas</option></select>
  <div class="pills">
    <div class="pill act" onclick="setGen('',this)">Todos</div>
    <div class="pill" onclick="setGen('fem',this)">Mujer</div>
    <div class="pill" onclick="setGen('mas',this)">Hombre</div>
    <div class="pill" onclick="setGen('U',this)">Unisex</div>
    <div class="pill pill-kit" onclick="setKit(this)" style="background:transparent;border:1px solid rgba(184,158,110,.5);color:#b89e6e">&#127873; Kit</div>
  </div>
  <span class="rcount" id="rcount"></span>
</div>
<div <div id="acordesPanel" style="display:none;background:#faf8f4;border:1px solid #e8e3db;border-radius:12px;margin:.4rem 0 .6rem;padding:.9rem 1rem;box-shadow:0 4px 20px rgba(0,0,0,.07)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem">
    <div>
      <span style="font-weight:600;color:#c4965a;font-size:.82rem">&#127800; Acordes y notas</span>
      <span style="font-size:.65rem;color:#aaa;margin-left:.5rem">Tocá los que querés que tenga tu perfume</span>
    </div>
    <div style="display:flex;gap:.4rem;align-items:center">
      <button id="btnLimpiarAcordes" onclick="limpiarAcordes()" style="display:none;background:transparent;border:1px solid #e8e3db;color:#aaa;border-radius:6px;padding:.15rem .45rem;font-size:.65rem;cursor:pointer">Limpiar</button>
      <button onclick="toggleAcordesPanel()" style="background:transparent;border:none;color:#ccc;font-size:1rem;cursor:pointer;line-height:1;padding:.1rem .3rem">&#10005;</button>
    </div>
  </div>
  <div id="acordesSeleccionados" style="display:none;margin-bottom:.6rem;padding:.4rem .6rem;background:#fdf5ea;border-radius:8px;border:1px solid #ead9a8">
    <div style="font-size:.63rem;color:#aaa;margin-bottom:.28rem;font-style:italic">Filtrando por:</div>
    <div id="acordesTagsSeleccionados" style="display:flex;flex-wrap:wrap;gap:.25rem"></div>
  </div>
  <div style="margin-bottom:.5rem">
    <input id="acordesPanelSearch" type="text" placeholder="Buscar acorde..." oninput="renderAcordesPanel(this.value)" style="width:100%;box-sizing:border-box;background:#fff;border:1px solid #e8e3db;border-radius:8px;padding:.32rem .6rem;color:#1a1a1a;font-size:.73rem;outline:none">
  </div>
  <div id="acordesPanelGrid" style="display:flex;flex-wrap:wrap;gap:.26rem;max-height:160px;overflow-y:auto;padding:.05rem"></div>
  <div style="margin-top:.85rem;padding-top:.75rem;border-top:1px solid #ede9e3">
    <div style="font-size:.65rem;color:#aaa;font-style:italic;margin-bottom:.35rem">Notas olfativas — escribí para buscar:</div>
    <div style="position:relative">

function fmt(n){return n?("$"+Math.round(n).toLocaleString("es-AR")):"-";}

function calcP(p){
  var ct=(p.costo_ind||0)+(p.costo_log||0);
  var gm=p.gan_usd_may||0,ge=p.gan_usd_med||0;
  var pm=ct>0||gm>0?Math.round((ct+gm)*cotizActual/100)*100:(p.precio_may_ars||0);
  var pe=ct>0||ge>0?Math.round((ct+gm+ge)*cotizActual/100)*100:(p.precio_med_ars||0);
  var ml=p.precio_ml||0;
  var pi=ml>0?Math.round((ml+pe)/2/100)*100:(p.precio_min_ars||pe);
  // If product has a manual price for its tab, use it for x1
  if(p.precio_pestana&&p.precio_pestana>0)pi=p.precio_pestana;
  var decan=pi>0?(Math.ceil(pi*0.1/1000)*1000+3000):0;
  return{pm:pm,pe:pe,pi:pi,decan:decan};
}

// Sort: in-stock alphabetical first, then no-stock alphabetical
function sortedProds(arr){
  var withStock=arr.filter(function(p){return(p.stock_actual||0)>0;});
  var noStock=arr.filter(function(p){return(p.stock_actual||0)===0;});
  function byName(a,b){
    var ba=getBrand(a.nombre).toLowerCase(),bb=getBrand(b.nombre).toLowerCase();
    if(ba<bb)return-1;if(ba>bb)return 1;
    return a.nombre.toLowerCase()<b.nombre.toLowerCase()?-1:1;
  }
  withStock.sort(byName);noStock.sort(byName);
  return withStock.concat(noStock);
}

function getTabProds(){
  if(curTab==="arabes")return allProds.filter(function(p){return p.cat_catalogo==="arabes"||(!p.cat_catalogo&&!p.pestana_id);});
  if(curTab==="internacionales")return allProds.filter(function(p){return p.cat_catalogo==="internacionales";});
  if(curTab==="ofertas"){
    // Ofertas: combos + productos con precio manual en pestana ofertas
    return allProds.filter(function(p){
      var tab=pestanasCatalogo.find(function(t){return t.slug==="ofertas";});
      return tab&&p.pestana_id===tab.id;
    });
  }
  // Dynamic tab
  var tab=pestanasCatalogo.find(function(t){return t.slug===curTab;});
  if(!tab)return [];
  return allProds.filter(function(p){return p.pestana_id===tab.id;});
}

function applyFilters(){
  var q=(document.getElementById("srch").value||"").toLowerCase();
  var brand=document.getElementById("brandFilter").value;
  var filtered=getTabProds().filter(function(p){
    if(genF){var g=p.genero||"";if(genF==="fem"&&g.indexOf("\u2640")<0)return false;if(genF==="mas"&&g.indexOf("\u2642")<0)return false;if(genF==="U"&&g!=="U")return false;}
    if(kitF&&p.nombre.toLowerCase().indexOf(" kit")<0&&p.nombre.toLowerCase().indexOf("kit|")< 0&&p.nombre.toLowerCase().indexOf("kit ")< 0)return false;
    if(brand&&!p.nombre.startsWith(brand))return false;
    if(q){
      var enNombre=p.nombre.toLowerCase().indexOf(q)>=0;
      var enEmpresa=(p.empresa||"").toLowerCase().indexOf(q)>=0;
      var enNotas=(p.notas||"").toLowerCase().indexOf(q)>=0;
      var enAcordes=Array.isArray(p.acordes)&&p.acordes.some(function(a){return(a.nombre||"").toLowerCase().indexOf(q)>=0;});
      if(!enNombre&&!enEmpresa&&!enNotas&&!enAcordes)return false;
    }
    if(_acordesFiltro&&_acordesFiltro.length){
      var match=_acordesFiltro.every(function(ac){
        var lbl=ACORDES_LABELS[ac]||ac;
        var inAcordes=Array.isArray(p.acordes)&&p.acordes.some(function(a){return(a.nombre||a||"").toLowerCase().indexOf(lbl.toLowerCase())>=0;});
        var inNotas=(p.notas||"").toLowerCase().indexOf(lbl.toLowerCase())>=0;
        return inAcordes||inNotas;
      });
      if(!match)return false;
    }
    var notasQ=(document.getElementById("notasSearchInput")||{value:""}).value.toLowerCase().trim();
    if(notasQ){
      var inN=(p.notas||"").toLowerCase().indexOf(notasQ)>=0;
      var inNom=p.nombre.toLowerCase().indexOf(notasQ)>=0;
      if(!inN&&!inNom)return false;
    }
    if(_notasFiltro&&_notasFiltro.length){var mn=_notasFiltro.every(function(nota){return(p.notas||"").toLowerCase().indexOf(nota.toLowerCase())>=0||(p.nombre||"").toLowerCase().indexOf(nota.toLowerCase())>=0;});if(!mn)return false;}
    return true;
  });
  document.getElementById("rcount").textContent=filtered.length+" productos";
  renderCombosEnCatalogo();
  renderList(sortedProds(filtered));
}

function formatNotas(raw){
  if(!raw||!raw.trim())return "";
  var txt=raw.replace(/\r/g,"");
  // Split on newlines OR on "Notas de X:" pattern within same line
  var keywords=["Notas de salida","Notas de coraz\u00f3n","Notas de corazon","Notas de fondo","Notas de cabeza","Notas de base","Notas de inicio","El set incluye"];
  // Insert newline before each keyword that appears mid-text
  keywords.forEach(function(kw){
    var re=new RegExp('(?<!^)(?='+kw+')','gi');
    txt=txt.replace(re,'\n');
  });
  var parts=txt.split(/\\n|\n/);
  var html="";
  parts.forEach(function(line){
    line=line.trim();
    if(!line)return;
    var low=line.toLowerCase();
    var isHeader=
      low.indexOf("notas de salida")===0||
      low.indexOf("notas de coraz")===0||
      low.indexOf("notas de fondo")===0||
      low.indexOf("notas de cabeza")===0||
      low.indexOf("notas de base")===0||
      low.indexOf("notas de inicio")===0||
      low.indexOf("el set incluye")===0;
    if(isHeader){
      var colonIdx=line.indexOf(":");
      var header=colonIdx>-1?line.slice(0,colonIdx).trim():line.trim();
      var rest=colonIdx>-1?line.slice(colonIdx+1).trim():"";
      html+="<div style='margin-top:.35rem'><strong style='color:var(--charcoal)'>"+escHtml(header)+":</strong>"+(rest?" "+escHtml(rest):"")+"</div>";
    } else {
      html+="<div style='margin-top:.15rem'>"+escHtml(line)+"</div>";
    }
  });
  return html;
}
function escHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function chgDecan(id,delta){
  if(decanState[id]===undefined)decanState[id]=0;
  var nv=decanState[id]+delta;
  if(nv<0)nv=0;
  decanState[id]=nv;
  var el=document.getElementById("dq-"+id);
  if(el)el.textContent=nv;
}

function addDecan(id){
  var p=allProds.find(function(x){return x.id===id;});if(!p)return;
  var r=calcP(p);
  var dq=decanState[id]||0;
  if(dq<=0){showToast("Selecciona la cantidad de decans");return;}
  // No minimum validation here - validated only at checkout (sendWA)
  cart["decan_"+id]={id:"decan_"+id,nombre:p.nombre+" (Decan 5ml)",qty:dq,seg:"decan",precio:r.decan,pData:{pm:r.pm,pe:r.pe,pi:r.pi},isDecan:true,prodId:id};
  updateCartCount();showToast("Decan agregado");applyFilters();
}

function chgQty(id,delta){
  if(!cstate[id])cstate[id]={qty:0};
  var nq=cstate[id].qty+delta;
  if(nq<0)return;
  var p=allProds.find(function(x){return x.id===id;});
  var stockDisp=p?(p.stock_actual||0):0;
  if(nq>stockDisp){
    showToast("Solo hay "+stockDisp+" unidades disponibles");
    nq=stockDisp;
    if(nq<=cstate[id].qty)return;
  }
  cstate[id].qty=nq;
  var el=document.getElementById("qty_"+id);if(el)el.textContent=nq;
  if(p){
    var r=calcP(p);var ic=cart[id];
    var totalUnits=getCartTotalUnits()+nq-(ic&&!ic.isDecan?ic.qty:0);
    var bestSeg=nq>0?getBestSeg(totalUnits,r):"none";
    ["pm","pe","pi"].forEach(function(sg,i){var el2=document.querySelector("#card_"+id+" .prices-row .popt:nth-child("+(i+1)+")");if(el2&&!el2.classList.contains("dis"))el2.classList.toggle("lit",sg===bestSeg);});
    var card=document.getElementById("card_"+id);
    if(card){
      var pt=card.querySelector(".price-applied");
      var pn=bestSeg==="pm"?"Precio x10":bestSeg==="pe"?"Precio x3":bestSeg==="pi"?"Precio unitario":"";
      if(nq>0&&pn){if(pt)pt.textContent=pn+" aplicado";}else{if(pt)pt.textContent="";}
      var btn=card.querySelector(".abtn");if(btn)btn.disabled=(stockDisp===0||nq===0);
    }
  }
}
function addCart(id){
  var st=cstate[id]||{qty:0};if(st.qty===0){showToast("Pone una cantidad primero");return;}
  var p=allProds.find(function(x){return x.id===id;});if(!p)return;
  var stockDisp=p.stock_actual||0;
  if(st.qty>stockDisp){
    showToast("Solo hay "+stockDisp+" unidades disponibles");
    cstate[id].qty=stockDisp;
    var el=document.getElementById("qty_"+id);if(el)el.textContent=stockDisp;
    return;
  }
  var r=calcP(p);
  var totalUnits=getCartTotalUnits()+st.qty-(cart[id]&&!cart[id].isDecan?cart[id].qty:0);
  var seg=getBestSeg(totalUnits,r);var price=r[seg]||r.pi;

function validarGruposMinimos(cartItems, allProds){
  // Perfumes normales (no decan, no combo, no min_grupo)
  var perfsNormales=0;
  cartItems.forEach(function(item){
    if(item.isDecan||item.isCombo) return;
    var p=allProds.find(function(x){return x.id===item.id;});
    if(p&&!p.min_grupo) perfsNormales+=item.qty;
  });

  var grupos={};
  cartItems.forEach(function(item){
    if(item.isDecan||item.isCombo)return;
    var p=allProds.find(function(x){return x.id===item.id;});
    if(!p||!p.min_grupo||!p.min_cantidad)return;
    var g=p.min_grupo;
    if(!grupos[g])grupos[g]={min:p.min_cantidad,total:0};
    grupos[g].total+=item.qty;
  });
  var errores=[];
  Object.keys(grupos).forEach(function(g){
    var gd=grupos[g];
    var totalEfectivo=gd.total+perfsNormales;
    if(totalEfectivo<gd.min){
      var falta=gd.min-totalEfectivo;
      errores.push('El grupo "'+g+'" requiere minimo '+gd.min+' unidades en total. Llevas '+gd.total+' del grupo'+(
        perfsNormales>0?' + '+perfsNormales+' perfumes = '+totalEfectivo:''
      )+'. Falta'+(falta===1?' 1 unidad':' '+falta+' unidades')+' (pueden ser otros perfumes).');
    }
  });
  return errores;
}

function sendWA(){
  var items=Object.values(cart);if(!items.length)return;
  var minErrors=validarGruposMinimos(Object.values(cart),allProds);
  if(minErrors.length){showToast(minErrors[0]);return;}
  var perfs=items.filter(function(i){return !i.isDecan;});
  var decans=items.filter(function(i){return i.isDecan;});
  var totalUnits=perfs.reduce(function(s,i){return s+i.qty;},0);
  var totalDecans=decans.reduce(function(s,i){return s+i.qty;},0);
  if(totalDecans>0&&totalUnits===0&&totalDecans<5){showToast("Si lleva unicamente Decans el minimo es 5. Con un perfume no hay minimo.");return;}
  // Validar stock disponible para cada producto
  for(var xi=0;xi<perfs.length;xi++){
    var pcheck=allProds.find(function(x){return x.id===perfs[xi].id;});
    if(pcheck&&perfs[xi].qty>((pcheck.stock_actual||0)+(pcheck.reserva||0))){
      showToast("Stock insuficiente: "+pcheck.nombre.split(" - ").pop());return;
    }
  }
  var total=0;var pedidoItems=[];
  var msg="Pedido Distribuidora Belle\n\n";
  var nroOrden="WEB-"+Math.floor(100000+Math.random()*900000);
  items.forEach(function(item){
    var price,sub,segL;
    if(item.isDecan){price=item.precio;sub=price*item.qty;segL="decan";}
    else if(item.isCombo){
      price=item.precio;sub=price*item.qty;segL="combo";
      var comboRef=combosPublicos.find(function(c){return c.id===item.comboId;});
      if(comboRef&&comboRef.combo_items)
        msg+="  _Incluye: "+(comboRef.combo_items||[]).map(function(ci){return"x"+ci.cantidad+" "+ci.producto_nombre;}).join(" + ")+"_\n";
    }
    else{
      var p=allProds.find(function(x){return x.id===item.id;});
      var r=p?calcP(p):{pm:item.pData.pm,pe:item.pData.pe,pi:item.pData.pi};
      var seg=getBestSeg(totalUnits,r);price=r[seg]||item.precio;sub=price*item.qty;
      segL=seg==="pm"?"x10":seg==="pe"?"x3":"x1";
    }
    total+=sub;
    msg+="- "+item.nombre+"\n  "+item.qty+" x "+fmt(price)+" ("+segL+") = "+fmt(sub)+"\n\n";
    pedidoItems.push({producto_id:item.isDecan?item.prodId:item.id,nombre:item.nombre,qty:item.qty,segmento:segL,precio:price,total:sub,isDecan:item.isDecan||false});
  });
  msg+="Orden: "+nroOrden+"\nTotal: "+fmt(total)+"\n\nHola! Quisiera hacer este pedido";
  // Build full items list including combos for the pedido record
  var allCartItems=Object.values(cart);
  var fullPedidoItems=[];
  allCartItems.forEach(function(item){
    if(item.isCombo){
      // Store combo as single line item
      fullPedidoItems.push({
        producto_id:null,combo_id:item.comboId,nombre:item.nombre,
        qty:item.qty,segmento:"combo",precio:item.precio,
        total:item.precio*item.qty,isDecan:false,isCombo:true
      });
    } else {
      var existing=pedidoItems.find(function(x){return x.producto_id===( item.isDecan?item.prodId:item.id);});
      fullPedidoItems.push(existing||{producto_id:item.isDecan?item.prodId:item.id,nombre:item.nombre,qty:item.qty,segmento:item.isDecan?"decan":"x1",precio:item.precio,total:item.precio*item.qty,isDecan:item.isDecan||false,isCombo:false});
    }
  });
  // Guardar pedido con todos los items
  apiPost("pedidos_catalogo",{items:fullPedidoItems,total:total,estado:"pendiente",confirmado_cobro:false,nro_orden:nroOrden}).then(function(){
    // Reservar stock: perfumes normales
    perfs.forEach(function(item){
      var p=allProds.find(function(x){return x.id===item.id;});
      if(!p||!item.id)return;
      var nuevoStock=Math.max(0,(p.stock_actual||0)-item.qty);
      var nuevaReserva=(p.reserva||0)+item.qty;
      p.stock_actual=nuevoStock; p.reserva=nuevaReserva;
      fetch(SB_URL+"/rest/v1/productos?id=eq."+item.id,{
        method:"PATCH",
        headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
        body:JSON.stringify({stock_actual:nuevoStock,reserva:nuevaReserva})
      }).catch(function(){});
    });
    // Reservar stock: productos dentro de combos
    allCartItems.filter(function(i){return i.isCombo;}).forEach(function(item){
      (item.comboItems||[]).forEach(function(ci){
        var p=allProds.find(function(x){return x.id===ci.producto_id;});
        if(!p)return;
        var cantTotal=ci.cantidad*item.qty;
        var nuevoStock=Math.max(0,(p.stock_actual||0)-cantTotal);
        var nuevaReserva=(p.reserva||0)+cantTotal;
        p.stock_actual=nuevoStock; p.reserva=nuevaReserva;
        fetch(SB_URL+"/rest/v1/productos?id=eq."+ci.producto_id,{
          method:"PATCH",
          headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
          body:JSON.stringify({stock_actual:nuevoStock,reserva:nuevaReserva})
        }).catch(function(){});
      });
    });
  }).catch(function(){});
  window.open("https://wa.me/"+waNumber+"?text="+encodeURIComponent(msg),"_blank");
  cart={};cstate={};decanState={};
  updateCartCount();
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("ov").classList.remove("open");
  showToast("Pedido enviado! Orden: "+nroOrden);
}
