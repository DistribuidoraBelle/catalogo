<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test Gastos</title>
<style>body{font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;font-size:13px}.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}pre{background:#2a2a2a;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:11px}button{background:#c4965a;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin:4px}</style>
</head>
<body>
<h2>🔍 Debug Gastos</h2>
<button onclick="test()">▶ EJECUTAR</button>
<div id="out"></div>
<script>
const O=document.getElementById('out');
const log=(m,c='')=>{O.innerHTML+=`<div class="${c}">${m}</div>`;};

async function test(){
  O.innerHTML='';
  const html=await fetch('/belle.html',{cache:'no-store'}).then(r=>r.text());
  const js=html.slice(html.indexOf('//<![CDATA[')+11,html.indexOf('//]]>'));

  // Extraer SB_URL y SB_KEY
  const sbUrl=js.match(/var SB_URL\s*=\s*['"]([^'"]+)['"]/)?.[1];
  const sbKey=js.match(/var SB_KEY\s*=\s*['"]([^'"]+)['"]/)?.[1];
  log('SB_URL: '+sbUrl,'ok');

  const headers={'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json'};

  // Test 1: traer gastos sin ningún filtro
  log('<br><b>Test 1: gastos_vendedor sin filtros (limit 5)</b>');
  const r1=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=id,vendedor_id,monto,aprobado,concepto,periodo_cerrado&limit=5',{headers}).then(r=>r.json());
  log('Resultado: <pre>'+JSON.stringify(r1,null,2)+'</pre>');

  // Test 2: gastos con periodo_cerrado=is.null
  log('<br><b>Test 2: gastos periodo_cerrado=is.null</b>');
  const r2=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=id,vendedor_id,monto,aprobado,concepto,periodo_cerrado&periodo_cerrado=is.null&limit=10',{headers}).then(r=>r.json());
  log('Cantidad: '+r2.length,'ok');
  log('Primer registro: <pre>'+JSON.stringify(r2[0],null,2)+'</pre>');

  // Test 3: gastos aprobados=true
  log('<br><b>Test 3: gastos aprobado=eq.true</b>');
  const r3=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=id,vendedor_id,monto,aprobado&aprobado=eq.true&limit=10',{headers}).then(r=>r.json());
  log('Cantidad aprobados: '+r3.length,'ok');

  // Test 4: ver exactamente qué campos tiene la tabla
  log('<br><b>Test 4: un gasto completo</b>');
  const r4=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=*&limit=1',{headers}).then(r=>r.json());
  if(r4.length) log('Campos: <pre>'+JSON.stringify(Object.keys(r4[0]))+'</pre>');
  log('Valor completo: <pre>'+JSON.stringify(r4[0],null,2)+'</pre>');

  // Test 5: el apiGet de belle.html exactamente
  log('<br><b>Test 5: query exacta de loadResumenPeriodoActual</b>');
  const r5=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=vendedor_id,monto,aprobado,concepto,estado_comision&periodo_cerrado=is.null',{headers}).then(r=>r.json());
  log('Cantidad con query exacta: '+r5.length,'ok');
  if(Array.isArray(r5)){
    const aprobados=r5.filter(x=>x.aprobado);
    log('De esos, aprobados: '+aprobados.length,'ok');
    log('Por vendedor: David='+aprobados.filter(x=>x.vendedor_id===1).length+' Facu='+aprobados.filter(x=>x.vendedor_id===2).length+' Marcela='+aprobados.filter(x=>x.vendedor_id===3).length,'ok');
    if(aprobados.length) log('Primeros: <pre>'+JSON.stringify(aprobados.slice(0,3),null,2)+'</pre>');
  } else {
    log('ERROR respuesta: <pre>'+JSON.stringify(r5)+'</pre>','err');
  }
}
</script>
</body>
</html>
