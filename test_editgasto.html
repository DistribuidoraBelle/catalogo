<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test Edit Gasto</title>
<style>body{font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;font-size:13px}.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}pre{background:#2a2a2a;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:11px}button{background:#c4965a;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin:4px}</style>
</head>
<body>
<h2>🔍 Test Edit Gasto</h2>
<button onclick="test()">▶ EJECUTAR</button>
<div id="out"></div>
<script>
const O=document.getElementById('out');
const log=(m,c='')=>{O.innerHTML+=`<div class="${c}">${m}</div>`;};

async function test(){
  O.innerHTML='';
  const html=await fetch('/belle.html',{cache:'no-store'}).then(r=>r.text());
  const js=html.slice(html.indexOf('//<![CDATA[')+11,html.indexOf('//]]>'));

  // 1. Ver el onclick generado en _recargarGastosAdmin
  log('<b>1. Código del onclick del botón Editar en _recargarGastosAdmin:</b>');
  const m=js.match(/onclick.*?_editarGastoAdmin[^'"\)]*|onclick.*?adminEditGastoModal[^'"<]*/g);
  if(m) m.forEach(x=>log('<pre>'+x+'</pre>'));
  else log('No encontrado','err');

  // 2. Extraer la línea exacta del botón Editar
  const idx=js.indexOf('Editar</button>');
  if(idx>=0) log('Línea del botón Editar: <pre>'+js.slice(Math.max(0,idx-200),idx+20).replace(/</g,'&lt;')+'</pre>','ok');

  // 3. Simular exactamente lo que genera el código con un gasto real
  const sbUrl=js.match(/var SB_URL\s*=\s*['"]([^'"]+)['"]/)?.[1];
  const sbKey=js.match(/var SB_KEY\s*=\s*['"]([^'"]+)['"]/)?.[1];
  const headers={'apikey':sbKey,'Authorization':'Bearer '+sbKey};
  
  log('<br><b>2. Traer un gasto real de Supabase:</b>');
  const gastos=await fetch(sbUrl+'/rest/v1/gastos_vendedor?select=*&limit=1',{headers}).then(r=>r.json());
  const g=gastos[0];
  log('Gasto: <pre>'+JSON.stringify(g,null,2)+'</pre>');

  // 4. Simular exactamente el onclick que genera _recargarGastosAdmin
  log('<br><b>3. onclick generado por el código actual:</b>');
  // Copiar exactamente la línea del código fuente
  const tgListCode=js.slice(js.indexOf('_recargarGastosAdmin'),js.indexOf('_recargarGastosAdmin')+3000);
  const btnMatch=tgListCode.match(/onclick='([^']+Gasto[^']+)'/);
  if(btnMatch){
    const template=btnMatch[1];
    // Evaluar el template con el gasto real
    const onclick=template.replace(/"\+g\.id\+"/g, g.id).replace(/"\+g\.monto\+"/g, g.monto).replace(/"\+encodeURIComponent\(g\.concepto\)\+"/g, encodeURIComponent(g.concepto));
    log('Template: <pre>'+template+'</pre>');
    log('Onclick generado: <pre>'+onclick+'</pre>');
    
    // Intentar parsear como JS
    try {
      new Function(onclick+';');
      log('✓ JS válido — el onclick funciona', 'ok');
    } catch(e) {
      log('✗ JS INVÁLIDO: '+e.message, 'err');
      log('Este es el error que hace que el botón no funcione', 'err');
    }
  } else {
    log('No encontré el onclick del botón Editar en _recargarGastosAdmin', 'err');
    // Mostrar el fragmento para debug
    const frag=tgListCode.slice(0,500);
    log('<pre>'+frag.replace(/</g,'&lt;')+'</pre>');
  }

  // 5. Verificar que adminEditGastoModal existe y funciona
  log('<br><b>4. adminEditGastoModal existe en belle.html:</b>');
  const exists=js.includes('function adminEditGastoModal(');
  log(exists ? '✓ Existe' : '✗ NO existe', exists?'ok':'err');

  // 6. Verificar que _geGuardar existe
  const exists2=js.includes('function _geGuardar(');
  log('_geGuardar existe: '+(exists2?'✓':'✗'), exists2?'ok':'err');

  // 7. Llamar adminEditGastoModal directamente en el iframe de belle.html
  log('<br><b>5. Test en iframe — llamar adminEditGastoModal('+g.id+') directo:</b>');
  const iframe=document.createElement('iframe');
  iframe.style.cssText='width:100%;height:400px;border:1px solid #444;border-radius:4px';
  document.body.appendChild(iframe);
  await new Promise(r=>{iframe.onload=r; iframe.src='/belle.html?t='+Date.now();});
  log('✓ belle.html cargado en iframe', 'ok');
  await new Promise(r=>setTimeout(r,1000));
  
  try {
    const iw=iframe.contentWindow;
    if(typeof iw.adminEditGastoModal==='function'){
      log('✓ adminEditGastoModal accesible en iframe', 'ok');
      iw.adminEditGastoModal(g.id);
      await new Promise(r=>setTimeout(r,2000));
      const overlay=iw.document.getElementById('_gedit');
      log(overlay ? '✓ Modal abierto correctamente — el bug NO está en adminEditGastoModal' : '✗ Modal NO apareció', overlay?'ok':'err');
      if(overlay) {
        log('Contenido del modal: <pre>'+overlay.innerHTML.slice(0,200).replace(/</g,'&lt;')+'</pre>');
        overlay.remove();
      }
    } else {
      log('✗ adminEditGastoModal no disponible en iframe (puede ser cross-origin)', 'warn');
    }
  } catch(e) {
    log('Error accediendo iframe: '+e.message, 'warn');
  }
}
</script>
</body>
</html>
