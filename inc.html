<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incidencias</title>
<style>
:root{--bg:#0f0f1a;--sur:#1a1a2e;--sur2:#22223a;--sur3:#2a2a45;--tx:#e8e8f0;--tx2:#b0b0c8;--tx3:#7070a0;--bd:#2a2a4a;--acc:#c4965a;--green:#3db87a;--red:#e05c6e;--yel:#f0c040;--cyan:#00bcd4;--r:8px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;padding:1rem;font-size:14px}
.card{background:var(--sur2);border-radius:var(--r);border:1px solid var(--bd);padding:.9rem 1rem;margin-bottom:.8rem}
.btn{padding:.3rem .7rem;border-radius:var(--rs);cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:.75rem;font-family:inherit}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn-green{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.btn-red{color:var(--red);border-color:var(--red)}
.fi{padding:.35rem .6rem;background:var(--sur3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:.78rem;font-family:inherit;width:100%}
.tabs{display:flex;gap:.3rem;margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tab{padding:.3rem .8rem;border-radius:var(--rs);cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-size:.72rem;font-family:inherit}
.tab.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.8rem}
.stat{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;text-align:center}
.n{font-size:1.2rem;font-weight:700}
.l{font-size:.58rem;color:var(--tx3);text-transform:uppercase}
.empty{text-align:center;padding:2rem;color:var(--tx3)}
#toast{position:fixed;bottom:1.2rem;right:1.2rem;padding:.6rem 1rem;border-radius:var(--r);font-size:.78rem;z-index:999;display:none;border:1px solid}
</style>
</head>
<body>
<div class="stats" id="stats">
  <div class="stat"><div class="n" style="color:var(--cyan)" id="s-falt">-</div><div class="l">Faltantes</div></div>
  <div class="stat"><div class="n" style="color:var(--red)" id="s-fall">-</div><div class="l">Fallados</div></div>
  <div class="stat"><div class="n" style="color:var(--yel)" id="s-devs">-</div><div class="l">Devoluciones</div></div>
  <div class="stat"><div class="n" style="color:var(--green)" id="s-hist">-</div><div class="l">Resueltos</div></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="setTab('faltantes',this)">📦 Faltantes</button>
  <button class="tab" onclick="setTab('fallados',this)">⚠️ Fallados</button>
  <button class="tab" onclick="setTab('devoluciones',this)">↩️ Devoluciones</button>
  <button class="tab" onclick="setTab('historial',this)">✅ Historial</button>
</div>
<div id="panel"><div class="empty">Cargando...</div></div>
<div id="toast"></div>

<script>
var SB='https://syylbuvjuekkanxynpps.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA';
var _tab='faltantes', _prods=[], _data={falt:[],fall:[],devs:[],hist:[],pedMap:{}};

function GET(t,q){
  return fetch(SB+'/rest/v1/'+t+'?'+q,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}}).then(function(r){
    if(!r.ok)throw new Error('GET '+t+' → '+r.status);
    return r.json();
  });
}
function PATCH(t,q,body){
  return fetch(SB+'/rest/v1/'+t+'?'+q,{
    method:'PATCH',
    headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok)return r.text().then(function(txt){throw new Error('PATCH '+t+' → '+r.status+': '+txt);});
  });
}
function POST(t,body){
  return fetch(SB+'/rest/v1/'+t,{
    method:'POST',
    headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok)return r.text().then(function(txt){throw new Error('POST '+t+' → '+r.status+': '+txt);});
  });
}

function toast(msg,err){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.style.display='block';
  el.style.background=err?'rgba(224,92,110,.15)':'rgba(61,184,122,.15)';
  el.style.borderColor=err?'var(--red)':'var(--green)';
  el.style.color=err?'var(--red)':'var(--green)';
  clearTimeout(window._toastT);
  window._toastT=setTimeout(function(){el.style.display='none';},3500);
}

function setTab(tab,btn){
  _tab=tab;
  document.querySelectorAll('.tab').forEach(function(b){b.className='tab';});
  if(btn)btn.className='tab on';
  render();
}

function load(){
  document.getElementById('panel').innerHTML='<div class="empty">Cargando...</div>';
  Promise.all([
    GET('pedidos_proveedor_items','select=id,pedido_id,nombre_proveedor,cantidad_pedida,cantidad_recibida,cantidad_fallada,producto_id,estado_item,observacion&estado_item=in.(faltante,fallado)&limit=500'),
    GET('pedidos_proveedor','select=id,nro_pedido,proveedor&limit=500'),
    GET('productos','select=id,nombre,stock_actual,en_viaje&activo=is.true&limit=2000'),
    GET('incidencias','select=*&order=created_at.desc&limit=300').catch(function(){return[];})
  ]).then(function(res){
    var items=res[0]||[], peds=res[1]||[];
    _prods=res[2]||[];
    var incAll=res[3]||[];
    var pedMap={};
    peds.forEach(function(p){pedMap[p.id]=p;});
    _data={
      falt:items.filter(function(i){return i.estado_item==='faltante';}),
      fall:items.filter(function(i){return i.estado_item==='fallado';}),
      devs:incAll.filter(function(i){return i.tipo==='devolucion'&&i.estado==='pendiente';}),
      hist:incAll.filter(function(i){return i.estado==='resuelto'||i.estado==='descartado';}),
      pedMap:pedMap
    };
    document.getElementById('s-falt').textContent=_data.falt.length;
    document.getElementById('s-fall').textContent=_data.fall.length;
    document.getElementById('s-devs').textContent=_data.devs.length;
    document.getElementById('s-hist').textContent=_data.hist.length;
    render();
  }).catch(function(e){
    document.getElementById('panel').innerHTML='<div class="empty" style="color:var(--red)">Error: '+e.message+'</div>';
  });
}

function render(){
  var p=document.getElementById('panel');
  if(_tab==='faltantes') renderFalt(p);
  else if(_tab==='fallados') renderFall(p);
  else if(_tab==='devoluciones') p.innerHTML='<div class="empty">Ejecutá el SQL de incidencias para activar devoluciones.</div>';
  else renderHist(p);
}

// ===== FALTANTES =====
function renderFalt(p){
  if(!_data.falt.length){p.innerHTML='<div class="empty">✅ Sin faltantes de pedidos</div>';return;}
  p.innerHTML=_data.falt.map(function(it){
    var ped=_data.pedMap[it.pedido_id];
    var cantFalt=Math.max(0,(it.cantidad_pedida||0)-(it.cantidad_recibida||0));
    var prod=_prods.find(function(p){return p.id===it.producto_id;});
    return '<div class="card" style="border-left:3px solid var(--cyan)">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.7rem">'+
        '<div>'+
          '<div style="font-weight:700;font-size:.88rem">'+it.nombre_proveedor+'</div>'+
          '<div style="font-size:.65rem;color:var(--tx3)">'+(ped?ped.nro_pedido+' — '+ped.proveedor:'Pedido #'+it.pedido_id)+'</div>'+
          (prod?
            '<div style="font-size:.65rem;color:var(--green);margin-top:.2rem">✅ '+prod.nombre+' &bull; Stock: '+prod.stock_actual+'u &bull; En viaje: '+(prod.en_viaje||0)+'u</div>':
            '<div style="font-size:.65rem;color:var(--yel);margin-top:.2rem">⚠️ Sin vincular al catálogo</div>')+
        '</div>'+
        '<div style="text-align:center;background:rgba(0,188,212,.1);border-radius:8px;padding:.4rem .9rem;flex-shrink:0">'+
          '<div style="font-size:.58rem;color:var(--tx3)">Faltante</div>'+
          '<div style="font-size:1.4rem;font-weight:700;color:var(--cyan)">'+cantFalt+'u</div>'+
        '</div>'+
      '</div>'+

      (prod&&cantFalt>0?
        '<div style="background:var(--sur3);border-radius:6px;padding:.65rem .8rem;margin-bottom:.6rem">'+
          '<div style="font-size:.68rem;font-weight:600;color:var(--tx3);margin-bottom:.4rem">📥 Llegaron unidades:</div>'+
          '<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">'+
            '<div style="display:flex;align-items:center;gap:.3rem">'+
              '<button onclick="cambiarCant(\'fc-'+it.id+'\','+cantFalt+',-1)" class="btn" style="padding:.2rem .5rem;font-size:1rem;line-height:1">−</button>'+
              '<input type="number" id="fc-'+it.id+'" value="'+cantFalt+'" min="0" max="'+cantFalt+'" class="fi" style="width:70px;text-align:center;font-size:1rem">'+
              '<button onclick="cambiarCant(\'fc-'+it.id+'\','+cantFalt+',1)" class="btn" style="padding:.2rem .5rem;font-size:1rem;line-height:1">+</button>'+
              '<span style="font-size:.7rem;color:var(--tx3)">de '+cantFalt+'u</span>'+
            '</div>'+
            '<button class="btn btn-green" onclick="agregarFalt('+it.id+','+prod.id+','+cantFalt+',\''+prod.nombre.replace(/'/g,'')+'\')">'+
              '✅ Confirmar y agregar al stock'+
            '</button>'+
          '</div>'+
        '</div>'
      :(!prod?'<div style="font-size:.7rem;color:var(--yel);margin-bottom:.6rem;padding:.4rem .6rem;background:var(--sur3);border-radius:6px">⚠️ Vinculá el producto al catálogo primero para poder agregar al stock</div>':'')+
      '')+

      '<div style="margin-bottom:.6rem">'+
        '<div style="font-size:.65rem;color:var(--tx3);margin-bottom:.25rem">📝 Nota de seguimiento:</div>'+
        '<div style="display:flex;gap:.4rem">'+
          '<input type="text" id="fo-'+it.id+'" value="'+(it.observacion||'')+'" placeholder="Ej: el proveedor confirmó que llega el martes..." class="fi">'+
          '<button class="btn" onclick="guardarObs('+it.id+',\'fo-'+it.id+'\')" style="white-space:nowrap;flex-shrink:0">💾 Guardar nota</button>'+
        '</div>'+
      '</div>'+

      '<button class="btn btn-red" onclick="noLlega('+it.id+')" style="font-size:.7rem">✗ Definitivamente no llegará — cerrar incidencia</button>'+
    '</div>';
  }).join('');
}

function cambiarCant(inputId, max, delta){
  var el=document.getElementById(inputId);
  if(!el)return;
  var v=parseInt(el.value)||0;
  el.value=Math.max(0,Math.min(max,v+delta));
}

function agregarFalt(itemId,prodId,cantMax,prodNom){
  var input=document.getElementById('fc-'+itemId);
  var cant=input?parseInt(input.value):cantMax;
  if(isNaN(cant)||cant<0){toast('Cantidad inválida',true);return;}
  if(cant===0){
    if(!confirm('Cantidad 0 — ¿marcar como que todavía no llegó nada y solo guardar nota?'))return;
    toast('Sin cambios de stock');return;
  }
  if(cant>cantMax){toast('No puede superar '+cantMax+'u',true);return;}
  if(!confirm('Agregar '+cant+'u de "'+prodNom+'" al stock'+(cant<cantMax?' (quedan '+(cantMax-cant)+'u pendientes)':'')+'?'))return;

  var prod=_prods.find(function(p){return p.id===prodId;});
  var sA=prod?prod.stock_actual||0:0;
  var nS=sA+cant;
  var nV=Math.max(0,(prod?prod.en_viaje||0:0)-cant);
  var quedan=cantMax-cant;
  if(prod){prod.stock_actual=nS;prod.en_viaje=nV;}

  Promise.all([
    PATCH('productos','id=eq.'+prodId,{stock_actual:nS,en_viaje:nV}),
    PATCH('pedidos_proveedor_items','id=eq.'+itemId,{
      estado_item:quedan>0?'faltante':'en_stock',
      cantidad_recibida:cant
    }),
    POST('movimientos_stock',{
      producto_id:prodId,
      producto_nombre:prodNom,
      tipo:'ingreso_faltante',
      cantidad:cant,
      stock_antes:sA,
      stock_despues:nS,
      motivo:'Llegó faltante de pedido'+(quedan>0?' (parcial, quedan '+quedan+'u)':''),
      usuario:'admin'
    })
  ]).then(function(){
    toast('✅ '+cant+'u agregadas al stock'+(quedan>0?' — quedan '+quedan+'u pendientes':''));
    load();
  }).catch(function(e){
    toast('Error: '+e.message,true);
    console.error(e);
  });
}

function guardarObs(itemId,inputId){
  var obs=document.getElementById(inputId).value;
  PATCH('pedidos_proveedor_items','id=eq.'+itemId,{observacion:obs})
    .then(function(){toast('✅ Nota guardada');})
    .catch(function(e){toast('Error: '+e.message,true);console.error(e);});
}

function noLlega(itemId){
  if(!confirm('Marcar como definitivamente no llegará y cerrar esta incidencia.\n¿Confirmar?'))return;
  PATCH('pedidos_proveedor_items','id=eq.'+itemId,{estado_item:'cancelado'})
    .then(function(){toast('Cerrado');load();})
    .catch(function(e){toast('Error: '+e.message,true);});
}

// ===== FALLADOS =====
function renderFall(p){
  if(!_data.fall.length){p.innerHTML='<div class="empty">✅ Sin fallados</div>';return;}
  p.innerHTML=_data.fall.map(function(it){
    var ped=_data.pedMap[it.pedido_id];
    var prod=_prods.find(function(p){return p.id===it.producto_id;});
    var cantFall=it.cantidad_fallada||0;
    return '<div class="card" style="border-left:3px solid var(--red)">'+
      '<div style="font-weight:700;font-size:.88rem">'+it.nombre_proveedor+'</div>'+
      '<div style="font-size:.65rem;color:var(--tx3)">'+(ped?ped.nro_pedido+' — '+ped.proveedor:'')+(prod?' &bull; '+prod.nombre:'')+'</div>'+
      '<div style="font-size:.75rem;color:var(--red);margin:.4rem 0">'+cantFall+'u falladas / rotas</div>'+
      '<div style="display:flex;gap:.4rem;flex-wrap:wrap">'+
        (prod&&cantFall>0?'<button class="btn btn-red" onclick="descontarFall('+it.id+','+prod.id+','+cantFall+',\''+prod.nombre.replace(/'/g,'')+'\')" style="font-size:.7rem">🗑 Descontar '+cantFall+'u del stock</button>':'')+
        '<button class="btn" onclick="resolverFall('+it.id+')" style="font-size:.7rem;color:var(--green);border-color:var(--green)">✓ Marcar como resuelto</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function descontarFall(itemId,prodId,cant,prodNom){
  if(!confirm('Descontar '+cant+'u falladas de "'+prodNom+'" del stock?'))return;
  var prod=_prods.find(function(p){return p.id===prodId;});
  var sA=prod?prod.stock_actual||0:0;
  var nS=Math.max(0,sA-cant);
  if(prod)prod.stock_actual=nS;
  Promise.all([
    PATCH('productos','id=eq.'+prodId,{stock_actual:nS}),
    PATCH('pedidos_proveedor_items','id=eq.'+itemId,{estado_item:'resuelto'}),
    POST('movimientos_stock',{producto_id:prodId,producto_nombre:prodNom,tipo:'baja_fallado',cantidad:-cant,stock_antes:sA,stock_despues:nS,motivo:'Baja por producto fallado en pedido',usuario:'admin'})
  ]).then(function(){toast('✅ '+cant+'u descontadas del stock');load();})
  .catch(function(e){toast('Error: '+e.message,true);});
}

function resolverFall(itemId){
  PATCH('pedidos_proveedor_items','id=eq.'+itemId,{estado_item:'resuelto'})
    .then(function(){toast('✅ Resuelto');load();})
    .catch(function(e){toast('Error: '+e.message,true);});
}

// ===== HISTORIAL =====
function renderHist(p){
  if(!_data.hist.length){p.innerHTML='<div class="empty">Sin historial de incidencias resueltas</div>';return;}
  p.innerHTML='<div class="card">'+_data.hist.map(function(inc){
    var fecha=new Date(inc.resuelto_at||inc.created_at).toLocaleDateString('es-AR',{timeZone:'America/Argentina/Buenos_Aires',day:'2-digit',month:'2-digit',year:'2-digit'});
    return '<div style="display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--bd);font-size:.75rem">'+
      '<div><b>'+inc.producto_nombre+'</b> &times;'+inc.cantidad+'u <span style="color:var(--tx3)">&bull; '+({devolucion:'Devolución',faltante_pedido:'Faltante',fallado:'Fallado'}[inc.tipo]||inc.tipo)+'</span></div>'+
      '<span style="color:var(--tx3)">'+fecha+'</span>'+
    '</div>';
  }).join('')+'</div>';
}

load();
</script>
</body>
</html>
