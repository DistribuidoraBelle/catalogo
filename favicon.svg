<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

<!-- Cuerpo botella -->
<rect x="42" y="110" width="116" height="78" rx="28" fill="#c4965a" opacity="0.2"/>
<rect x="42" y="110" width="116" height="78" rx="28" fill="none" stroke="#c4965a" stroke-width="3"/>

<!-- Líquido interior -->
<rect x="50" y="138" width="100" height="48" rx="20" fill="#e8a0b0" opacity="0.4"/>

<!-- Reflejo lateral izquierdo -->
<rect x="52" y="118" width="10" height="54" rx="5" fill="white" opacity="0.15"/>

<!-- Hombros de la botella -->
<path d="M72,112 Q72,92 82,86 L118,86 Q128,92 128,112" fill="#c4965a" opacity="0.2"/>
<path d="M72,112 Q72,92 82,86 L118,86 Q128,92 128,112" fill="none" stroke="#c4965a" stroke-width="3"/>

<!-- Anillo decorativo hombro -->
<rect x="66" y="108" width="68" height="10" rx="5" fill="#c4965a"/>

<!-- Cuello recto -->
<rect x="82" y="64" width="36" height="26" rx="8" fill="#c4965a" opacity="0.22"/>
<rect x="82" y="64" width="36" height="26" rx="8" fill="none" stroke="#c4965a" stroke-width="2.5"/>
<rect x="79" y="84" width="42" height="7" rx="3.5" fill="#c4965a"/>

<!-- Boquilla atomizador -->
<rect x="118" y="70" width="28" height="7" rx="3.5" fill="#c4965a"/>
<rect x="82" y="54" width="36" height="14" rx="7" fill="#a07840"/>

<!-- Tapa -->
<rect x="84" y="26" width="32" height="32" rx="10" fill="#c4965a"/>
<rect x="90" y="32" width="20" height="20" rx="6" fill="#a07840" opacity="0.6"/>

<!-- Ondas aromáticas -->
<path d="M88,20 Q94,10 100,6 Q106,10 112,20" fill="none" stroke="#c4965a" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
<path d="M92,17 Q96,9 100,5 Q104,9 108,17" fill="none" stroke="#c4965a" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

<!-- Partículas spray -->
<circle cx="152" cy="66" r="3" fill="#c4965a" opacity="0.5"/>
<circle cx="161" cy="61" r="2" fill="#c4965a" opacity="0.35"/>
<circle cx="158" cy="74" r="2" fill="#c4965a" opacity="0.3"/>
<circle cx="166" cy="70" r="1.5" fill="#c4965a" opacity="0.25"/>

</svg>
