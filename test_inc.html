<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
body{font-family:sans-serif;background:#1a1a2e;color:#eee;padding:1rem}
.tbl-wrap{background:#252540;border-radius:8px;padding:.9rem 1rem;margin-bottom:.8rem}
.btn{padding:.3rem .7rem;border-radius:6px;cursor:pointer;border:1px solid #555;background:transparent;color:#eee;font-size:.75rem}
.btn-a{background:#c4965a;color:#000;border-color:#c4965a}
.fi{padding:.35rem .6rem;background:#1a1a2e;border:1px solid #555;border-radius:6px;color:#eee;width:100%;box-sizing:border-box}
</style>
</head>
<body>
<h2>Test Panel Faltantes</h2>
<div id="panel"></div>

<script>
var SB="https://syylbuvjuekkanxynpps.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function api(tabla,q){
  return fetch(SB+"/rest/v1/"+tabla+"?"+q,{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}}).then(r=>r.json());
}

function toggle(id){
  var el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function agregarTodo(itemId,prodId,cant,prodNom){
  if(!confirm('Agregar '+cant+'u de '+prodNom+'?'))return;
  Promise.all([
    fetch(SB+"/rest/v1/pedidos_proveedor_items?id=eq."+itemId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({estado_item:'en_stock',cantidad_recibida:cant})}),
    fetch(SB+"/rest/v1/productos?id=eq."+prodId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({stock_actual:cant})})
  ]).then(()=>{alert('✅ '+cant+'u agregadas al stock!');load();});
}

function marcarNoLlega(itemId){
  if(!confirm('Marcar como definitivamente no llegará?'))return;
  fetch(SB+"/rest/v1/pedidos_proveedor_items?id=eq."+itemId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({estado_item:'cancelado'})})
  .then(()=>{alert('Cerrado');load();});
}

function guardarObs(itemId,inputId){
  var obs=document.getElementById(inputId).value;
  fetch(SB+"/rest/v1/pedidos_proveedor_items?id=eq."+itemId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({observacion:obs})})
  .then(()=>alert('Nota guardada ✅'));
}

function load(){
  Promise.all([
    api("pedidos_proveedor_items","select=id,pedido_id,nombre_proveedor,cantidad_pedida,cantidad_recibida,producto_id,estado_item,observacion&estado_item=in.(faltante,fallado)&limit=100"),
    api("pedidos_proveedor","select=id,nro_pedido,proveedor&limit=200"),
    api("productos","select=id,nombre,stock_actual,en_viaje&activo=is.true&limit=2000")
  ]).then(function([items,peds,prods]){
    var pedMap={};peds.forEach(p=>pedMap[p.id]=p);
    var panel=document.getElementById('panel');
    if(!items.length){panel.innerHTML='<p>Sin faltantes</p>';return;}
    panel.innerHTML=items.map(function(it){
      var ped=pedMap[it.pedido_id];
      var cantFalt=Math.max(0,(it.cantidad_pedida||0)-(it.cantidad_recibida||0));
      var prod=prods.find(p=>p.id===it.producto_id);
      return '<div class="tbl-wrap" style="border-left:3px solid #00bcd4">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div>'+
            '<b>'+it.nombre_proveedor+'</b>'+
            '<div style="font-size:.7rem;color:#aaa">'+(ped?ped.nro_pedido+' — '+ped.proveedor:'Pedido #'+it.pedido_id)+'</div>'+
            (prod?'<div style="font-size:.7rem;color:#4caf50">Catálogo: '+prod.nombre+' | Stock: '+prod.stock_actual+'u</div>':'<div style="font-size:.7rem;color:#ff9800">Sin vincular</div>')+
          '</div>'+
          '<div style="text-align:center;background:rgba(0,188,212,.15);border-radius:8px;padding:.4rem .8rem">'+
            '<div style="font-size:.6rem;color:#aaa">Faltante</div>'+
            '<div style="font-size:1.3rem;font-weight:700;color:#00bcd4">'+cantFalt+'u</div>'+
          '</div>'+
        '</div>'+
        '<hr style="border-color:#333;margin:.7rem 0">'+
        // Panel de acciones
        '<div id="acc-'+it.id+'">'+
          (prod&&cantFalt>0?
            '<div style="margin-bottom:.6rem">'+
              '<div style="font-size:.7rem;color:#aaa;margin-bottom:.3rem">📥 ¿Cuántas llegaron?</div>'+
              '<div style="display:flex;gap:.5rem;align-items:center">'+
                '<input type="number" id="cant-'+it.id+'" value="'+cantFalt+'" min="1" max="'+cantFalt+'" style="width:80px;padding:.3rem;background:#1a1a2e;border:1px solid #555;border-radius:4px;color:#eee;font-size:.9rem;text-align:center">'+
                '<span style="font-size:.7rem;color:#aaa">de '+cantFalt+'u</span>'+
                '<button onclick="agregarConCant('+it.id+','+prod.id+','+cantFalt+',\''+prod.nombre.replace(/'/g,'')+'\')" class="btn btn-a">✅ Agregar al stock</button>'+
              '</div>'+
            '</div>':'<div style="font-size:.7rem;color:#ff9800;margin-bottom:.6rem">⚠️ Sin vincular al catálogo — no se puede agregar al stock</div>')+
          '<div style="margin-bottom:.6rem">'+
            '<div style="font-size:.7rem;color:#aaa;margin-bottom:.3rem">📝 Nota de seguimiento:</div>'+
            '<div style="display:flex;gap:.4rem">'+
              '<input type="text" id="obs-'+it.id+'" value="'+(it.observacion||'')+'" placeholder="Ej: llega la semana que viene..." class="fi">'+
              '<button onclick="guardarObs('+it.id+',\'obs-'+it.id+'\')" class="btn">💾</button>'+
            '</div>'+
          '</div>'+
          '<button onclick="marcarNoLlega('+it.id+')" class="btn" style="color:#f44336;border-color:#f44336;font-size:.7rem">✗ No llegará — cerrar</button>'+
        '</div>'+
      '</div>';
    }).join('');
  });
}

function agregarConCant(itemId,prodId,cantMax,prodNom){
  var input=document.getElementById('cant-'+itemId);
  var cant=Math.min(parseInt(input.value)||cantMax,cantMax);
  if(!confirm('Agregar '+cant+'u de "'+prodNom+'" al stock?'))return;
  fetch(SB+"/rest/v1/productos?id=eq."+prodId,{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}})
  .then(r=>r.json()).then(function(prods){
    var p=prods[0]||{};
    var sA=p.stock_actual||0;
    var nS=sA+cant;
    var nV=Math.max(0,(p.en_viaje||0)-cant);
    var quedan=cantMax-cant;
    Promise.all([
      fetch(SB+"/rest/v1/productos?id=eq."+prodId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({stock_actual:nS,en_viaje:nV})}),
      fetch(SB+"/rest/v1/pedidos_proveedor_items?id=eq."+itemId,{method:'PATCH',headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({estado_item:quedan>0?'faltante':'en_stock',cantidad_recibida:cant})})
    ]).then(()=>{
      alert(cant+'u agregadas al stock ✅'+(quedan>0?'\nQuedan '+quedan+'u pendientes':''));
      load();
    });
  });
}

load();
</script>
</body>
</html>
