<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><title>Test Fichas 2</title>
<style>
body{font-family:sans-serif;padding:1rem;background:#1a1a2e;color:#eee}
.btn{padding:.3rem .7rem;border-radius:6px;cursor:pointer;border:1px solid #666;background:#333;color:#eee}
.item{display:flex;align-items:center;gap:.5rem;padding:.5rem .6rem;background:#2a2a3e;border-radius:8px;border:1px solid #444;margin-bottom:.3rem}
.err{color:#f88;padding:.5rem;background:#300;border-radius:6px;margin:.3rem 0}
.ok{color:#8f8;padding:.5rem;background:#030;border-radius:6px;margin:.3rem 0}
</style>
</head>
<body>
<h3>Test Fichas — mismo código que belle.html</h3>
<div id="log"></div>
<hr>
<input id="srch" placeholder="Buscar..." style="padding:.3rem;background:#333;border:1px solid #666;color:#eee;border-radius:5px;margin-bottom:.5rem;width:200px">
<select id="marcaFil" style="padding:.3rem;background:#333;border:1px solid #666;color:#eee;border-radius:5px;margin-bottom:.5rem"></select>
<div id="lista" style="margin-top:.5rem">Iniciando...</div>

<script>
var SB_URL="https://syylbuvjuekkanxynpps.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

var _fichaProds=[], _fichaData={};

function log(msg, ok){
  var d=document.createElement('div');
  d.className=ok===false?'err':'ok';
  d.textContent=msg;
  document.getElementById('log').appendChild(d);
}

function fichaRenderLista(prods){
  var el=document.getElementById("lista");
  if(!prods.length){el.innerHTML='<div class="err">Sin resultados</div>';return;}
  el.innerHTML=prods.slice(0,20).map(function(p){
    var tiene=!!_fichaData[p.id];
    return '<div class="item">'
      +(p.imagen_url?'<img src="'+p.imagen_url+'" style="width:36px;height:36px;object-fit:contain;border-radius:5px;background:#fff;flex-shrink:0">':'<div style="width:36px;height:36px;background:#333;border-radius:5px;flex-shrink:0"></div>')
      +'<div style="flex:1"><div style="font-size:.75rem;font-weight:600">'+p.nombre+'</div>'
      +'<div style="font-size:.62rem;color:#aaa">'+( p.empresa||"")+'</div></div>'
      +'<span style="font-size:.6rem;padding:.1rem .4rem;border-radius:10px;background:'+(tiene?"rgba(99,187,106,.15)":"rgba(255,100,100,.1)")+';color:'+(tiene?"#3db87a":"#e53935")+'">'+(tiene?"✅ Con ficha":"Sin ficha")+'</span>'
      +'</div>';
  }).join("")+'<div style="font-size:.7rem;color:#aaa;margin-top:.4rem">Mostrando 20 de '+prods.length+' productos</div>';
}

function fichaLoadPage(){
  var el=document.getElementById("lista");
  el.innerHTML='Cargando...';
  log('Iniciando fetch de productos...');
  var url=SB_URL+"/rest/v1/productos?select=id,nombre,empresa,imagen_url&order=empresa,nombre&limit=2000";
  var headers={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};
  fetch(url,{headers:headers})
  .then(function(r){
    log('Response status: '+r.status);
    return r.json();
  })
  .then(function(prods){
    log('Productos recibidos: '+(Array.isArray(prods)?prods.length:'NO ES ARRAY — '+typeof prods));
    _fichaProds=Array.isArray(prods)?prods:[];
    if(!_fichaProds.length){
      el.innerHTML='<div class="err">Sin productos. Respuesta: '+JSON.stringify(prods).substring(0,200)+'</div>';
      return;
    }
    var marcasMap={};
    for(var i=0;i<_fichaProds.length;i++){var emp=_fichaProds[i].empresa||"";if(emp)marcasMap[emp]=true;}
    var marcas=Object.keys(marcasMap).sort();
    var sel=document.getElementById("marcaFil");
    sel.innerHTML='<option value="">Todas ('+_fichaProds.length+')</option>';
    for(var j=0;j<marcas.length;j++) sel.innerHTML+='<option value="'+marcas[j]+'">'+marcas[j]+'</option>';
    
    fetch(SB_URL+"/rest/v1/fichas_perfume?select=id,producto_id&order=id",{headers:headers})
    .then(function(r2){return r2.json();})
    .then(function(fichas){
      log('Fichas recibidas: '+(Array.isArray(fichas)?fichas.length:'error'));
      _fichaData={};
      if(Array.isArray(fichas)){for(var k=0;k<fichas.length;k++)_fichaData[fichas[k].producto_id]=fichas[k];}
      fichaRenderLista(_fichaProds);
    }).catch(function(e){
      log('Error fichas: '+e.message, false);
      _fichaData={};
      fichaRenderLista(_fichaProds);
    });
  }).catch(function(e){
    log('Error fetch productos: '+e.message, false);
    el.innerHTML='<div class="err">Error: '+e.message+'</div>';
  });
}

fichaLoadPage();
</script>
</body>
</html>
