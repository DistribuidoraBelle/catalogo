<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Diagnóstico Incidencias</title></head>
<body style="font-family:monospace;padding:1rem;background:#1a1a2e;color:#eee">
<h2>Diagnóstico Incidencias</h2>
<div id="out"></div>
<script>
var SB="https://syylbuvjuekkanxynpps.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eWxidXZqdWVra2FueHlucHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkwNjQsImV4cCI6MjA4OTA5NTA2NH0.59CUCsLcwVkR-f6KSbQ3RUmZl7-FK8haNW6kw_AkeJA";

function q(tabla,filtros){
  return fetch(SB+"/rest/v1/"+tabla+"?"+filtros,{
    headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}
  }).then(function(r){return r.json();});
}

var out=document.getElementById('out');
function log(msg,data){
  out.innerHTML+="<div style='margin:.5rem 0;padding:.5rem;background:#0a0a1a;border-radius:4px'>"
    +"<b style='color:#c4965a'>"+msg+"</b><pre style='color:#aaa;font-size:.8rem;margin:.3rem 0 0'>"+JSON.stringify(data,null,2).slice(0,500)+"</pre></div>";
}

// Test 1: todos los estados_item distintos
q("pedidos_proveedor_items","select=estado_item&limit=500").then(function(r){
  var estados={};
  r.forEach(function(i){estados[i.estado_item]=(estados[i.estado_item]||0)+1;});
  log("Estados en pedidos_proveedor_items:", estados);
});

// Test 2: items con faltante
q("pedidos_proveedor_items","select=id,nombre_proveedor,estado_item,cantidad_pedida,cantidad_recibida&estado_item=eq.faltante&limit=20").then(function(r){
  log("Items con estado_item=faltante ("+r.length+"):", r);
});

// Test 3: items con in.(faltante,fallado)
q("pedidos_proveedor_items","select=id,nombre_proveedor,estado_item&estado_item=in.(faltante,fallado)&limit=20").then(function(r){
  log("Items con estado_item=in.(faltante,fallado) ("+r.length+"):", r);
});

// Test 4: tabla incidencias
q("incidencias","select=id,tipo,estado,producto_nombre&limit=20").then(function(r){
  log("Incidencias ("+r.length+"):", r);
}).catch(function(e){
  log("ERROR tabla incidencias:", e.message+" — puede no existir aún");
});
</script>
</body>
</html>
