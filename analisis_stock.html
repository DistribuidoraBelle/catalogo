<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Análisis Forense Stock</title>
<style>
body{font-family:monospace;padding:16px;background:#0f1117;color:#eee;font-size:12px}
h2{color:#e8b86d}h3{color:#fbbf24;margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:11px;margin:4px 0}
th{background:#1e2333;padding:5px 8px;text-align:left;color:#e8b86d}
td{padding:4px 8px;border-bottom:1px solid #1e2333}
.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}
button{background:#e8b86d;color:#0f1117;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:700;margin:4px}
pre{background:#1e2333;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:10px;max-height:200px;overflow-y:auto}
</style>
</head>
<body>
<h2>🔬 Análisis Forense de Stock — Belle</h2>
<button onclick="run()">▶ Ejecutar análisis completo</button>
<div id="out"></div>
<script>
const O=document.getElementById('out');
const log=(h)=>{O.innerHTML+=h;};
const row=(cls,txt,det='')=>`<tr><td class="${cls}">${txt}</td><td style="color:#888;font-size:10px">${det}</td></tr>`;

async function run(){
  O.innerHTML='';
  const html=await fetch('/belle.html',{cache:'no-store'}).then(r=>r.text());
  const js=html.slice(html.indexOf('//<![CDATA[')+11,html.indexOf('//]]>'));
  const SB_URL=js.match(/var SB_URL\s*=\s*['"]([^'"]+)['"]/)?.[1];
  const SB_KEY=js.match(/var SB_KEY\s*=\s*['"]([^'"]+)['"]/)?.[1];
  const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  const get=(t,q)=>fetch(SB_URL+'/rest/v1/'+t+'?'+q,{headers:H}).then(r=>r.json());

  // ── 1. ANALIZAR ORD-558980 ESPECÍFICAMENTE ────────────────────────────────
  log('<h3>1️⃣ ORD-558980 — Análisis específico</h3>');
  const ventasOrden=await get('ventas','select=*&nro_orden=eq.ORD-558980&order=created_at');
  log('<pre>'+JSON.stringify(ventasOrden,null,2)+'</pre>');

  // Buscar el producto
  let prodId=null;
  ventasOrden.forEach(v=>{
    if(v.producto_nombre&&v.producto_nombre.includes('CK IN2U')){
      prodId=v.producto_id;
      log(`<p class="warn">Producto ID: ${prodId} | Nombre: ${v.producto_nombre}</p>`);
      log(`<p>Estado venta: <b>${v.estado}</b> | Cantidad: <b>${v.cantidad}</b> | Total: <b>$${v.total}</b></p>`);
    }
  });

  if(prodId){
    // Ver el producto actual
    const prod=await get('productos','select=id,nombre,stock_actual,reserva,en_viaje&id=eq.'+prodId);
    log('<h3>Estado actual del producto</h3>');
    log('<pre>'+JSON.stringify(prod,null,2)+'</pre>');

    // Ver todos los movimientos de stock para ese producto
    const movs=await get('movimientos_stock','select=*&producto_id=eq.'+prodId+'&order=created_at.desc&limit=50');
    log('<h3>Movimientos de stock del producto (últimos 50)</h3>');
    if(!movs.length){
      log('<p class="err">⚠ SIN MOVIMIENTOS DE STOCK REGISTRADOS para este producto</p>');
    } else {
      log('<table><tr><th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Motivo</th><th>Stock antes</th><th>Stock después</th></tr>');
      movs.forEach(m=>{
        log(`<tr><td>${m.created_at?.slice(0,19)||'-'}</td><td>${m.tipo}</td><td>${m.cantidad}</td><td>${m.motivo||'-'}</td><td>${m.stock_antes??'-'}</td><td>${m.stock_despues??'-'}</td></tr>`);
      });
      log('</table>');
    }
  }

  // ── 2. ANALIZAR EL CÓDIGO DE executeVenta — buscar el bug ─────────────────
  log('<h3>2️⃣ Análisis del código executeVenta</h3>');
  
  // Obtener el ventas.html y buscar el bloque de descuento de stock
  const vhtml=await fetch('/ventas.html',{cache:'no-store'}).then(r=>r.text());
  const vjs=vhtml.slice(vhtml.indexOf('//<![CDATA[')+11,vhtml.indexOf('//]]>'));
  
  // Buscar cómo se descuenta el stock
  const stockPatterns=[
    'apiPatch.*stock_actual',
    'stock_actual.*-',
    'reducirStock',
    'descontarStock',
    'updateStock',
    'stock_actual:.*-',
  ];
  
  let stockUpdateCode=[];
  // Buscar el bloque de actualización de stock en executeVenta
  const exIdx=vjs.indexOf('function executeVenta(');
  if(exIdx>=0){
    let depth=0,end=exIdx;
    for(let i=exIdx;i<vjs.length;i++){
      if(vjs[i]==='{')depth++;
      else if(vjs[i]==='}'){depth--;if(depth===0){end=i+1;break;}}
    }
    const exFn=vjs.slice(exIdx,end);
    
    // Buscar stock_actual en executeVenta
    const stockMatches=[];
    let pos=exFn.indexOf('stock_actual');
    while(pos>=0){
      stockMatches.push(exFn.slice(Math.max(0,pos-50),pos+150));
      pos=exFn.indexOf('stock_actual',pos+1);
    }
    
    if(!stockMatches.length){
      log('<p class="err">❌ CRÍTICO: No se encontró actualización de stock_actual en executeVenta</p>');
    } else {
      log('<p class="ok">✓ stock_actual encontrado '+stockMatches.length+' veces en executeVenta</p>');
      stockMatches.forEach((m,i)=>{
        log(`<pre>Match ${i+1}: ${m}</pre>`);
      });
    }
    
    // Buscar si hay condición especial para cat_catalogo o algún filtro
    const catCheck=exFn.includes('cat_catalogo')||exFn.includes('internacionales')||exFn.includes('arabes');
    log(`<p class="${catCheck?'warn':'ok'}">${catCheck?'⚠ executeVenta filtra por categoría (posible bug)':'✓ executeVenta no filtra por categoría'}</p>`);
    
    // Mostrar el bloque de update de stock completo
    const apiPatchIdx=exFn.indexOf('apiPatch');
    if(apiPatchIdx>=0){
      log('<h3>Primeros bloques apiPatch en executeVenta:</h3>');
      let p=0;
      while((p=exFn.indexOf('apiPatch',p))>=0&&p<exFn.length-1){
        const snippet=exFn.slice(p,Math.min(p+300,exFn.length));
        if(snippet.includes('stock')||snippet.includes('producto')){
          log(`<pre>${snippet.slice(0,300)}</pre>`);
        }
        p+=8;
      }
    }
  }

  // ── 3. VERIFICAR TODOS LOS PRODUCTOS: stock vs movimientos ────────────────
  log('<h3>3️⃣ Productos vendidos en ORD-558980 — stock check</h3>');
  const prodIds=[...new Set(ventasOrden.filter(v=>v.producto_id).map(v=>v.producto_id))];
  log(`<p>Productos en la orden: ${prodIds.join(', ')}</p>`);
  
  for(const pid of prodIds){
    const [p,movs]=await Promise.all([
      get('productos','select=id,nombre,stock_actual,reserva&id=eq.'+pid),
      get('movimientos_stock','select=tipo,cantidad,created_at,motivo&producto_id=eq.'+pid+'&order=created_at.desc&limit=10')
    ]);
    const prod=p[0];
    if(!prod) continue;
    
    // Calcular cuánto debería haberse restado
    const ventasProd=ventasOrden.filter(v=>v.producto_id===pid);
    const totalVendido=ventasProd.reduce((s,v)=>s+(v.cantidad||1),0);
    const tieneMovSalida=movs.some(m=>m.tipo==='salida'||m.tipo==='venta');
    
    const estado=tieneMovSalida?'ok':'err';
    log(`<p class="${estado}">${estado==='ok'?'✓':'❌'} <b>${prod.nombre}</b> — stock: ${prod.stock_actual} | vendido: ${totalVendido}u | mov salida: ${tieneMovSalida?'SÍ':'NO ENCONTRADO'}</p>`);
    if(!tieneMovSalida){
      log(`<p class="err" style="margin-left:20px">POSIBLE BUG: se vendió pero no hay movimiento de salida registrado</p>`);
    }
  }

  // ── 4. ESTADÍSTICAS GENERALES ─────────────────────────────────────────────
  log('<h3>4️⃣ Estadística general — ventas sin movimiento de stock</h3>');
  const ventasRecientes=await get('ventas','select=producto_id,producto_nombre,cantidad,nro_orden,created_at&estado=eq.confirmada&producto_id=not.is.null&order=created_at.desc&limit=200');
  
  let sinMov=0,total=0;
  const sinMovProds=[];
  
  // Agrupar por producto
  const byProd={};
  ventasRecientes.forEach(v=>{
    if(!byProd[v.producto_id]) byProd[v.producto_id]={nombre:v.producto_nombre,cant:0,ordenes:[]};
    byProd[v.producto_id].cant+=(v.cantidad||1);
    byProd[v.producto_id].ordenes.push(v.nro_orden);
    total++;
  });
  
  log(`<p>Analizando ${Object.keys(byProd).length} productos distintos en últimas 200 ventas...</p>`);
  
  for(const [pid,info] of Object.entries(byProd)){
    const movs=await get('movimientos_stock','select=tipo,cantidad&producto_id=eq.'+pid+'&tipo=in.(salida,venta)&limit=1');
    if(!movs.length){
      sinMovProds.push({id:pid,nombre:info.nombre,cant:info.cant,ordenes:info.ordenes.slice(0,3)});
      sinMov++;
    }
  }
  
  if(sinMov===0){
    log('<p class="ok">✓ Todos los productos vendidos tienen movimientos de stock</p>');
  } else {
    log(`<p class="err">❌ ${sinMov} productos vendidos SIN ningún movimiento de salida:</p>`);
    log('<table><tr><th>ID</th><th>Nombre</th><th>Unidades vendidas</th><th>Órdenes</th></tr>');
    sinMovProds.forEach(p=>{
      log(`<tr><td>${p.id}</td><td class="err">${p.nombre}</td><td>${p.cant}</td><td style="font-size:10px">${p.ordenes.join(', ')}</td></tr>`);
    });
    log('</table>');
  }
  
  log('<hr style="border-color:#2a3045;margin:16px 0">');
  log('<p class="ok">✅ Análisis completo</p>');
}
</script>
</body>
</html>
