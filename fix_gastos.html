<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fix Gastos - Belle</title>
<style>
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; max-width: 600px; margin: 0 auto; }
  .btn { width:100%; padding:1rem; font-size:1.1rem; font-weight:700; border:none; border-radius:8px; cursor:pointer; background:#e94560; color:white; margin-top:1rem; }
  .btn:disabled { background:#555; cursor:not-allowed; }
  .log { background:#0a0a1a; border-radius:6px; padding:1rem; font-family:monospace; font-size:.85rem; margin-top:1rem; display:none; }
  .ok { color:#4caf80; } .err { color:#e06464; } .inf { color:#4a9fd8; }
  .card { background:#16213e; border:1px solid #0f3460; border-radius:10px; padding:1rem; margin-bottom:1rem; }
</style>
</head>
<body>
<h2>🧹 Borrar comisiones Marcela del período anterior</h2>
<div class="card">
  <b>IDs a borrar:</b> 39, 41, 45, 46, 48<br>
  <b>Total:</b> $22.000 (comisiones período "Semana 3 - mar 2026")<br>
  <b>Motivo:</b> quedaron sin borrar en el cierre anterior
</div>
<button class="btn" id="btn" onclick="fix()">⚡ BORRAR GASTOS</button>
<div class="log" id="log"></div>
<script>
const URL  = 'https://syylbuvjuekkanxynpps.supabase.co/rest/v1';
const KEY  = 'sb_publishable_DQUI1egWtjw_8hs0iUyE4Q_zhDpJo52';
const IDS  = [39, 41, 45, 46, 48];

function log(msg, cls) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += '<div class="'+cls+'">['+new Date().toLocaleTimeString('es-AR')+'] '+msg+'</div>';
}

async function del(id) {
  var r = await fetch(URL+'/gastos_vendedor?id=eq.'+id, {
    method: 'DELETE',
    headers: { 'apikey': KEY, 'Authorization': 'Bearer '+KEY }
  });
  if (!r.ok) throw new Error('HTTP '+r.status+' — '+(await r.text()));
}

async function fix() {
  if (!confirm('¿Borrar los 5 gastos de comisiones Marcela (ids 39,41,45,46,48)?')) return;
  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Borrando...';
  try {
    for (var id of IDS) {
      await del(id);
      log('✅ Borrado gasto id='+id, 'ok');
    }
    log('🎉 Listo. Cerrá esta página y recargá el panel.', 'ok');
    btn.textContent = '✅ Completado';
    btn.style.background = '#4caf80';
  } catch(e) {
    log('❌ Error: '+e.message, 'err');
    btn.disabled = false;
    btn.textContent = '⚡ REINTENTAR';
  }
}
</script>
</body>
</html>
