<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Periodos Belle</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #eee; }
.ok { color: #4ade80; } .err { color: #f87171; } .warn { color: #fbbf24; }
pre { background: #2a2a2a; padding: 10px; border-radius: 6px; overflow-x:auto; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
button { background: #c4965a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 4px; font-size: 14px; }
</style>
</head>
<body>
<h2>🔍 Test Diagnóstico — Pestaña Períodos</h2>
<button onclick="runFull()">▶ EJECUTAR DIAGNÓSTICO COMPLETO</button>
<div id="output"></div>

<script>
const out = document.getElementById('output');
const log = (msg, cls='') => { out.innerHTML += `<div class="${cls}">${msg}</div>`; };

async function runFull() {
  out.innerHTML = '';
  
  // Cargar belle.html real
  const html = await fetch('/belle.html', {cache:'no-store'}).then(r=>r.text());
  const js = html.slice(html.indexOf('//<![CDATA[')+11, html.indexOf('//]]>'));
  log(`✓ belle.html: ${html.length.toLocaleString()} bytes`, 'ok');

  // Interceptar errores
  const errors = [];
  const origError = window.onerror;
  window.onerror = (msg, src, line, col, err) => {
    errors.push({msg, line, col, stack: err?.stack});
    return false;
  };

  // Crear iframe con belle.html real para ver qué pasa
  log('<br><strong>Cargando belle.html en iframe y navegando a Periodos...</strong>');
  
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:1px;opacity:0;position:absolute;left:-9999px';
  document.body.appendChild(iframe);
  
  // Inyectar belle.html modificado para capturar errores
  const modifiedHtml = html.replace(
    '//<![CDATA[',
    '//<![CDATA[\nwindow._belleErrors=[];\nwindow._belleLog=[];\n'
  ).replace(
    'function loadPeriodos()',
    'function loadPeriodos_ORIG()'
  ).replace(
    'if(pg==="periodos")loadPeriodos();',
    'if(pg==="periodos"){window._belleLog.push("navTo periodos llamado");try{loadPeriodos_ORIG();}catch(e){window._belleErrors.push("loadPeriodos: "+e.message+" stack:"+e.stack);}}'
  );
  
  // En vez de iframe, ejecutar las funciones clave directamente
  // Extraer y ejecutar en el contexto de ESTA página con Supabase real
  log('<br><strong>Ejecutando con Supabase real...</strong>');
  
  // Extraer función helper
  function ef(src, n) {
    let i = src.indexOf('function '+n+'(');
    if(i<0) i = src.indexOf('async function '+n+'(');
    if(i<0) return null;
    let d=0, j=i;
    while(j<src.length){if(src[j]==='{')d++;else if(src[j]==='}'){d--;if(!d)return src.slice(i,j+1);}j++;}
  }

  // Evaluar el JS completo en esta página para tener todo el contexto
  try {
    // Solo evaluar las variables y funciones de períodos
    const varDecl = js.match(/var periodoActual[^;]+;/)?.[0];
    const periodoConfigDecl = js.match(/var _periodoConfig\s*=[^;]+;/)?.[0];
    const periodosDataDecl = js.match(/var _periodosData\s*=[^;]+;/)?.[0];
    
    if(varDecl) { eval(varDecl); log('✓ Variables globales: '+varDecl.slice(0,80), 'ok'); }
    if(periodoConfigDecl) { eval(periodoConfigDecl); log('✓ _periodoConfig declarado', 'ok'); }
    if(periodosDataDecl) { eval(periodosDataDecl); log('✓ _periodosData declarado', 'ok'); }

    // Evaluar funciones de formateo
    const fmtFn = ef(js, 'fmt');
    if(fmtFn) eval(fmtFn);

    // Evaluar renderPeriodoCard
    const rpcFn = ef(js, 'renderPeriodoCard');
    if(rpcFn) { eval(rpcFn); log('✓ renderPeriodoCard evaluada', 'ok'); }

    // Evaluar loadResumenPeriodoActual — ESTA ES LA CLAVE
    // Esta función usa apiGet que usa Supabase real
    // Si Supabase falla, el spinner queda

    // Primero evaluar apiGet y api y SB_URL
    const sbUrl = js.match(/var SB_URL\s*=\s*['"][^'"]+['"]/)?.[0];
    const sbKey = js.match(/var SB_KEY\s*=\s*['"][^'"]+['"]/)?.[0];
    if(sbUrl) { eval(sbUrl); log('✓ SB_URL: '+SB_URL, 'ok'); }
    if(sbKey) { eval(sbKey); log('✓ SB_KEY: '+SB_KEY.slice(0,30)+'...', 'ok'); }

    const apiFn = ef(js, 'api');
    const apiGetFn = ef(js, 'apiGet');
    if(apiFn) eval(apiFn);
    if(apiGetFn) { eval(apiGetFn); log('✓ apiGet evaluada', 'ok'); }

    // Test: llamar apiGet('configuracion') directamente
    log('<br><strong>Test apiGet(\'configuracion\')...</strong>');
    apiGet('configuracion', 'select=clave,valor').then(data => {
      log('✓ configuracion responde: '+JSON.stringify(data).slice(0,200), 'ok');
      
      // Buscar periodo_actual
      const pa = (data||[]).find(r=>r.clave==='periodo_actual');
      log(pa ? '✓ periodo_actual: '+pa.valor : '✗ periodo_actual NO encontrado en configuracion', pa?'ok':'err');
      
      if(pa) periodoActual = pa.valor;
      
    }).catch(e => log('✗ apiGet configuracion FALLO: '+e.message, 'err'));

    log('<br><strong>Test apiGet(\'historial_periodos\')...</strong>');
    apiGet('historial_periodos', 'select=*&order=fecha_cierre.desc&limit=5').then(data => {
      log('✓ historial_periodos responde: '+JSON.stringify(data).slice(0,200), 'ok');
    }).catch(e => log('✗ historial_periodos FALLO: '+e.message, 'err'));

    // Evaluar renderPeriodosPage
    const rppFn = ef(js, 'renderPeriodosPage');
    if(rppFn) eval(rppFn);

    // Test renderPeriodosPage con cont real
    const cont = {_h:'', get innerHTML(){return this._h;}, set innerHTML(v){this._h=v;}};
    try {
      renderPeriodosPage(cont);
      log('<br>✓ renderPeriodosPage OK: '+cont._h.length+' chars', 'ok');
      log('✓ Sin spinner: '+!cont._h.includes('Cargando...'), 'ok');
    } catch(e) {
      log('<br>✗ renderPeriodosPage ERROR: '+e.message, 'err');
      log('<pre>'+e.stack+'</pre>');
    }

    // Evaluar loadPeriodos y ejecutar
    const lpFn = ef(js, 'loadPeriodos');
    if(lpFn) eval(lpFn);
    
    const lrFn = ef(js, 'loadResumenPeriodoActual');
    if(lrFn) eval(lrFn);

    // Crear div real en esta página
    const testCont = document.createElement('div');
    testCont.id = 'periodosContainer';
    testCont.style.display = 'none';
    document.body.appendChild(testCont);
    
    // Mocks necesarios
    window.setupAutoClose = window.setupAutoClose || (()=>{});
    window.perMostrarConfigActual = window.perMostrarConfigActual || (()=>{});

    log('<br><strong>Ejecutando loadPeriodos() con Supabase real...</strong>');
    loadPeriodos();
    
    setTimeout(()=>{
      const h = testCont.innerHTML;
      log('<br>=== RESULTADO FINAL ===');
      log(h.length > 200 ? '✅ FUNCIONA: '+h.length+' chars generados' : '✗ SIGUE FALLANDO: '+h.length+' chars', h.length>200?'ok':'err');
      log('Sin spinner: '+((!h.includes('Cargando...'))+''), h.includes('Cargando...')?'err':'ok');
      log('Tiene perTipo: '+(h.includes('perTipo')+''), h.includes('perTipo')?'ok':'err');
      
      if(h.length < 200) {
        log('<br>HTML actual en container:<pre>'+h.replace(/</g,'&lt;')+'</pre>', 'warn');
      }
      
      document.body.removeChild(testCont);
    }, 3000);

  } catch(e) {
    log('✗ ERROR GENERAL: '+e.message, 'err');
    log('<pre>'+e.stack+'</pre>');
  }
}
</script>
</body>
</html>
