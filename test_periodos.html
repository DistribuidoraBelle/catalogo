<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Periodos</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;font-size:13px}
.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}
pre{background:#2a2a2a;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:11px}
button{background:#c4965a;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin:4px}
</style>
</head>
<body>
<h2>🔍 Test Definitivo Períodos</h2>
<button onclick="test()">▶ EJECUTAR</button>
<div id="out"></div>
<script>
const O = document.getElementById('out');
const log = (m,c='')=>{ O.innerHTML += `<div class="${c}">${m}</div>`; };

async function test(){
  O.innerHTML='';
  const html = await fetch('/belle.html',{cache:'no-store'}).then(r=>r.text());
  const js = html.slice(html.indexOf('//<![CDATA[')+11, html.indexOf('//]]>'));
  log(`belle.html: ${html.length.toLocaleString()} bytes`,'ok');

  // ── 1. Verificar declaración de backupEmail ──
  const varLine = js.match(/var periodoActual[^;\n]+;/)?.[0]||'';
  log('Línea var: <pre>'+varLine+'</pre>');
  log(varLine.includes('backupEmail') ? '✓ backupEmail declarada':'✗ backupEmail NO declarada',varLine.includes('backupEmail')?'ok':'err');

  // ── 2. Extraer renderPeriodosPage y contar sus líneas ──
  function ef(src,n){
    let i=src.indexOf('function '+n+'(');
    if(i<0)return null;
    let d=0,j=i;
    while(j<src.length){if(src[j]==='{')d++;else if(src[j]==='}'){d--;if(!d)return src.slice(i,j+1);}j++;}
  }
  const rpp = ef(js,'renderPeriodosPage');
  log(`renderPeriodosPage: ${rpp?.length} chars, ${rpp?.split('\n').length} líneas`);
  
  // ── 3. Verificar protecciones ──
  log(rpp?.includes("typeof backupEmail") ? '✓ backupEmail protegida con typeof':'✗ backupEmail NO protegida', rpp?.includes("typeof backupEmail")?'ok':'warn');
  log(rpp?.includes("typeof loadResumenPeriodoActual") ? '✓ loadResumenPeriodoActual protegida':'✗ loadResumenPeriodoActual NO protegida', rpp?.includes("typeof loadResumenPeriodoActual")?'ok':'warn');

  // ── 4. Interceptar TODOS los errores del window ──
  const errores = [];
  window.addEventListener('error', e => {
    errores.push(`ERROR: ${e.message} (${e.filename}:${e.lineno}:${e.colno})`);
  });
  window.addEventListener('unhandledrejection', e => {
    errores.push(`PROMISE REJECT: ${e.reason}`);
  });

  // ── 5. Crear iframe con belle.html e interceptar su console ──
  log('<br>Cargando belle.html en iframe...');
  const iframe = document.createElement('iframe');
  iframe.style.cssText='width:400px;height:300px;border:1px solid #444';
  document.body.appendChild(iframe);
  
  const iframeErrors=[], iframeWarns=[];
  
  // Esperar que el iframe cargue
  await new Promise(resolve => {
    iframe.onload = resolve;
    iframe.src = '/belle.html?t='+Date.now();
  });
  
  log('✓ belle.html cargado en iframe','ok');
  
  // Interceptar errores del iframe
  try {
    const iWin = iframe.contentWindow;
    const origConsoleWarn = iWin.console.warn.bind(iWin.console);
    const origConsoleError = iWin.console.error.bind(iWin.console);
    iWin.console.warn = function(...args){ iframeWarns.push(args.join(' ')); origConsoleWarn(...args); };
    iWin.console.error = function(...args){ iframeErrors.push(args.join(' ')); origConsoleError(...args); };
    iWin.onerror = function(msg,src,line,col,err){
      iframeErrors.push(`${msg} L${line}:${col}`);
      return false;
    };
    log('✓ Console interceptado','ok');
  } catch(e) {
    log('⚠ No pude interceptar console del iframe: '+e.message,'warn');
  }

  // ── 6. Navegar a períodos en el iframe ──
  await new Promise(r=>setTimeout(r,500));
  
  try {
    const iWin = iframe.contentWindow;
    
    // Ver estado inicial
    const periodosBtn = iWin.document.querySelector('[onclick*="periodos"]') || 
                        iWin.document.querySelector('[data-page="periodos"]') ||
                        Array.from(iWin.document.querySelectorAll('button,a')).find(el=>el.textContent.includes('eriodos'));
    
    log('Botón períodos: '+(periodosBtn ? periodosBtn.outerHTML.slice(0,100) : 'NO ENCONTRADO'),'warn');
    
    // Llamar loadPeriodos directamente
    log('<br>Llamando loadPeriodos() directamente en iframe...');
    
    if(typeof iWin.loadPeriodos === 'function'){
      log('✓ loadPeriodos existe en iframe','ok');
      
      // Verificar el container
      const cont = iWin.document.getElementById('periodosContainer');
      log('periodosContainer: '+(cont?'EXISTE '+cont.innerHTML.slice(0,50):'NO EXISTE'),'warn');
      
      // Monitorear el container
      let cambios=[];
      if(cont){
        const obs = new iWin.MutationObserver(muts=>{
          muts.forEach(m=>{
            cambios.push({tipo:'innerHTML',len:cont.innerHTML.length,spinner:cont.innerHTML.includes('Cargando')});
          });
        });
        obs.observe(cont,{childList:true,subtree:true,characterData:true});
      }
      
      try {
        iWin.loadPeriodos();
        log('✓ loadPeriodos() llamada sin error','ok');
      } catch(e) {
        log('✗ loadPeriodos() ERROR: '+e.message,'err');
        log('<pre>'+e.stack+'</pre>');
      }
      
      // Esperar resultado
      await new Promise(r=>setTimeout(r,4000));
      
      log('<br>=== ESTADO DESPUÉS DE 4 SEGUNDOS ===');
      const finalHTML = cont?.innerHTML||'';
      log('Container length: '+finalHTML.length, finalHTML.length>200?'ok':'err');
      log('Tiene spinner: '+finalHTML.includes('Cargando...'), finalHTML.includes('Cargando...')?'err':'ok');
      log('Tiene perTipo: '+finalHTML.includes('perTipo'), finalHTML.includes('perTipo')?'ok':'err');
      
      if(finalHTML.includes('Cargando...')){
        log('<br>⚠ SPINNER SIGUE PRESENTE','err');
        log('Cambios observados en container: '+JSON.stringify(cambios));
      }
      
    } else {
      log('✗ loadPeriodos NO existe en iframe','err');
      log('Funciones disponibles: '+Object.keys(iWin).filter(k=>typeof iWin[k]==='function' && k.includes('eriod')).join(', '));
    }
    
    // Mostrar errores capturados
    if(iframeErrors.length){
      log('<br>ERRORES EN IFRAME:','err');
      iframeErrors.forEach(e=>log('<pre>'+e+'</pre>','err'));
    } else {
      log('✓ Sin errores JS en iframe','ok');
    }
    if(iframeWarns.length){
      log('<br>WARNINGS EN IFRAME:','warn');
      iframeWarns.forEach(w=>log('<pre>'+w+'</pre>','warn'));
    }
    
  } catch(e) {
    log('✗ ERROR accediendo al iframe: '+e.message,'err');
    log('(Puede ser problema de cross-origin si el dominio no coincide)','warn');
  }
}
</script>
</body>
</html>
